        gorsel_kimlik: { renk_kodu: "#EF4444", tema_notu: "Parlak Kırmızı (ACİL!)", ikon_adi: "fas fa-ambulance", alternatif_ikonlar: "fas fa-siren-on", emoji: "🚨" }
