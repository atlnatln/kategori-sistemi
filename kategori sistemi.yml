              - { alan_adi: "yeni_sahibe_verilecek_esyalar_ess", label: "Hayvanla Birlikte Verilecek Eşyalar", tip: "text_tags", aciklama: "Örn: Tasması, yatağı, oyuncakları, kalan maması", zorunlu: false, ai_importance: 0.5 }
          iletisim_surec_grubu:
