          - { alan_adi: "ihbar_yapan_kisi_rolu_acil", label: "İhbar Yapan Kişinin Rolü", tip: "select", secenekler: ["Gören Kişi", "İlk Müdahaleyi Yapan", "Hayvan Sahibi (eğer acilse)"], ai_importance: 0.6, zorunlu: true }
          # ... (GitHub dosyasındaki diğer ACİL DURUM filtreleri buraya eklenecek, yukarıdaki formatta) ...
      platform_ayarlari_acil_durum: # Anahtar ismini kategoriye özel hale getirdik
        ilan_yasam_dongusu_ayarlari:
          varsayilan_politika: "SURELI_DURUM_KONTROLLU_OTOMATIK_KAPANABILIR"
          # Açıklama: İlanlar belirli bir süre aktif kalır, bu süre sonunda veya durum çözüldüğünde otomatik kapanır/arşivlenir.
          # Kullanıcıdan periyodik olarak "Durum Devam Ediyor mu?" onayı istenebilir.
          
          varsayilan_aktif_kalma_suresi_gun: 7
          durum_guncelleme_hatirlatma_periyodu_gun: 3 # Kaç günde bir "Durum nedir?" diye sorulabilir.
          cozuldu_olarak_isaretlenince_yapilacak_aksiyon: "ILANI_ARSIVLE_VE_BASARI_HIKAYESI_OLARAK_ISARETLEME_ONER"
          sure_dolumunda_otomatik_aksiyon: "ILANI_PASIFE_AL_VE_KULLANICIYA_GUNCELLEME_SOR"

        operasyonel_onceliklendirme_ve_gorunurluk:
          oncelik_katsayisi_platform_ici: 2.5 # (1.0: Normal, 3.0: En Yüksek Öncelik)
          # Bu, moderasyon kuyruğunda en üste çıkmasını, anasayfada özel bir "ACİL DURUMLAR" bölümünde gösterilmesini tetikleyebilir.
          acil_durum_bildirim_sistemi_entegrasyonu:
            # (Opsiyonel, eğer varsa)
            # ilgili_gonullu_gruplarina_otomatik_bildirim_gonder_mi: true
            # yakin_bolgedeki_veterinerlere_uyari_sistemi_aktif_mi: false 

        moderasyon_ayarlari:
          seviye: "MAKSIMUM_HIZ_VE_YUKSEK_ONCELIKLI_DENETIM"
          # Açıklama: İlanlar, minimum uygunsuzluk kontrolünden sonra derhal yayına alınır.
          # Moderatörler bu ilanları en yüksek öncelikle ve sürekli olarak denetler. Yanlış veya kötü niyetli kullanıma karşı tolerans sıfırdır.
          yeni_ilan_varsayilan_durum: "YAYINDA_ACIL_DENETIM_BEKLIYOR"
          kritik_ihlal_durumunda_aninda_mudahale_protokolu: "ILANI_DERHAL_KALDIR_VE_KULLANICIYI_GEREKIRSE_ENGELLE_YASAL_SUREC_BASLATILABILIR_BILGISI_VER"
          otomatik_kufur_ve_siddet_icerigi_filtresi_aktif_mi: true # Temel bir filtreleme

        dogrulama_ve_guvenlik_protokolleri:
          protokol_aktif_mi: true
          protokol_genel_aciklama_kullanici: "Acil durum ilanlarının ciddiyeti ve hassasiyeti nedeniyle, platformumuz ihbarın doğruluğunu teyit etmek ve müdahalenin etkinliğini artırmak için ek bilgiler veya kanıtlar talep edebilir. Amacımız, gerçekten yardıma ihtiyacı olan canlara en hızlı ve doğru şekilde ulaşmaktır."
          
          uygulanabilecek_dogrulama_senaryolari:
            - senaryo_kodu: "FOTOGRAF_VIDEO_KANIT_TALEBI"
              senaryo_aciklamasi_kullanici: "Mümkünse, acil durumu ve hayvanın halini gösteren net bir fotoğraf veya kısa bir video yüklemeniz, durumun ciddiyetinin anlaşılmasına ve doğru yardımın planlanmasına yardımcı olacaktır."
              onemi: "YUKSEK_ONCELIKLI_TAVSIYE"
              moderator_kontrol_rehberi: "Görsel kanıt, durumun aciliyetini ve türünü teyit etmede kritiktir. Manipülatif veya alakasız görsellere karşı dikkatli olunmalıdır."

            - senaryo_kodu: "MADDİ_DESTEK_TALEBI_DOGRULAMASI"
              senaryo_aciklamasi_kullanici: "Eğer acil durum için maddi destek (örn: veteriner masrafı) talep ediliyorsa, bu talebi destekleyici belgeler (veteriner raporu, tedavi proforması, klinik iletişim bilgileri) sunmanız istenebilir."
              onemi: "ZORUNLU_BELGE_YUKLEME_ONCESI_YAYIN_KISITLI_OLABILIR"
              moderator_kontrol_rehberi: "Belgelerin gerçekliği, kliniğin varlığı ve beyan edilen masrafların makullüğü incelenmelidir. Para toplama süreçlerinin şeffaflığı sağlanmalıdır."

            - senaryo_kodu: "IHBARI_YAPAN_KISININ_GECMIS_GÜVENILIRLIGI_KONTROLU"
              senaryo_aciklamasi_kullanici: "Platformdaki geçmiş aktiviteleriniz ve güvenilirliğiniz, ihbarınızın değerlendirilmesinde dikkate alınabilir."
              onemi: "OTOMATIK_SISTEM_KONTROLU_VE_MODERATOR_DEGERLENDIRMESI"
              moderator_kontrol_rehberi: "Daha önce yanıltıcı veya kötü niyetli ilanlar vermiş kullanıcıların acil durum ilanları özel bir dikkatle incelenmeli, gerekirse ek teyitler istenmelidir."

      veri_yapilandirma_ve_dis_ai_optimizasyonu_acil_durum:
        semantik_icerik_ve_seo_ayarlari:
          # Acil durum ilanlarında kullanıcıyı en kritik bilgileri vermeye yönlendirecek temel öneriler.
          akilli_ilan_asistani_icerik_onerileri:
            - hedef_form_alani_kodu: "ILAN_BASLIK_ACIL"
              oneri_basligi_kullanici: "ACİLİYETİ Başlıkta Vurgulayın!"
              oneri_detayi_kullanici: "Başlıkta 'ACİL', 'YARALI', 'TEHLİKEDE' gibi durumu netleştiren bir ifade, hayvanın türünü ve olayın yaşandığı ŞEHİR/İLÇE bilgisini mutlaka belirtin."
              neden_onemli_aciklamasi_kullanici: "Bu, ilanın anında dikkat çekmesini ve doğru kişilere/kurumlara hızla ulaşmasını sağlar."
              iyi_ornek_metni_kullanici: "Örn: 'ACİL YARALI KEDİ - İSTANBUL/ŞİŞLİ - ARAÇ ÇARPMASI'"
              ipucu_tipi: "KRITIK_ONERI"

            - hedef_form_alani_kodu: "OLAY_YERI_ADRES_ACIL"
              oneri_basligi_kullanici: "Konumu Mümkün Olduğunca NET Belirtin"
              oneri_detayi_kullanici: "Açık adres, mahalle, cadde, sokak, yakındaki önemli bir nokta (okul, cami, market vb.) veya harita üzerindeki kesin konumu paylaşın. Tarifiniz, yardım ekiplerinin veya gönüllülerin olay yerine hızla ulaşabilmesi için çok önemli."
              neden_onemli_aciklamasi_kullanici: "Yanlış veya eksik konum bilgisi, hayati önem taşıyan zamanın kaybına neden olabilir."
              ipucu_tipi: "KRITIK_ONERI"

            - hedef_form_alani_kodu: "TALEP_EDILEN_YARDIM_TURU_ACIL"
              oneri_basligi_kullanici: "Ne Tür Bir Yardıma İhtiyaç Var?"
              oneri_detayi_kullanici: "Acil veteriner müdahalesi mi, güvenli bir yere nakil mi, geçici yuva mı, yoksa başka bir yardım mı gerekiyor? İhtiyacınızı net bir şekilde belirtin."
              neden_onemli_aciklamasi_kullanici: "Doğru yardım türünün belirtilmesi, kaynakların etkin kullanılmasını sağlar."
              ipucu_tipi: "IYILESTIRME_ONERISI"

          semantik_zenginlik_onemi_katsayisi: 1.0 # Acil durumda her kelime önemli.

        yapilandirilmis_veri_ve_meta_etiket_stratejileri:
          # Acil durumlar için Schema.org'da "Report" veya "Event" (özellikle "SocialEvent" alt türleri "EmergencyEvent" gibi) kullanılabilir.
          # Odak, olayın türü, aciliyeti, konumu ve etkilenen hayvan hakkında net sinyaller vermek olmalı.
          kullanilacak_schema_org_tipleri:
            - schema_tipi: "Report" # Veya "Event" -> "EmergencyEvent" (varsa)
              alan_eslestirmeleri:
                - schema_alani: "headline"
                  platform_alani_kaynagi: "ilan.baslik_acil"
                - schema_alani: "reportType" # Olayın türü
                  platform_alani_kaynagi: "ilan.acil_durum_tipi_metin"
                - schema_alani: "location"
                  platform_alani_kaynagi: "ilan.konum_yapilandirilmis_acil"
                  schema_alt_tipi: "Place"
                - schema_alani: "description"
                  platform_alani_kaynagi: "ilan.hayvanin_durumu_detay_acil"
                - schema_alani: "dateCreated"
                  platform_alani_kaynagi: "ilan.olay_tarih_saat_acil_iso"
                - schema_alani: "image" # Durumu gösteren görsel
                  platform_alani_kaynagi: "ilan.fotograf_url_acil"
                - schema_alani: "keywords"
                  platform_alani_kaynagi: "acil, yardim, ilan.acil_durum_tipi_metin, ilan.hayvan_turu_acil, ilan.sehir_ilce_acil_metin"
          
          ozel_meta_etiketler_acil_durum:
            - etiket_adi: "petplatform:emergency_type"
              icerik_kaynagi: "ilan.acil_durum_tipi_metin"
            - etiket_adi: "petplatform:emergency_location"
              icerik_kaynagi: "ilan.sehir_ilce_acil_metin_ve_detay"
            - etiket_adi: "petplatform:urgency_level_signal" # Harici sistemlere net sinyal
              sabit_deger: "CRITICAL" # Bu kategori için her zaman kritik
            - etiket_adi: "petplatform:action_needed" # Talep edilen yardım
              icerik_kaynagi: "ilan.talep_edilen_yardim_turu_acil_metin_listesi"

        harici_platform_ve_api_entegrasyon_hazirligi:
          # Acil durum verilerinin yetkili kurumlarla veya büyük hayvan kurtarma ağlarıyla paylaşımı için protokoller (çok dikkatli ve güvenli olmalı).
          veri_paylasim_protokolleri_acil_durum_icin:
            - protokol_adi: "ACIL_DURUM_XML_FEED_YETKILI_KURUMLAR_ICIN"
              aktif_mi: false # Çok dikkatli planlama gerektirir
              aciklama: "Sadece önceden tanımlanmış ve doğrulanmış resmi kurumlar veya büyük STK'larla güvenli bir şekilde acil durum verisi paylaşımı."
          
          gorsel_erisimi_ve_optimizasyonu_harici_sistemler_icin:
            gorsel_alt_metin_stratejisi: "OTOMATIK_OLUSTURMA_SABLONU_ACIL"
            # Şablon: "ACİL DURUM - [Hayvan Türü] - [Konum] - [Acil Durum Tipi]"

        icerik_kalitesi_ve_guvenilirlik_sinyalleri_harici_sistemler_icin:
          ilan_dogrulanma_seviyesi_meta_etiketi: "petplatform:verification_level_emergency" 
          # Değerler: "KANIT_SUNULDU", "ILETISIM_DOGRULANDI", "DOGRULANMAMIS_ACIL_CAGRI"
          rapor_guncellenme_zamani_meta_etiketi: "petplatform:emergency_report_last_updated"

      istatistikler:
        beklenen_performans_metrikleri:
          - "Ortalama ilan görüntülenme: Anlık olarak çok yüksek (özellikle bildirimlerle)"
          - "Başarılı müdahale/yardım oranı hedefi: %80 (hızlı koordinasyona bağlı)"
          - "Ortalama müdahale başlama süresi: 1-3 saat (kritik)"
          - "Platformun sosyal sorumluluk ve hayat kurtarma misyonunun zirvesi."

