          opsiyonel_iletisim_bilgisi_dogrulamasi_aktif_mi: true
      veri_yapilandirma_ve_dis_ai_optimizasyonu_talep_ilani: # Eski ai_ml_config buraya
        semantik_icerik_ve_seo_ayarlari:
          akilli_ilan_asistani_icerik_onerileri:
            - { hedef_form_alani_kodu: "TALEP_BASLIGI_TALEP", oneri_basligi_kullanici: "Ne Aradığınızı Başlıkta Netleştirin", oneri_detayi_kullanici: "Aradığınız hayvanın türünü/ırkını, ürünün adını/markasını veya hizmetin türünü başlıkta açıkça belirtin. 'Arıyorum', 'Talebi', 'İhtiyacım Var' gibi ifadeler kullanabilirsiniz.", neden_onemli_aciklamasi_kullanici: "Net bir başlık, doğru tedarikçilerin veya yardımcı olabilecek kişilerin talebinizi hızla fark etmesini sağlar.", iyi_ornek_metni_kullanici: "Örn: 'Acil Siyah Labrador Yavrusu Arıyorum (Ankara)' veya 'X Marka Glutensiz Kedi Maması Talebi'", ipucu_tipi: "IYILESTIRME_ONERISI" }
            - { hedef_form_alani_kodu: "ISTENILEN_OZELLIKLER_DETAY_TALEP", oneri_basligi_kullanici: "Talebinizin Tüm Detaylarını Paylaşın", oneri_detayi_kullanici: "Aradığınız şeyin özelliklerini (boyut, renk, yaş, sağlık durumu, malzeme, miktar, hizmet süresi vb.), beklentilerinizi ve varsa özel isteklerinizi detaylı bir şekilde yazın. Ne kadar çok bilgi verirseniz, o kadar doğru teklifler alırsınız.", neden_onemli_aciklamasi_kullanici: "Detaylı bilgi, yanlış anlaşılmaları önler ve size zaman kazandırır.", ipucu_tipi: "BILGILENDIRME_KAPSAMLI" }
          semantik_zenginlik_onemi_katsayisi: 0.6
        yapilandirilmis_veri_ve_meta_etiket_stratejileri:
          # Talepler için Schema.org'da "Demand" veya daha genel "WantAction" kullanılabilir.
          kullanilacak_schema_org_tipleri:
            - schema_tipi: "Demand"
              alan_eslestirmeleri:
                - { schema_alani: "name", platform_alani_kaynagi: "ilan.talep_basligi_talep" }
                - { schema_alani: "description", platform_alani_kaynagi: "ilan.istenilen_ozellikler_detay_talep_uzun" }
                - { schema_alani: "sku", platform_alani_kaynagi: "ilan.aranan_urun_adi_kategori_talep" } # Ürün talebi ise
                - { schema_alani: "mpn", platform_alani_kaynagi: "ilan.aranan_urun_marka_model_talep" } # Ürün talebi ise
                - { schema_alani: "serialNumber", platform_alani_kaynagi: "ilan.aranan_hayvan_tur_irk_talep" } # Hayvan talebi ise (ırk gibi)
                - { schema_alani: "itemOffered", platform_alani_kaynagi: "ilan.talep_turu_talep_schema_uyumlu_nesne" } # (Product, Service veya Animal objesi olabilir)
                - { schema_alani: "eligibleQuantity", platform_alani_kaynagi: "ilan.miktar_talep" } # (Sayı)
                - { schema_alani: "priceSpecification", platform_alani_kaynagi: "ilan.butce_araligi_talep_schema" } # (PriceSpecification)
                - { schema_alani: "validFrom", platform_alani_kaynagi: "ilan.yayin_tarihi_iso" }
                - { schema_alani: "validThrough", platform_alani_kaynagi: "ilan.gecerlilik_bitis_tarihi_iso" }
                - { schema_alani: "areaServed", platform_alani_kaynagi: "ilan.konum_tercihi_talep_schema" }
                - { schema_alani: "sender", platform_alani_kaynagi: "ilan.kullanici_profil_schema_talep" , schema_alt_tipi: "Person" }
          ozel_meta_etiketler_talep_ilani:
            - { etiket_adi: "petplatform:request_type", icerik_kaynagi: "ilan.talep_turu_talep_metin" }
            - { etiket_adi: "petplatform:item_searched", icerik_kaynagi: "ilan.aranan_anahtar_kelime_talep" }
            - { etiket_adi: "petplatform:urgency_request", icerik_kaynagi: "ilan.talep_aciliyeti_talep_metin" }
        harici_platform_ve_api_entegrasyon_hazirligi:
          tedarikci_platformlari_ile_otomatik_talep_eslestirme_aktif_mi: false # (Gelecekte)
          gorsel_erisimi_ve_optimizasyonu_harici_sistemler_icin:
            # Talep ilanlarında genellikle kullanıcı tarafından görsel yüklenmez, örnek görsel veya kategori ikonu kullanılabilir.
            gorsel_alt_metin_stratejisi: "TALEP_TURU_VE_ANAHTAR_KELIME"
        icerik_kalitesi_ve_guvenilirlik_sinyalleri_harici_sistemler_icin:
          talep_eden_kullanici_dogrulama_durumu_meta: "petplatform:requestor_verification_status"
      istatistikler:
        beklenen_performans_metrikleri:
          - "Ortalama talep görüntülenme: Orta (tedarikçiler tarafından)"
          - "Başarılı talep karşılama oranı hedefi: %40"
          - "Ortalama talep karşılama süresi: 7-15 gün"
          - "Platforma katkısı: Tedarikçiler için yeni iş fırsatları yaratır, kullanıcıların özel ihtiyaçlarını karşılar."
  
