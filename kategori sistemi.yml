        operasyonel_onceliklendirme_ve_gorunurluk_ayarlari:
          oncelik_katsayisi_platform_ici_topluluk: 1.2
          yaklasan_etkinlikler_icin_anasayfa_ve_bildirim_gorunurlugu_aktif_mi: true
          takvim_entegrasyonu_kullanici_ve_platform_geneli:
            kullanicilar_icin_takvime_ekle_butonu_destegi_aktif_mi: true # (Google Calendar, iCal, Outlook vb.)
            platform_genel_etkinlik_takvimi_sayfasi_ve_filtreleri_aktif_mi: true
          yerel_etkinlikler_icin_konum_bazli_oneri_sistemi_aktif_mi: true
        moderasyon_ayarlari:
          seviye: "ORTA_RISK_PROAKTIF_ICERIK_VE_ORGANIZATOR_KONTROLU"
          yeni_ilan_varsayilan_durum: "INCELEMEDE_YAYIN_ONAYI_BEKLIYOR"
          tekrar_eden_ve_guvenilir_organizator_etkinlikleri_icin_hizlandirilmis_onay_sureci_aktif_mi: true
          etkinlik_icerigi_uygunluk_kontrol_listesi_moderator:
            - "Etkinlik amacı platformun misyonu ve hayvan refahı ilkeleriyle uyumlu mu?"
            - "Etkinlik tanımı, tarihi, yeri, katılım koşulları (ücret, yaş sınırı, kayıt gerekliliği vb.) net, doğru ve yanıltıcı olmayan bilgiler içeriyor mu?"
            - "Organizatör bilgileri (kişi/kurum) şeffaf ve ulaşılabilir mi? Şüpheli bir profil mi?"
            - "Eğer ücretli bir etkinlikse, ücretin makuliyeti ve ne için talep edildiği açık mı? Dolandırıcılık riski var mı?"
            - "Etkinlik, yasa dışı faaliyetleri, nefret söylemini veya hayvanlara zarar verebilecek uygulamaları teşvik ediyor mu?"
            - "Görseller ve kullanılan dil platformun topluluk kurallarına uygun mu?"
          kullanici_raporlamalarina_gore_acil_inceleme_ve_mudahale_protokolu_aktif_mi: true
        dogrulama_ve_guvenlik_protokolleri_topluluk:
          protokol_aktif_mi: true # Özellikle geniş katılımlı, ücretli veya hassas içerikli etkinlikler için.
          protokol_genel_aciklama_kullanici: "Platformumuzda listelenen topluluk etkinliklerinin güvenilirliğini, kalitesini ve katılımcı güvenliğini sağlamak amacıyla, özellikle geniş katılımlı, ücretli, özel izin gerektiren veya hassas konuları içeren etkinlikler için organizatörlerden ek bilgiler, belgeler veya kimlik/kurum doğrulaması talep edilebilir. Bu, tüm topluluk üyeleri için daha güvenli ve olumlu bir deneyim sağlamayı amaçlar."
          uygulanabilecek_dogrulama_senaryolari_topluluk:
            - senaryo_kodu: "UCRETLI_VEYA_BUYUK_CAPLI_ETKINLIK_ORGANIZATOR_DOGRULAMASI_TOPLULUK"
              senaryo_aciklamasi_kullanici: "Eğer ücretli bir etkinlik düzenliyorsanız, bağış topluyorsanız veya etkinliğiniz geniş bir katılım (örn: 50+ kişi) hedefliyorsa, organizatör olarak kimliğinizi (bireysel ise) veya kurumunuzu (tüzel kişilik ise) doğrulamanız ve etkinliğin meşruiyetini kanıtlamanız istenebilir."
              talep_edilebilecek_bilgiler_kullanici_listesi_detayli:
                - "Organizatörün tam adı/soyadı veya kurumun resmi adı ve iletişim bilgileri (doğrulanabilir telefon, e-posta)."
                - "Kurumsal etkinlikler için: Vergi levhası, dernek/vakıf tüzüğü veya resmi kurum belgesi örneği."
                - "Varsa, etkinlikle ilgili resmi web sitesi, geçmiş etkinlik referansları veya sosyal medya hesap linkleri."
                - "Ücretli etkinlikler için: Bilet satış platformu linki veya ücret toplama yönteminin şeffaf açıklaması."
              onemi: "KOSULLU_ZORUNLU_GÜVEN_VE_ŞEFFAFLIK_İÇİN"
              moderator_kontrol_rehberi_detayli: "Organizatörün ve etkinliğin meşruiyeti, geçmişi (varsa) ve güvenilirliği teyit edilmelidir. Özellikle para toplama içeren etkinliklerde, amacın ve fonların kullanımının netliği önemlidir. Şüpheli durumlarda ek araştırma yapılmalı veya ilan reddedilmelidir."
  
            - senaryo_kodu: "ETKINLIK_YERI_VE_IZIN_DOGRULAMASI_OZEL_DURUMLAR_TOPLULUK"
              senaryo_aciklamasi_kullanici: "Etkinliğiniz kamuya açık bir alanda (park, meydan vb.) yapılıyorsa, özel bir mekanda (otel, konferans salonu) düzenleniyorsa veya yasal izinler (belediye izni, valilik onayı vb.) gerektiriyorsa, bu izinlere sahip olduğunuzu veya mekanla anlaşmanız olduğunu gösteren belgeler sunmanız talep edilebilir."
              onemi: "NADİREN_TALEP_EDILIR_RISK_ANALIZINE_VE_SIKAYETE_GORE"
              moderator_kontrol_rehberi_detayli: "Özellikle büyük çaplı veya potansiyel olarak kamu düzenini etkileyebilecek etkinliklerde, şikayet veya şüphe durumunda, etkinliğin yasalara, yerel yönetmeliklere ve mekan kurallarına uygunluğu araştırılmalıdır. Gerekirse organizatörden resmi izin belgeleri istenmelidir."
      veri_yapilandirma_ve_dis_ai_optimizasyonu_topluluk:
        semantik_icerik_ve_seo_ayarlari:
          akilli_ilan_asistani_icerik_onerileri:
            - { hedef_form_alani_kodu: "ETKINLIK_ADI_TOPLULUK", oneri_basligi_kullanici: "Etkinliğinize Dikkat Çekici ve Açıklayıcı Bir Ad Verin!", oneri_detayi_kullanici: "Etkinliğinizin ana temasını, türünü ve mümkünse hedef kitlesini veya yerini yansıtan, merak uyandıran ve kolay hatırlanır bir ad seçin. Anahtar kelimeler (örn: 'Barınak Gönüllüleri Buluşması', 'Online Kedi Bakım Semineri', 'Ankara Köpek Parkı Tanışma Günü') kullanmak, ilanınızın ilgili kişiler tarafından daha kolay bulunmasını sağlar.", neden_onemli_aciklamasi_kullanici: "Doğru bir ad, etkinliğinizin arama sonuçlarında ve platform içi listelemelerde öne çıkmasına yardımcı olur.", iyi_ornek_metni_kullanici: "Örn: 'Minik Patilerle Bahar Şenliği ve Mama Bağış Kampanyası' veya 'Uzman Veteriner Hekim ile Online Köpek Sağlığı Soru-Cevap Etkinliği'", ipucu_tipi: "IYILESTIRME_ONERISI_ONEMLI", ideal_uzunluk_max: 100 }
            - { hedef_form_alani_kodu: "ETKINLIK_ACIKLAMASI_DETAYLI_TOPLULUK", oneri_basligi_kullanici: "Etkinliğinizin Tüm Detaylarını ve Cazibesini Anlatın!", oneri_detayi_kullanici: "Etkinlikte neler yapılacak (program akışı), kimler konuşmacı olacak, hangi konular ele alınacak? Katılımcıları neler bekliyor, etkinlikten ne gibi faydalar veya deneyimler elde edecekler? Katılım şartları (ücret, kayıt, yaş sınırı, özel ekipman vb.) nelerdir? Ulaşım, konaklama (gerekirse), yiyecek-içecek imkanları hakkında bilgi verin. Etkinliğin amacını ve topluluğa katkısını vurgulayın.", neden_onemli_aciklamasi_kullanici: "Kapsamlı ve çekici bir açıklama, potansiyel katılımcıların ilgisini çeker, soru işaretlerini giderir ve katılım kararını olumlu etkiler.", alt_oneri_maddeleri: ["Etkinlik programını saatleriyle birlikte (mümkünse) belirtin.", "Hedef kitlenizi ve kimler için daha uygun olduğunu açıklayın.", "Etkinliğin online mı, fiziksel mi, hibrit mi olacağını netleştirin.", "Fiziksel etkinlikler için mekanın erişilebilirliğini ve olanaklarını (otopark, engelli erişimi vb.) belirtin.", "Varsa, sponsorlar veya destekleyen kurumlar hakkında bilgi verin.", "Etkileyici görseller veya kısa bir tanıtım videosu eklemeyi düşünün."], ipucu_tipi: "BILGILENDIRME_KAPSAMLI_VE_IKNA_EDICI" }
            - { hedef_form_alani_kodu: "ETKINLIK_KATILIM_CAGRISI_TOPLULUK", oneri_basligi_kullanici: "Katılımcıları Harekete Geçirin: Net Bir Çağrı Yapın!", oneri_detayi_kullanici: "İlanınızın sonunda, potansiyel katılımcıları etkinliğe kayıt olmaya, bilet almaya, daha fazla bilgi talep etmeye veya etkinliği sosyal medyada paylaşmaya teşvik eden açık, net ve motive edici bir çağrı mesajı (Call to Action) ekleyin. 'Hemen Kaydolun, Kontenjan Sınırlı!', 'Bu Eşsiz Deneyimi Kaçırmayın, Yerinizi Ayırtın!', 'Detaylı Bilgi ve Kayıt İçin Web Sitemizi Ziyaret Edin:', 'Etkinliğimizi Paylaşarak Daha Fazla Hayvansevere Ulaşmamıza Yardımcı Olun!' gibi.", neden_onemli_aciklamasi_kullanici: "Güçlü bir eylem çağrısı, kullanıcıların ilgisini somut bir adıma dönüştürme olasılığını artırır.", ipucu_tipi: "PAZARLAMA_ODAKLI_ONERI" }
          semantik_zenginlik_onemi_katsayisi: 0.7
        yapilandirilmis_veri_ve_meta_etiket_stratejileri:
          kullanilacak_schema_org_tipleri:
            - schema_tipi: "Event" # Genel etkinlik tipi
              # Alt tiplerden biri daha uygun olabilir: SocialEvent, EducationEvent, Festival, BusinessEvent (eğer bir kurum düzenliyorsa), Hackathon (eğer bir fikir maratonu ise) vb.
              # Platform, etkinlik tipine göre dinamik olarak en uygun schema.org alt tipini seçebilir.
              alan_eslestirmeleri:
                - { schema_alani: "name", platform_alani_kaynagi: "ilan.etkinlik_adi_topluluk_schema_icin" }
                - { schema_alani: "description", platform_alani_kaynagi: "ilan.etkinlik_aciklamasi_topluluk_uzun_schema_icin" }
                - { schema_alani: "startDate", platform_alani_kaynagi: "ilan.etkinlik_tarihi_baslangic_topluluk_iso" }
                - { schema_alani: "endDate", platform_alani_kaynagi: "ilan.etkinlik_tarihi_bitis_topluluk_iso_opsiyonel" }
                - { schema_alani: "eventAttendanceMode", platform_alani_kaynagi: "ilan.etkinlik_formati_topluluk_schema_uyumlu" } # (OfflineEventAttendanceMode, OnlineEventAttendanceMode, MixedEventAttendanceMode)
                - { schema_alani: "eventStatus", platform_alani_kaynagi: "ilan.etkinlik_durumu_topluluk_schema_uyumlu" } # (EventScheduled, EventCancelled, EventPostponed, EventRescheduled)
                - { schema_alani: "location", platform_alani_kaynagi: "ilan.etkinlik_yeri_topluluk_schema_place_veya_virtual_objesi", schema_alt_tip_dinamik: true } # Place veya VirtualLocation
                - { schema_alani: "image", platform_alani_kaynagi: "ilan.etkinlik_ana_gorseli_url_topluluk_schema_icin" }
                - { schema_alani: "organizer", platform_alani_kaynagi: "ilan.organizator_bilgisi_topluluk_schema_person_veya_organization_objesi", schema_alt_tip_dinamik: true } # Person veya Organization
                - { schema_alani: "performer", platform_alani_kaynagi: "ilan.etkinlik_konusmacilari_veya_katilimcilari_schema_listesi_opsiyonel", schema_alt_tip_dinamik: true } # Person veya Organization (konuşmacılar için)
                - { schema_alani: "offers", platform_alani_kaynagi: "ilan.etkinlik_ucret_ve_kayit_bilgisi_schema_offer_objesi_opsiyonel", schema_alt_tip: "Offer" } # Ücret, bilet linki vb.
                - { schema_alani: "audience", platform_alani_kaynagi: "ilan.hedef_kitle_topluluk_schema_audience_objesi_opsiyonel", schema_alt_tip: "Audience" }
                - { schema_alani: "keywords", platform_alani_kaynagi: "ilan.etkinlik_ana_temasi_etiketler_topluluk_virgulle_ayrilmis" }
                - { schema_alani: "url", platform_alani_kaynagi: "ilan.etkinlik_platform_url_canonical_topluluk" }
          ozel_meta_etiketler_topluluk:
            - { etiket_adi: "petplatform:event_main_theme", icerik_kaynagi: "ilan.etkinlik_tipi_topluluk_ana_kategori_metin" } # (Eğitim, Sosyal, Gönüllülük vb.)
            - { etiket_adi: "petplatform:event_target_pet_type", icerik_kaynagi: "ilan.hedef_kitle_hayvan_turu_topluluk_virgulle_ayrilmis_liste" }
            - { etiket_adi: "petplatform:event_is_online", icerik_kaynagi: "ilan.etkinlik_formati_online_mi_boolean" }
            - { etiket_adi: "petplatform:event_city", icerik_kaynagi: "ilan.etkinlik_yeri_sehir_topluluk_metin_fizikselse" }
            - { etiket_adi: "petplatform:event_requires_registration", icerik_kaynagi: "ilan.kayit_gerekli_mi_boolean" }
            - { etiket_adi: "petplatform:event_organizer_type", icerik_kaynagi: "ilan.organizator_tipi_topluluk_metin" } # (Bireysel, Dernek, Şirket vb.)
        harici_platform_ve_api_entegrasyon_hazirligi:
          otomatik_sosyal_medya_paylasimi_ve_takvim_entegrasyonu_kullanici_secenekleri_aktif_mi: true # Facebook Etkinlikleri, Google Calendar'a ekleme.
          yerel_etkinlik_siteleri_ve_topluluk_gruplari_ile_veri_paylasimi_protokolleri_arastiriliyor_mu: true # (Meetup.com, Eventbrite gibi yerlere API ile gönderim - Gelecek hedefi)
          gorsel_erisimi_ve_optimizasyonu_harici_sistemler_icin_topluluk:
            gorsel_alt_metin_stratejisi_topluluk: "ETKINLIK_ADI_TARIH_SEHIR_PETPLATFORM_TOPLULUK_ETKINLIGI"
            # Örn: "Minik Patilerle Bahar Şenliği 15-Mayıs-2025 İstanbul PetPlatform Topluluk Etkinliği"
            etkinlik_afisleri_icin_onerilen_boyut_ve_format_rehberi_sunulur_mu: true
        icerik_kalitesi_ve_guvenilirlik_sinyalleri_harici_sistemler_icin_topluluk:
          etkinlik_katilimci_degerlendirme_ve_yorum_sayisi_meta: "petplatform:event_attendee_rating_count_topluluk" # (Geçmiş etkinlikler için)
          organizator_guvenilirlik_skoru_platform_ici_meta: "petplatform:event_organizer_trust_score_topluluk" # (Platform içi bir skorlama olabilir)
          etkinlik_iptal_veya_degisiklik_gecmisi_meta: "petplatform:event_modification_history_flag_topluluk" # (SIK_DEGISTI, STABIL vb.)
      istatistikler:
        beklenen_performans_metrikleri:
          - "Ortalama ilan görüntülenme: Orta-Yüksek (Etkinliğin türüne, konumuna ve tanıtımına bağlı olarak değişkenlik gösterir)"
          - "Katılım ve kayıt oranı hedefi: İlan edilen kontenjana ve etkinliğin çekiciliğine göre %30-70 arası"
          - "Topluluk içi etkileşim, ağ oluşturma ve bilgi paylaşımı potansiyeli: Yüksek"
          - "Platformun sosyal, eğitici ve birleştirici yönünü güçlendirir; kullanıcı bağlılığını artırır."
          - "Başarılı ve iyi organize edilmiş etkinlikler, platformun genel itibarına olumlu katkı sağlar."
          - "Hayvan refahı konusunda farkındalık yaratma ve gönüllülüğü teşvik etme potansiyeli: Yüksek"
     destek_hizmeti:
      id: "cat_ucretsiz_destekhizmeti"
      temel_kimlik:
        ad: "Gönüllü Destek Hizmetleri (Ücretsiz)"
        slug: "gonullu-destek-hizmetleri-ucretsiz"
        aciklama: "Hayvanseverlerin birbirlerine ücretsiz olarak sunduğu destekler: geçici bakım (acil olmayan), köpek gezdirme, deneyim paylaşımı, basit bakım yardımı vb."
        gorsel_kimlik: { renk_kodu: "#FDBA74", tema_notu: "Açık Turuncu (Yardımlaşma ve Dostluk)", ikon_adi: "fas fa-hands-helping", emoji: "🤝" }
      kategori_tipi: "ucretsiz"
      arama_sistemi:
        alternatif_kelimeler: ["gönüllü pet sitter", "ücretsiz köpek gezdirme", "deneyim paylaşımı (hayvan)", "komşu yardımı (pet)", "karşılıksız hayvan bakımı", "gönüllü geçici yuva (kısa süreli)", "hayvansever dayanışması", "ücretsiz danışmanlık (deneyimli sahip)", "acil olmayan bakım yardımı", "mama paylaşımı", "oyuncak değişimi", "hayvansever ağı", "yardım eli uzat", "gönüllü refakatçi (veteriner ziyareti)", "paylaşım ekonomisi (pet)", "iyilik hareketi", "gönüllü nakil (kısa mesafe)", "bilgi aktarımı", "manevi destek"]
        ai_intent_keywords: ["gönüllü hayvan bakımı", "ücretsiz pet destek", "hayvansever yardımı", "geçici yuva gönüllüsü"]
        semantic_tags: ["volunteer_pet_care", "free_support_pets", "animal_lover_network", "community_help_pets", "temporary_foster_volunteer"]
      akilli_filtreler:
        ozel_filtre_alanlari:
          - { alan_adi: "destek_tipi_gonullu", label: "Sunulan Destek Tipi", tip: "select", secenekler: ["Geçici Bakım (Evde)", "Köpek Gezdirme", "Kedi/Diğer Hayvan Ev Ziyareti (Besleme/Oyun)", "Deneyim/Bilgi Paylaşımı", "Basit Tıbbi Olmayan Bakım Yardımı (yaşlı/hasta hayvan için)", "Malzeme Paylaşımı (mama, oyuncak)"], ai_importance: 0.9, zorunlu: true }
          - { alan_adi: "destek_sunulan_hayvan_turu_gonullu", label: "Destek Sunulan Hayvan Türü/Türleri", tip: "multiselect", secenekler: ["Köpek", "Kedi", "Kuş", "Kemirgen", "Diğer"], ai_importance: 0.8, zorunlu: true }
          # ... (GitHub dosyasındaki diğer DESTEK HİZMETİ filtreleri buraya eklenecek, yukarıdaki formatta) ...
      platform_ayarlari_destek_hizmeti: # Anahtar ismini kategoriye özel hale getirdik
        ilan_yasam_dongusu_ayarlari:
          varsayilan_politika: "SURELI_KULLANICI_GUNCELLEME_TESVIKLI"
          # Açıklama: İlanlar belirli bir süre aktif kalır. Kullanıcı, hizmeti hala sunuyorsa ilanı güncelleyerek veya yeniden yayınlayarak süreyi uzatabilir.
          
          varsayilan_aktif_kalma_suresi_gun: 60
          yenileme_bildirimi_gun_oncesi: 7 # Süre bitmeden kaç gün önce "Hizmetinizi hala sunuyor musunuz?" hatırlatması.
          maksimum_yenileme_sayisi: -1 # Sınırsız yenileme (kullanıcı aktif olduğu sürece)
          uzun_sure_guncellenmeyen_ilan_aksiyonu: "ILANI_PASIFE_AL_VE_KULLANICIYI_BILGILENDIR"

        operasyonel_onceliklendirme_ve_gorunurluk:
          oncelik_katsayisi_platform_ici: 1.0 # (1.0: Normal, 3.0: En Yüksek Öncelik)
          # Bu kategori genellikle aciliyet taşımaz, ancak güvenilir ve aktif gönüllülerin öne çıkarılması düşünülebilir.
          aktif_ve_guvenilir_gonullu_rozet_sistemi_aktif_mi: true # (Platform geçmişi, tamamlanan destekler, pozitif geri bildirimlere dayalı)

        moderasyon_ayarlari:
          seviye: "ORTA_YUKSEK_GUVEN_ODAKLI_INCELEME"
          # Açıklama: Gönüllü destek hizmetlerinde güven esastır. İlanlar, özellikle geçici bakım gibi hassas hizmetler için dikkatle incelenmelidir.
          yeni_ilan_varsayilan_durum: "INCELEMEDE_GUVENLIK_KONTROLU"
          # Diğer seçenekler: "YAYINDA_ILK_KONTROL_SONRASI"
          hizmet_tanimi_netlik_ve_gerceklik_kontrolu_aktif_mi: true
          yaniltici_veya_ticari_amac_suphesi_icin_otomatik_isaretleme_kurallari:
            - kural_kodu: "UCRET_TALEBI_IMA_EDEN_IFADELER"
              aciklama: "Ücretsiz kategoride ücret talep eden veya ima eden ilanları işaretle."
            - kural_kodu: "PROFESYONEL_HIZMET_GORUNUMU_VEREN_YAPAY_ILANLAR"
              aciklama: "Gönüllülük dışı, ticari bir hizmet gibi sunulan ilanları işaretle."

        dogrulama_ve_guvenlik_protokolleri:
          protokol_aktif_mi: true # Özellikle güven gerektiren hizmetler için.
          protokol_genel_aciklama_kullanici: "Gönüllü destek hizmetlerinin güvenilirliğini ve kalitesini sağlamak, hem hizmet sunan gönüllülerimizin hem de hizmet alanların güvenliğini korumak amacıyla platformumuz bazı doğrulama adımları ve ek bilgiler talep edebilir. Amacımız, güvene dayalı bir yardımlaşma ortamı oluşturmaktır."
          
          uygulanabilecek_dogrulama_senaryolari:
            - senaryo_kodu: "GECICI_BAKIM_GONULLUSU_DOGRULAMASI"
              senaryo_aciklamasi_kullanici: "Eğer evinizde geçici bakım (foster) hizmeti sunmayı teklif ediyorsanız, hayvanın güvenli ve uygun bir ortamda bakılacağını teyit etmek amacıyla bazı bilgiler ve görseller talep edilebilir."
              talep_edilebilecek_bilgiler_kullanici_listesi:
                - "Kimlik bilgileri (isim, soyisim - platformda gizli tutulur, sadece doğrulama için)."
                - "Hayvanın misafir edileceği evin/odanın genel durumunu gösteren net fotoğraflar veya kısa bir video (temizlik, güvenlik, hayvan için ayrılan alan vb.)."
                - "Varsa, daha önceki geçici bakım deneyimleriniz hakkında kısa bilgi veya referans (isteğe bağlı)."
                - "Evde başka hayvan veya çocuk varsa, bu durum hakkında bilgi."
              onemi: "YUKSEK_ONCELIKLI_DOGRULAMA_GEREKLI"
              moderator_kontrol_rehberi: "Sunulan görsellerin gerçekliği, ortamın hayvan refahına uygunluğu (temizlik, güvenlik, havalandırma, tehlikeli madde olmaması) dikkatle incelenmelidir. Gönüllünün profilindeki diğer bilgilerle (eğer varsa) tutarlılık kontrol edilmelidir."

            - senaryo_kodu: "DENEYIM_PAYLASIMI_VE_DANISMANLIK_GONULLUSU_ITIBAR_KONTROLU"
              senaryo_aciklamasi_kullanici: "Eğer hayvan bakımı, eğitimi veya sağlığı konularında deneyimlerinizi paylaşmayı veya danışmanlık vermeyi teklif ediyorsanız, platformdaki genel aktiviteniz, varsa daha önceki olumlu etkileşimleriniz ve profilinizdeki bilgiler, güvenilirliğinizin bir göstergesi olarak değerlendirilebilir."
              onemi: "PLATFORM_ICI_ITIBAR_VE_AKTIVITE_DEGERLENDIRMESI"
              moderator_kontrol_rehberi: "Kullanıcının platformdaki geçmiş yorumları, verdiği/aldığı destekler, profil tamamlama oranı gibi faktörler göz önünde bulundurulabilir. Tıbbi tavsiye niteliğinde kesin ifadelerden kaçınılması konusunda kullanıcılar uyarılmalıdır."

            - senaryo_kodu: "KIMLIK_DOGRULAMA_GENEL_GUVENLIK_ICIN"
              senaryo_aciklamasi_kullanici: "Tüm gönüllü destek hizmeti sunan kullanıcılarımızdan, platform güvenliğini artırmak amacıyla temel kimlik doğrulaması (örn: e-posta, telefon SMS onayı) talep edilebilir."
              onemi: "TEMEL_GÜVENLİK_ADIMI"

      veri_yapilandirma_ve_dis_ai_optimizasyonu_destek_hizmeti:
        semantik_icerik_ve_seo_ayarlari:
          # Gönüllü destek hizmeti ilanlarında kullanıcıyı yönlendirecek temel içerik önerileri.
          akilli_ilan_asistani_icerik_onerileri:
            - hedef_form_alani_kodu: "HIZMET_BASLIGI_DESTEK" # Formda böyle bir alan olmalı
              oneri_basligi_kullanici: "Sunduğunuz Desteği Net Bir Başlıkla İfade Edin"
              oneri_detayi_kullanici: "Ne tür bir gönüllü destek sunduğunuzu (örn: 'Ücretsiz Kısa Süreli Kedi Bakımı', 'Deneyimli Köpek Gezdirme Gönüllüsü', 'Yavru Hayvan Bakım Danışmanlığı') ve ideal olarak hangi bölgede (şehir/ilçe) hizmet verebileceğinizi başlıkta belirtin."
              neden_onemli_aciklamasi_kullanici: "Net bir başlık, doğru kişilerin ilanınızı bulmasına ve ne bekleyeceğini anlamasına yardımcı olur."
              iyi_ornek_metni_kullanici: "Örn: 'Kadıköy'de Ücretsiz Tatil Dönemi Kedi Bakımı (Evde)' veya 'Ankara - Emekli Öğretmenden Köpek Gezdirme Desteği'"
              ipucu_tipi: "IYILESTIRME_ONERISI"

            - hedef_form_alani_kodu: "HIZMET_ACIKLAMASI_DETAY_DESTEK" # Formda böyle bir alan olmalı
              oneri_basligi_kullanici: "Desteğinizin Kapsamını ve Koşullarını Açıklayın"
              oneri_detayi_kullanici: "Hangi hayvan türlerine destek verebilirsiniz? Ne kadar süreyle? Hangi koşullarda (örn: kendi evinizde mi, hayvanın evinde mi)? Varsa özel uzmanlık alanlarınız veya deneyimleriniz nelerdir? Beklentilerinizi ve sunabileceğiniz hizmetin sınırlarını net bir şekilde ifade edin."
              neden_onemli_aciklamasi_kullanici: "Açık ve dürüst bilgi, yanlış anlaşılmaları önler ve güven oluşturur."
              alt_oneri_maddeleri:
                - "Destek verebileceğiniz gün ve saat aralıklarını belirtin."
                - "Ulaşım imkanlarınızdan bahsedin (eğer gerekliyse)."
                - "Kabul edemeyeceğiniz durumları (örn: 'Agresif hayvanlara bakamam') nazikçe ifade edin."
                - "Bu hizmeti neden gönüllü olarak sunduğunuzu kısaca anlatmak, samimiyetinizi artırabilir."
              ipucu_tipi: "BILGILENDIRME"

            - hedef_form_alani_kodu: "GONULLU_PROFIL_REFERANSI_DESTEK" # (Profil bağlantısı veya özet)
              oneri_basligi_kullanici: "Güven Oluşturmak İçin Kendinizi Tanıtın"
              oneri_detayi_kullanici: "Profilinizi eksiksiz doldurmanız, varsa platformdaki diğer olumlu etkileşimleriniz ve hayvanlarla ilgili genel deneyiminiz, hizmet arayan kişilerin size güvenmesine yardımcı olur. İlanınızda profilinize atıfta bulunabilirsiniz."
              neden_onemli_aciklamasi_kullanici: "Gönüllü hizmetlerde karşılıklı güven çok önemlidir."
              ipucu_tipi: "IYILESTIRME_ONERISI"

          semantik_zenginlik_onemi_katsayisi: 0.75

        yapilandirilmis_veri_ve_meta_etiket_stratejileri:
          # Gönüllü destek hizmetleri için Schema.org'da "Service" ana tipi ve "provider" (sağlayıcı), "serviceType" (hizmet türü) gibi alanlar kullanılabilir.
          kullanilacak_schema_org_tipleri:
            - schema_tipi: "Service"
              alan_eslestirmeleri:
                - schema_alani: "name" # Hizmetin adı/başlığı
                  platform_alani_kaynagi: "ilan.hizmet_basligi_destek"
                - schema_alani: "description" # Hizmetin detaylı açıklaması
                  platform_alani_kaynagi: "ilan.hizmet_aciklamasi_detay_destek_uzun"
                - schema_alani: "serviceType" # Sunulan destek tipi
                  platform_alani_kaynagi: "ilan.destek_tipi_gonullu_metin"
                - schema_alani: "provider" # Hizmeti sunan gönüllü (Person)
                  platform_alani_kaynagi: "ilan.gonullu_kullanici_profil_schema" # Kullanıcı profili verilerinden
                  schema_alt_tipi: "Person"
                - schema_alani: "areaServed" # Hizmet verilen bölge
                  platform_alani_kaynagi: "ilan.hizmet_bolgesi_yapilandirilmis_destek"
                  schema_alt_tipi: "Place" # veya "AdministrativeArea"
                - schema_alani: "is 비슷한By" # Benzer hizmet (varsa, platform içi kategorilendirme)
                  platform_alani_kaynagi: "ilan.ana_kategori_slug" # Yani "gonullu-destek-hizmetleri-ucretsiz"
                - schema_alani: "termsOfService" # Hizmet koşulları (kullanıcının belirttiği)
                  platform_alani_kaynagi: "ilan.hizmet_kosullari_destek_metin"
          
          ozel_meta_etiketler_destek_hizmeti:
            - etiket_adi: "petplatform:service_category_dh"
              sabit_deger: "Gönüllü Destek Hizmeti"
            - etiket_adi: "petplatform:support_type_dh"
              icerik_kaynagi: "ilan.destek_tipi_gonullu_metin"
            - etiket_adi: "petplatform:volunteer_experience_level_dh" # (Self-declared veya platform tarafından atanmış)
              icerik_kaynagi: "ilan.gonullu_deneyim_seviyesi_metin"
            - etiket_adi: "petplatform:availability_dh" # (Örn: "Hafta Sonları", "Esnek")
              icerik_kaynagi: "ilan.musaitlik_durumu_destek_metin"

        harici_platform_ve_api_entegrasyon_hazirligi:
          # Bu kategori için harici entegrasyon ihtiyacı daha düşük olabilir, ancak API ile listeleme faydalı olabilir.
          veri_paylasim_formatlari_destegi:
            - format_adi: "JSON_API_Destek_Hizmetleri"
              aktif_mi: true
              aciklama: "Platformdaki gönüllü destek hizmetlerini listeleyen API."
          
          gorsel_erisimi_ve_optimizasyonu_harici_sistemler_icin:
            # Genellikle bu kategoride "hayvan görseli" olmaz, "hizmet ortamı" veya "gönüllü profil resmi" olabilir.
            gorsel_alt_metin_stratejisi: "DURUMA_OZEL_DEGISKEN_DESTEK"
            # Örn: Geçici bakım için: "Gönüllü [Kullanıcı Adı]'nın Geçici Bakım Ortamı"

        icerik_kalitesi_ve_guvenilirlik_sinyalleri_harici_sistemler_icin:
          gonullu_dogrulama_durumu_meta_etiketi: "petplatform:volunteer_verification_status_dh"
          # Değerler: "KIMLIK_DOGRULANDI", "ORTAM_KONTROLU_YAPILDI", "TEMEL_DOGRULAMA"
          kullanici_geri_bildirim_puani_meta_etiketi_dh: "petplatform:volunteer_rating_dh" # Eğer bir geri bildirim sistemi varsa

      istatistikler:
        beklenen_performans_metrikleri:
          - "Ortalama ilan görüntülenme: Orta (ihtiyaca göre)"
          - "Başarılı eşleşme/yardım oranı hedefi: %60"
          - "Topluluk içi güven ve dayanışma artışı: Çok Yüksek"
          - "Platformun 'sevgi' ve 'yardımlaşma' misyonunu pekiştirir."

    bilgi_egitim:
      id: "cat_ucretsiz_bilgiegıtım" # Orijinaldeki egitim
      temel_kimlik:
        ad: "Bilgi Paylaşımı ve Eğitim (Ücretsiz Kaynaklar)"
        slug: "bilgi-paylasimi-egitim-ucretsiz-kaynaklar"
        aciklama: "Hayvan bakımı, sağlığı, davranışı, eğitimi ve hakları konularında ücretsiz bilgi notları, rehberler, makaleler, faydalı linkler ve deneyimlerin paylaşıldığı bölüm."
        gorsel_kimlik: { renk_kodu: "#93C5FD", tema_notu: "Açık Mavi (Bilgi ve Huzur)", ikon_adi: "fas fa-book-open-reader", alternatif_ikonlar: "fas fa-graduation-cap", emoji: "📚" }
      kategori_tipi: "ucretsiz"
      arama_sistemi:
        alternatif_kelimeler: ["hayvan bakımı rehberi", "köpek eğitimi ipuçları", "kedi sağlığı bilgileri", "pet davranış sorunları", "hayvan hakları", "ücretsiz pet eğitimi", "doğru mama seçimi", "yavru hayvan bakımı", "yaşlı hayvan bakımı", "pozitif eğitim metotları", "türlere özel bakım", "ilk yardım (hayvan)", "faydalı makaleler (pet)", "uzman görüşleri (özet)", "eğitici videolar (link)", "soru-cevap (deneyim)", "yerel veteriner listesi (tavsiye)", "güvenilir kaynaklar", "bilinçli hayvan sahipliği"]
        ai_intent_keywords: ["hayvan bakımı öğren", "pet eğitimi kaynakları", "hayvan sağlığı bilgisi", "ücretsiz evcil hayvan rehberi"]
        semantic_tags: ["pet_care_guide", "animal_training_tips", "pet_health_information", "animal_behavior", "animal_rights_education", "free_pet_resources"]
      akilli_filtreler:
        ozel_filtre_alanlari:
          - { alan_adi: "bilgi_kategorisi_ana_be", label: "Bilgi Ana Kategorisi", tip: "select", secenekler: ["Bakım", "Sağlık", "Davranış/Eğitim", "Beslenme", "Hayvan Hakları/Yasalar", "Irk Bilgileri", "Genel Bilgiler", "Ekipman/Malzeme Önerileri"], ai_importance: 0.9, zorunlu: true }
          - { alan_adi: "hedef_hayvan_turu_be", label: "Hedef Hayvan Türü", tip: "multiselect", secenekler: ["Köpek", "Kedi", "Kuş", "Kemirgen", "Sürüngen", "Balık", "Tüm Hayvanlar"], ai_importance: 0.8, zorunlu: false }
          - { alan_adi: "icerik_formati_be", label: "İçerik Formatı", tip: "select", secenekler: ["Makale/Yazı", "Rehber/Kontrol Listesi", "Video Linki", "Podcast Linki", "İnfografik Linki", "Soru-Cevap Başlığı", "Deneyim Paylaşımı"], ai_importance: 0.7, zorunlu: true }
          # ... (GitHub dosyasındaki diğer BİLGİ/EĞİTİM filtreleri buraya eklenecek, yukarıdaki formatta) ...
      platform_ayarlari_bilgi_egitim: # Anahtar ismini kategoriye özel hale getirdik
        ilan_yasam_dongusu_ayarlari:
          varsayilan_politika: "SURESIZ_PERIYODIK_GUNCELLEME_TESVIKLI"
          # Açıklama: Bilgi içerikleri genellikle zamanla eskir. İçerikler süresiz yayında kalabilir,
          # ancak kullanıcılardan belirli aralıklarla içeriklerini gözden geçirmeleri ve güncelliğini teyit etmeleri istenir.
          
          icerik_gozden_gecirme_hatirlatma_periyodu_ay: 6 # Kaç ayda bir "İçeriğiniz hala güncel mi?" hatırlatması.
          uzun_sure_gozden_gecirilmeyen_icerik_aksiyonu: "ICERIGI_ARSIVLE_VE_KULLANICIYI_BILGILENDIR_GUNCELLEME_SECENEGI_SUN"
          topluluk_tarafindan_guncel_olmayan_icerik_isaretleme_mekanizmasi_aktif_mi: true # Kullanıcılar "Bu bilgi güncel değil" diye işaretleyebilir.

        operasyonel_onceliklendirme_ve_gorunurluk:
          oncelik_katsayisi_platform_ici: 0.8 # (1.0: Normal, 3.0: En Yüksek Öncelik)
          # Faydalı ve popüler içeriklerin öne çıkarılması için mekanizmalar:
          en_cok_okunan_ve_faydali_bulunan_icerikleri_one_cikarma_aktif_mi: true
          # (Örn: Anasayfada "Popüler Bilgiler" bölümü, kategori listelemelerinde üst sıralar)
          icerik_kalite_puanlamasi_sistemi_aktif_mi: false # (Gelecekte eklenebilir: Okunabilirlik, kaynak gösterimi, güncellik vb. göre)

        moderasyon_ayarlari:
          seviye: "ORTA_KAYNAK_VE_DOGRULUK_ODAKLI_KONTROL"
          # Açıklama: Özellikle sağlık, beslenme ve yasal konularda paylaşılan bilgilerin doğruluğu ve kaynağı önemlidir.
          # Yanıltıcı veya zararlı olabilecek bilgiler engellenmelidir.
          yeni_ilan_varsayilan_durum: "INCELEMEDE_YAYIN_ONAYI_BEKLIYOR"
          uzman_olmayan_kisilerin_kesin_tibbi_veya_yasal_tavsiye_vermesini_engelleme_politikasi:
            aktif_mi: true
            uyari_metni_kullanici_arayuzu: "Lütfen unutmayın, bu platformdaki bilgiler genel bilgilendirme amaçlıdır ve profesyonel veteriner hekim veya hukuk danışmanlığı yerine geçmez. Özellikle sağlık ve yasal konularda kendi uzmanınıza danışmanız önemlidir."
            moderator_kontrol_kriteri: "İçerik, 'kesin teşhis/tedavi' veya 'yasal olarak bağlayıcı' gibi ifadeler içeriyorsa ve kaynak/uzmanlık belirtilmemişse işaretlenir."
          kaynak_gosterme_tesviki_ve_kontrolu:
            tesvik_aktif_mi: true
            tesvik_metni_kullanici_arayuzu: "Bilgilerinizin güvenilirliğini artırmak için, eğer varsa, faydalandığınız kaynakları (makale linki, kitap adı vb.) belirtmeniz önerilir."
            moderator_kontrol_kriteri: "Özellikle bilimsel veya teknik konularda kaynak belirtilmemişse, kullanıcıya kaynak eklemesi için nazikçe hatırlatma yapılabilir."

        dogrulama_ve_guvenlik_protokolleri:
          protokol_aktif_mi: true # Özellikle hassas bilgi paylaşımları için.
          protokol_genel_aciklama_kullanici: "Platformumuzda paylaşılan bilgilerin doğruluğu ve topluluğumuz için faydalı olması en büyük önceliğimizdir. Bu nedenle, özellikle sağlık, beslenme ve yasal gibi hassas konularda paylaşılan içeriklerin kaynağı ve güvenilirliği konusunda ek bilgiler talep edilebilir veya editöryal bir gözden geçirme yapılabilir."
          
          uygulanabilecek_dogrulama_senaryolari:
            - senaryo_kodu: "TIBBI_ICERIK_KAYNAK_DOGRULAMASI"
              senaryo_aciklamasi_kullanici: "Hayvan sağlığı, hastalıkları veya tedavileri hakkında detaylı bilgi paylaşıyorsanız, bu bilgilerin bilimsel bir temele dayandığını veya güvenilir bir kaynaktan alındığını (varsa kaynak belirterek) göstermeniz beklenir."
              onemi: "YUKSEK_ONCELIKLI_KONTROL"
              moderator_kontrol_rehberi: "İçeriğin genel kabul görmüş veterinerlik bilgileriyle çelişip çelişmediği, abartılı veya kanıtlanmamış iddialar içerip içermediği kontrol edilmelidir. Kaynak belirtilmişse, kaynağın güvenilirliği (bilimsel yayın, tanınmış kurum vb.) değerlendirilmelidir."

            - senaryo_kodu: "YASAL_BILGILENDIRME_ICERIK_DOGRULAMASI"
              senaryo_aciklamasi_kullanici: "Hayvan hakları, sahiplenme yasaları veya ilgili yasal süreçler hakkında bilgi paylaşıyorsanız, bu bilgilerin güncel ve doğru olduğundan emin olmanız ve mümkünse resmi kaynaklara atıfta bulunmanız önemlidir."
              onemi: "YUKSEK_ONCELIKLI_KONTROL"
              moderator_kontrol_rehberi: "Paylaşılan yasal bilgilerin yanlış yorumlamalara veya hak kayıplarına yol açmaması için dikkatli olunmalıdır. İçerik, 'yasal tavsiye' niteliğinde olmamalı, genel bilgilendirme düzeyinde kalmalıdır."

            - senaryo_kodu: "KULLANICI_UZMANLIK_BEYANI_DEGERLENDIRMESI" # (Eğer kullanıcı profilde uzmanlık belirtiyorsa)
              senaryo_aciklamasi_kullanici: "Eğer profilinizde belirli bir alanda (örn: veteriner teknikerliği, köpek eğitmenliği) uzmanlığınız olduğunu belirttiyseniz, bu kategorideki paylaşımlarınız bu beyanınızla birlikte değerlendirilebilir."
              onemi: "ITIBAR_VE_GUVENILIRLIK_FAKTORU"
              moderator_kontrol_rehberi: "Kullanıcının beyan ettiği uzmanlıkla paylaştığı içeriğin tutarlılığı ve kalitesi gözlemlenir. Yanıltıcı uzmanlık beyanlarına karşı dikkatli olunmalıdır."

      veri_yapilandirma_ve_dis_ai_optimizasyonu_bilgi_egitim:
        semantik_icerik_ve_seo_ayarlari:
          # Bilgi/Eğitim içeriklerinde kullanıcıyı yönlendirecek temel öneriler.
          akilli_ilan_asistani_icerik_onerileri:
            - hedef_form_alani_kodu: "ICERIK_BASLIGI_BE" # Formda böyle bir alan olmalı
              oneri_basligi_kullanici: "Anlaşılır ve İlgi Çekici Bir Başlık Seçin"
              oneri_detayi_kullanici: "Paylaşacağınız bilginin konusunu net bir şekilde ifade eden, okuyucunun ilgisini çekecek ve ne öğreneceğini anlamasını sağlayacak bir başlık kullanın. Anahtar kelimeler eklemek, içeriğinizin bulunabilirliğini artırır."
              neden_onemli_aciklamasi_kullanici: "İyi bir başlık, doğru kitlenin içeriğinize ulaşmasını sağlar ve okunma oranını artırır."
              iyi_ornek_metni_kullanici: "Örn: 'Yavru Kediler İçin Temel Bakım Rehberi' veya 'Köpeklerde Ayrılık Kaygısıyla Başa Çıkma Yolları'"
              ipucu_tipi: "IYILESTIRME_ONERISI"

            - hedef_form_alani_kodu: "ICERIK_METNI_BE" # Formda böyle bir alan olmalı
              oneri_basligi_kullanici: "Bilgiyi Açık, Anlaşılır ve Yapılandırılmış Sunun"
              oneri_detayi_kullanici: "Karmaşık konuları bile basit bir dille anlatmaya çalışın. Kısa paragraflar, madde işaretleri, numaralandırılmış listeler ve (mümkünse) alt başlıklar kullanarak okunabilirliği artırın. Okuyucunun bilgiyi kolayca sindirmesini hedefleyin."
              neden_onemli_aciklamasi_kullanici: "Anlaşılır ve iyi yapılandırılmış içerikler daha çok okunur, daha iyi anlaşılır ve daha fazla paylaşılır."
              alt_oneri_maddeleri:
                - "Hedef kitlenizin bilgi seviyesini göz önünde bulundurun."
                - "Görsel materyallerle (fotoğraf, infografik linki - eğer uygunsa) desteklemeyi düşünün."
                - "Pratik örnekler veya uygulanabilir ipuçları verin."
                - "İçeriğinizin sonunda bir özet veya ana çıkarımları vurgulayın."
              ipucu_tipi: "BILGILENDIRME"

            - hedef_form_alani_kodu: "KAYNAK_BELIRTME_ALANI_BE" # Formda böyle bir alan olmalı (opsiyonel)
              oneri_basligi_kullanici: "Kaynaklarınızı Belirterek Güvenilirliğinizi Artırın"
              oneri_detayi_kullanici: "Eğer paylaştığınız bilgiler belirli bir araştırmaya, uzman görüşüne, kitaba veya makaleye dayanıyorsa, kaynaklarınızı belirtmeniz içeriğinizin güvenilirliğini ve değerini artırır. Bu, özellikle sağlık, beslenme ve davranış gibi konularda önemlidir."
              neden_onemli_aciklamasi_kullanici: "Kaynak göstermek, bilginin doğruluğunu destekler ve okuyuculara daha derin araştırma yapma imkanı sunar."
              ipucu_tipi: "IYILESTIRME_ONERISI_ONEMLI"

          semantik_zenginlik_onemi_katsayisi: 0.6 # Bilginin doğruluğu ve anlaşılırlığı daha öncelikli.

        yapilandirilmis_veri_ve_meta_etiket_stratejileri:
          # Bilgi/Eğitim içerikleri için Schema.org'da "Article", "HowTo", "FAQPage", "EducationalResource", "ScholarlyArticle" gibi tipler kullanılabilir.
          kullanilacak_schema_org_tipleri:
            - schema_tipi: "Article" # Veya "EducationalResource", "HowTo" vb. içeriğe göre seçilir
              alan_eslestirmeleri:
                - schema_alani: "headline" # İçerik başlığı
                  platform_alani_kaynagi: "ilan.icerik_basligi_be"
                - schema_alani: "description" # İçeriğin kısa özeti
                  platform_alani_kaynagi: "ilan.icerik_ozeti_be" # (Otomatik veya manuel girilen)
                - schema_alani: "articleBody" # İçeriğin tam metni
                  platform_alani_kaynagi: "ilan.icerik_metni_be_tam"
                - schema_alani: "author" # Yazar (kullanıcı profili)
                  platform_alani_kaynagi: "ilan.kullanici_profil_schema_be"
                  schema_alt_tipi: "Person"
                - schema_alani: "publisher" # Yayıncı (Platform Adı)
                  sabit_deger_objesi: { "@type": "Organization", "name": "Evcil Hayvan Platformu Adı", "logo": "URL_TO_PLATFORM_LOGO" }
                - schema_alani: "datePublished" # Yayınlanma tarihi
                  platform_alani_kaynagi: "ilan.yayin_tarihi_be_iso"
                - schema_alani: "dateModified" # Son güncellenme tarihi
                  platform_alani_kaynagi: "ilan.guncellenme_tarihi_be_iso"
                - schema_alani: "keywords" # Anahtar kelimeler
                  platform_alani_kaynagi: "ilan.anahtar_kelimeler_be_listesi"
                - schema_alani: "about" # İçeriğin konusu (hayvan türü, konu kategorisi)
                  platform_alani_kaynagi: "ilan.konu_etiketleri_schema_be" # Örn: [{ "@type": "Thing", "name": "Köpek Bakımı" }]
                - schema_alani: "educationalLevel" # (Eğer uygunsa)
                  platform_alani_kaynagi: "ilan.egitim_seviyesi_be_metin" # Örn: "Başlangıç", "Orta Düzey"
                - schema_alani: "learningResourceType" # (Eğer uygunsa)
                  platform_alani_kaynagi: "ilan.kaynak_tipi_be_metin" # Örn: "Rehber", "Makale"
          
          ozel_meta_etiketler_bilgi_egitim:
            - etiket_adi: "petplatform:content_category_be"
              icerik_kaynagi: "ilan.bilgi_kategorisi_ana_be_metin"
            - etiket_adi: "petplatform:target_pet_type_be"
              icerik_kaynagi: "ilan.hedef_hayvan_turu_be_metin_listesi"
            - etiket_adi: "petplatform:content_format_be"
              icerik_kaynagi: "ilan.icerik_formati_be_metin"
            - etiket_adi: "petplatform:source_provided_be" # Kaynak belirtilip belirtilmediği
              icerik_kaynagi: "ilan.kaynak_belirtildi_mi_boolean"
            - etiket_adi: "petplatform:last_reviewed_date_be" # İçeriğin en son editöryal veya kullanıcı tarafından gözden geçirilme tarihi
              icerik_kaynagi: "ilan.son_gozden_gecirme_tarihi_be_iso"

        harici_platform_ve_api_entegrasyon_hazirligi:
          # Bilgi içeriklerinin RSS feed ile sunulması veya eğitim odaklı platformlarla paylaşım.
          veri_paylasim_formatlari_destegi:
            - format_adi: "RSS_Feed_Bilgi_Egitim"
              aktif_mi: true
              aciklama: "Yeni eklenen bilgi ve eğitim içerikleri için RSS feed."
            - format_adi: "JSON_API_Bilgi_Egitim_Icerikleri"
              aktif_mi: true
          
          gorsel_erisimi_ve_optimizasyonu_harici_sistemler_icin:
            # Bu kategoride görseller genellikle içeriği destekleyici olur.
            gorsel_alt_metin_stratejisi: "ICERIK_BASLIGI_VE_KONUSU_BE"
            # Şablon: "[İçerik Başlığı] - [Ana Konu] - Evcil Hayvan Bilgi Kaynağı"

        icerik_kalitesi_ve_guvenilirlik_sinyalleri_harici_sistemler_icin:
          icerik_faydalilik_puani_meta_etiketi_be: "petplatform:content_helpfulness_score_be" # Kullanıcı oylamalarına dayalı
          yazar_itibari_meta_etiketi_be: "petplatform:author_reputation_score_be" # Yazarın platformdaki genel itibarı (varsa)
          bilgi_guncelligi_sinyali_meta_etiketi_be: "petplatform:content_freshness_be" # Son güncelleme/gözden geçirme tarihine göre

