          # kredi_maliyeti_katsayisi: 0.9 # Orijinaldeki gibi, yukarıdaki değere yansıtıldı.
          indirim_kriterleri_ve_oranlari_ess: # Orijinaldeki gibi
            - { kriter_kodu: "ILK_EV_SAHIBI_SAHIPLENDIRME_ILANI", indirim_orani_yuzde: 20, aciklama_kullanici: "Platformumuzda ilk kez bu kategoride ilan veriyorsanız %20 indirim!" }
            - { kriter_kodu: "ACIL_DURUM_BEYANI_ONAYLI", indirim_orani_yuzde: 30, aciklama_kullanici: "Gerçekten acil bir durumdaysanız (moderatör onayıyla) %30 indirim." }
            - { kriter_kodu: "DETAYLI_TAKIP_SISTEMI_KABULU", indirim_orani_yuzde: 15, aciklama_kullanici: "Sahiplendirme sonrası detaylı takip sistemimizi kabul ederseniz %15 indirim." }
          one_cikarma_secenekleri_hassas_kategori: # Daha az ve uygun maliyetli
            - { secenek_kodu: "ACIL_YUVA_ARAYANLAR_BOLUMU_7GUN", gosterilecek_ad_kullanici: "Acil Yuva Arayanlar Bölümünde Gösterim (7 Gün)", ek_kredi_maliyeti: 7, aciklama_kullanici: "İlanınızı 7 gün boyunca 'Acil Yuva Arayan Evcil Hayvanlar' bölümünde öne çıkarın."}
        operasyonel_onceliklendirme_ve_gorunurluk:
          oncelik_katsayisi_platform_ici_ess: 1.3 # Orijinaldeki ai_priority_score
          algoritma_destekli_gosterim_faktorleri_ess: # Orijinaldeki algoritma_bonusu_data
            - { faktor_kodu: "DETAYLI_VE_ICTEN_HIKAYE", bonus_etkisi_aciklama: "Hikayenin uzunluğu, duygusal derinliği ve şeffaflığı, ilanın daha fazla ilgili kişiye ulaşmasına yardımcı olabilir.", katsayi_etkisi: 0.2 }
            - { faktor_kodu: "YUKSEK_KALITELI_VE_COKLU_FOTOGRAF_VIDEO", bonus_etkisi_aciklama: "Hayvanı farklı açılardan ve net gösteren görseller, güveni artırır ve ilgiyi çeker.", katsayi_etkisi: 0.1 }
            - { faktor_kodu: "TAKIP_SISTEMI_VE_SOZLESME_KABULU", bonus_etkisi_aciklama: "Sorumlu sahiplendirme taahhüdü, ilanın ciddiyetini ve güvenilirliğini artırır.", katsayi_etkisi: 0.15 }
        moderasyon_ayarlari:
          seviye: "YUKSEK_HASSASIYET_VE_SAMIMIYET_KONTROLU" # Orijinaldeki gibi
          otomatik_onay_aktif_mi: false # Orijinaldeki gibi
          hizli_onay_kriterleri_listesi_ess: ["Daha önce platformumuzda sorunsuz işlem yapmış, profili tam ve doğrulanmış kullanıcı.", "İlan formunu eksiksiz, tutarlı ve içten bir şekilde doldurmuş.", "Hayvanın sağlık durumunu destekleyici (aşı kartı vb.) temel bir belge sunmuş."] # Orijinaldeki gibi
          ozel_dogrulama_gereklilikleri_detayli_ess: # Orijinaldeki gibi, daha yapılandırılmış
            - { gereklilik_kodu: "YASAM_KOSULLARI_GORSEL_KANIT", aciklama_kullanici: "Hayvanın şu anki yaşam ortamını ve genel durumunu gösteren güncel fotoğraflar veya kısa bir video yüklemeniz istenecektir.", zorunluluk_derecesi: "YUKSEK_ZORUNLU" }
            - { gereklilik_kodu: "VETERINER_KAYITLARI_TEMEL", aciklama_kullanici: "Mümkünse hayvanın aşı kartı, geçmiş sağlık raporları gibi temel veteriner kayıtlarını sunmanız, şeffaflık açısından önemlidir.", zorunluluk_derecesi: "ONERILIR_DURUMA_GORE_ISTENEBILIR" }
            - { gereklilik_kodu: "SAHIPLENDIRME_MOTIVASYONU_SAMIMIYET_ANALIZI", aciklama_kullanici: "İlanınızdaki açıklamalar ve sunduğunuz bilgiler, bu zor kararı alma nedenlerinizin anlaşılması için moderatörlerimiz tarafından incelenecektir.", zorunluluk_derecesi: "ZORUNLU_FORM_ANALIZI" }
            - { gereklilik_kodu: "KIMLIK_DOGRULAMA_YENI_SAHIP_ILE_CIDDI_TEMASTA", aciklama_kullanici: "Potansiyel yeni bir sahiple ciddi bir aşamaya geldiğinizde, her iki tarafın güvenliği için kimlik doğrulaması talep edilebilir.", zorunluluk_derecesi: "KOSULLU_ZORUNLU" }
            - { gereklilik_kodu: "ILETISIM_BILGILERI_GECERLILIK_KONTROLU", aciklama_kullanici: "Paylaştığınız iletişim bilgilerinin (telefon, e-posta) ulaşılabilir ve güncel olması gerekmektedir.", zorunluluk_derecesi: "ZORUNLU" }
        ozel_destek_ve_takip_sistemleri_ess: # Orijinaldeki gibi
          duygusal_destek_paketleri:
            - { paket_kodu: "AYRILIK_SURECI_REHBERI", ad_kullanici: "Ayrılık Süreci Destek Rehberi", aciklama: "Bu zorlu süreçte size yol gösterecek pratik ve duygusal ipuçları içeren dijital rehber." }
            - { paket_kodu: "PLATFORM_DESTEK_HATTI", ad_kullanici: "Platform Destek Uzmanı ile Görüşme", aciklama: "İhtiyaç duyarsanız, platformumuzun deneyimli destek uzmanlarından biriyle görüşme talep edebilirsiniz (sınırlı kontenjan)." }
          teknik_destek_araclari:
            - { arac_kodu: "FOTOGRAF_CEKIM_REHBERI", ad_kullanici: "Etkili İlan Fotoğrafı Çekme Rehberi", aciklama: "Hayvanınızı en iyi şekilde tanıtacak fotoğraflar çekmek için ipuçları." }
            - { arac_kodu: "HIKAYE_ANLATIM_SABLONLARI", ad_kullanici: "Duygusal ve Etkili Hikaye Anlatımı Şablonları", aciklama: "Hayvanınızın hikayesini ve ihtiyaçlarını en iyi şekilde ifade etmenize yardımcı olacak örnek şablonlar." }
          takip_ve_garanti_sistemi_secenekleri:
            - { secenek_kodu: "30GUN_UYUM_TAKIBI_STANDART", ad_kullanici: "Standart Uyum Takibi (30 Gün)", aciklama: "Yeni sahibiyle ilk 30 gün boyunca periyodik (haftalık/iki haftalık) fotoğraf/video ile durum güncellemesi." }
            - { secenek_kodu: "GERI_ALMA_GARANTISI_OZEL_KOSULLU", ad_kullanici: "Özel Koşullu Geri Alma Prosedürü", aciklama: "Beklenmedik uyum sorunlarında, belirli koşullar altında (sözleşmeyle belirlenir) hayvanı geri alma veya yeni bir yuva bulma sürecinde aktif rol alma." }
      veri_yapilandirma_ve_dis_ai_optimizasyonu_ev_sahibi_satisi: # Eski ai_ml_config buraya
        semantik_icerik_ve_seo_ayarlari:
          akilli_ilan_asistani_icerik_onerileri:
            - { hedef_form_alani_kodu: "HIKAYE_BASLIGI_ESS", oneri_basligi_kullanici: "Duygusal ve Bilgilendirici Bir Başlık Seçin", oneri_detayi_kullanici: "Hayvanınızın adını, türünü/ırkını ve 'Yeni Yuva Arıyor' gibi bir ifadeyi, belki de en temel ayrılık nedeninizi (örn: 'Taşınma Nedeniyle') başlıkta belirtin.", neden_onemli_aciklamasi_kullanici: "Empati kuracak ve durumu anlayacak doğru kişilerin dikkatini çeker.", iyi_ornek_metni_kullanici: "Örn: 'Minnoş (Tekir Kedi) Taşınma Nedeniyle Acil Kalıcı Yuva Arıyor' veya 'Can Dostum Paşa (Golden Köpek) İçin Sevgi Dolu Bir Aile Aranıyor'", ipucu_tipi: "IYILESTIRME_ONERISI_ONEMLI" }
            - { hedef_form_alani_kodu: "NEDEN_DETAY_ACIKLAMA_ESS", oneri_basligi_kullanici: "Hikayenizi İçtenlikle ve Dürüstçe Anlatın", oneri_detayi_kullanici: "Neden bu zor kararı aldığınızı, hayvanınızla olan bağınızı, onun karakterini, sevdiklerini, korkularını, alışkanlıklarını, sağlık durumunu ve yeni sahibinden beklentilerinizi detaylı bir şekilde yazın. Samimiyetiniz, doğru insanlarla bağ kurmanızı sağlar.", neden_onemli_aciklamasi_kullanici: "Şeffaflık, güven oluşturur ve hayvan için en uygun yuvayı bulma şansını artırır.", ipucu_tipi: "BILGILENDIRME_KAPSAMLI" }
            - { hedef_form_alani_kodu: "HAYVAN_FOTOGRAFLARI_VIDEOLARI_ESS", oneri_basligi_kullanici: "Kaliteli ve Bol Görsel Kullanın", oneri_detayi_kullanici: "Hayvanınızın net, aydınlık, farklı pozlarda çekilmiş güncel fotoğraflarını ve mümkünse kısa videolarını (oynarken, sevilirken) ekleyin. Bu, onun kişiliğini ve sevimliliğini yansıtmanın en iyi yoludur.", neden_onemli_aciklamasi_kullanici: "Görseller, ilk izlenim için çok önemlidir ve ilana olan ilgiyi büyük ölçüde artırır.", ipucu_tipi: "KRITIK_ONERI" }
          semantik_zenginlik_onemi_katsayisi: 0.9 # Hikayenin ve detayların önemi yüksek.
          # Orijinaldeki kategori_ozel_sistemler'den AI ile ilgili kısımlar buraya yedirilebilir:
          duygusal_destek_sistemi_ai_semantik_entegrasyonu:
            ilan_oncesi_rehberler_icin_semantik_anahtar_kelimeler: ["ayrılık acısı", "hayvanımdan vazgeçmek", "doğru karar mı", "yeni yuva bulma stresi"]
            ilan_sirasinda_sablonlar_icin_nlp_destekli_duygu_yonlendirme: true # (Örn: Olumlu ve umut dolu bir dil kullanmaya teşvik)
          kalite_guvence_sistemi_ai_semantik_entegrasyonu:
            hayvan_dogrulama_analizi_icin_semantik_eslesme_kriterleri: ["fotoğraf-açıklama tutarlılığı", "ırk-davranış uyumu"]
            sahip_dogrulama_sinyalleri_icin_metin_analizi: ["hikaye tutarlılığı", "çelişkili ifadeler tespiti"]
        yapilandirilmis_veri_ve_meta_etiket_stratejileri:
          # Bu kategori için Schema.org "PetAdoption" (eğer ücretsiz veya çok düşük ücretliyse) veya "Product" (hayvanın kendisi) kullanılabilir.
          # "Action" -> "TransferAction" da bir seçenek olabilir. En uygunu "Product" gibi duruyor.
          kullanilacak_schema_org_tipleri:
            - schema_tipi: "Product" # Sahiplendirilen hayvan bir "ürün" gibi modellenebilir.
              alan_eslestirmeleri:
                - { schema_alani: "name", platform_alani_kaynagi: "ilan.hayvan_adi_ess_ve_irk" }
                - { schema_alani: "description", platform_alani_kaynagi: "ilan.neden_detay_aciklama_ess_kisa_ozet" }
                - { schema_alani: "category", platform_alani_kaynagi: "ilan.hayvan_turu_ess_metin" }
                - { schema_alani: "breed", platform_alani_kaynagi: "ilan.hayvan_irki_ess" }
                - { schema_alani: "birthDate", platform_alani_kaynagi: "ilan.hayvan_dogum_tarihi_ess_iso" } # Yaklaşık ise belirtilmeli
                - { schema_alani: "gender", platform_alani_kaynagi: "ilan.hayvan_cinsiyeti_ess_metin" }
                - { schema_alani: "image", platform_alani_kaynagi: "ilan.hayvan_ana_fotograf_url_ess" }
                - { schema_alani: "offers", platform_alani_kaynagi: "ilan.sahiplendirme_ucret_schema_ess", schema_alt_tipi: "Offer" }
                - { schema_alani: "additionalProperty", platform_alani_kaynagi: "ilan.sahiplendirme_nedeni_schema_property_ess" } # (PropertyValue olarak neden)
                - { schema_alani: "offeredBy", platform_alani_kaynagi: "ilan.mevcut_sahip_kullanici_schema_ess", schema_alt_tipi: "Person" }
          ozel_meta_etiketler_ev_sahibi_satisi:
            - { etiket_adi: "petplatform:rehoming_reason", icerik_kaynagi: "ilan.sahiplendirme_nedeni_ess_metin_kisa" }
            - { etiket_adi: "petplatform:pet_age_rehoming", icerik_kaynagi: "ilan.hayvan_yasi_ess_metin" }
            - { etiket_adi: "petplatform:pet_temperament_tags_rehoming", icerik_kaynagi: "ilan.hayvan_karakteri_genel_ess_virgullu_liste" }
            - { etiket_adi: "petplatform:is_urgent_rehoming", icerik_kaynagi: "ilan.aciliyet_durumu_ess_boolean" } # (Eğer formda varsa)
        harici_platform_ve_api_entegrasyon_hazirligi:
          # Bu ilanların barınaklarla veya kurtarma gruplarıyla (izinle) paylaşımı düşünülebilir.
          barinak_ve_kurtarma_gruplari_icin_ozel_feed_aktif_mi: false # (Gelecekte, etik kurallar çerçevesinde)
          gorsel_erisimi_ve_optimizasyonu_harici_sistemler_icin:
            gorsel_alt_metin_stratejisi: "SAHIPLENDIRME_HAYVAN_ADI_IRK_NEDEN"
            # Şablon: "[Hayvan Adı] ([Irk]) - [Ana Sahiplendirme Nedeni] Nedeniyle Yeni Yuva Arıyor"
        icerik_kalitesi_ve_guvenilirlik_sinyalleri_harici_sistemler_icin:
          hikaye_samimiyet_ve_detay_skoru_meta: "petplatform:story_quality_score_rehoming" # (Platform içi bir skorlama olabilir)
          sahip_dogrulama_seviyesi_meta_ess: "petplatform:owner_verification_level_rehoming"
          # Orijinaldeki eslesme_optimizasyonu_algoritma_faktörleri ve akilli_oneri_kaynaklari,
          # daha çok platformun backend'inde ve iç işleyişinde kullanılacak stratejilerdir.
          # Dış AI optimizasyonu için doğrudan meta etiketlere dönüştürülmeleri zor olabilir.
          # Ancak, bu faktörlere dayalı "uygunluk skoru" gibi bir meta etiket düşünülebilir.
          uygun_sahip_eslesme_potansiyeli_sinyali_meta: "petplatform:match_potential_signal_rehoming" # (İçsel bir hesaplamaya dayalı)
      istatistikler: # Orijinaldeki gibi birleştirilmiş
        beklenen_performans_metrikleri_genel_ess:
          ortalama_ilan_goruntulenme: "Yüksek (empati ve ihtiyaç odaklı)"
          basarili_sahiplendirme_hedefi_yuzde: 75
          ortalama_sahiplendirme_suresi_gun: "20-35"
          platformda_aktif_kalma_suresi_gun_ortalama_ilan: 25 # İlanın ortalama yayında kalma süresi
          basvuru_alma_orani_yuzde_ilan_basina: 90
        beklenen_performans_metrikleri_kalite_ess:
          geri_alinma_veya_basarisiz_sahiplendirme_orani_hedefi_yuzde: "<5" # Çok düşük olmalı
          yeni_sahip_memnuniyet_skoru_hedefi_10_uzerinden: "9.2"
          takip_sistemi_basari_orani_yuzde: 85 # Takip kabul edenlerde
        platforma_katkilari_ess:
          - "Hayvanların barınağa düşmesini önlemeye yardımcı olur."
          - "Mevcut sahipler için zor bir süreçte destek ve çözüm sunar."
          - "Bilinçli ve kalıcı yuvalar bulunmasına aracılık eder."
          - "Toplumda empati ve sorumluluk bilincini artırır."
  # ----------------------------------------------------------------------------------------------
  # HAYVAN KATEGORİLERİ (TÜRLER)
  # ----------------------------------------------------------------------------------------------
  hayvan_kategorileri:
    kopek:
      id: "animal_tur_kopek"
      temel_kimlik:
        ad: "Köpek"
        slug: "kopek"
        aciklama: "İnsanın en sadık dostu olarak bilinen, çeşitli ırkları ve karakter özellikleriyle öne çıkan evcil hayvanlardır. Ailelerin neşe kaynağı ve koruyucusudurlar."
        gorsel_kimlik: { renk_kodu: "#f59e0b", ikon_adi: "fas fa-dog", emoji: "🐕" }
      arama_sistemi:
        alternatif_kelimeler: ["it", "kuçu kuçu", "doggo", "canine", "köpke", "sadık dost", "ev köpeği", "sokak köpeği", "çoban köpeği", "av köpeği", "süs köpeği", "yavru köpek", "pati", "hav hav", "koruyucu", "arkadaş", "kangal", "golden", "terrier", "doberman"]
        ai_intent_keywords: ["köpek sahiplen", "köpek al", "köpek türleri", "sadık arkadaş köpek", "eğitilebilir köpek", "aile köpeği"]
        semantic_tags: ["dog", "canine_companion", "dog_breeds", "puppy", "guard_dog", "family_dog", "working_dog"]
      akilli_filtreler:
        ozel_filtre_alanlari: # Köpeğe özel filtreler
          - { alan_adi: "irk_secimi_kopek", label: "Köpek Irkı", tip: "select_dynamic_searchable", kaynak_model_tahmini: "KopekIrkTablosu", aciklama: "Golden Retriever, Alman Çoban, Terrier, Poodle, Bulldog, Beagle, Dachshund, vb.", ai_importance: 0.95, zorunlu: false }
          - { alan_adi: "yas_grubu_kopek", label: "Yaş Grubu", tip: "select", secenekler: ["Yavru (0-1 yaş)", "Genç (1-3 yaş)", "Yetişkin (3-7 yaş)", "Yaşlı (7+ yaş)"], ai_importance: 0.85 }
          - { alan_adi: "cinsiyet_kopek", label: "Cinsiyet", tip: "select", secenekler: ["Erkek", "Dişi"], ai_importance: 0.7 }
          - { alan_adi: "boyut_kopek", label: "Boyut", tip: "select", secenekler: ["Çok Küçük (Toy)", "Küçük", "Orta", "Büyük", "Dev"], ai_importance: 0.8 }
          - { alan_adi: "enerji_seviyesi_kopek", label: "Enerji Seviyesi", tip: "select", secenekler: ["Düşük", "Orta", "Yüksek", "Çok Yüksek"], ai_importance: 0.9 }
          - { alan_adi: "egitim_seviyesi_kopek", label: "Eğitim Seviyesi", tip: "select", secenekler: ["Eğitimsiz", "Temel İtaat", "İleri İtaat", "Özel Eğitimli (örn: terapi köpeği)"], ai_importance: 0.8 }
          - { alan_adi: "cocuk_uyumu_kopek", label: "Çocuklarla Uyumu", tip: "select", secenekler: ["Çok İyi", "İyi", "Dikkatli Olunmalı", "Tavsiye Edilmez"], ai_importance: 0.85 }
          - { alan_adi: "diger_kopek_uyumu_kopek", label: "Diğer Köpeklerle Uyumu", tip: "select", secenekler: ["Çok İyi", "İyi", "Dikkatli Olunmalı", "Tek Yaşamalı"], ai_importance: 0.75 }
          - { alan_adi: "diger_hayvan_uyumu_kopek", label: "Diğer Hayvanlarla Uyumu (kedi, kuş vb.)", tip: "select", secenekler: ["Çok İyi", "İyi", "Dikkatli Olunmalı", "Tavsiye Edilmez"], ai_importance: 0.7 }
          - { alan_adi: "apartman_uyumu_kopek", label: "Apartman Yaşamına Uygunluk", tip: "select", secenekler: ["Uygun", "Orta Düzeyde Uygun", "Uygun Değil"], ai_importance: 0.75 }
          - { alan_adi: "bahce_ihtiyaci_kopek", label: "Bahçe İhtiyacı", tip: "select", secenekler: ["Yok", "Küçük Bahçe Yeterli", "Geniş Bahçe Gerekli"], ai_importance: 0.7 }
          - { alan_adi: "tuy_dokme_seviyesi_kopek", label: "Tüy Dökme Seviyesi", tip: "select", secenekler: ["Yok/Çok Az", "Az", "Orta", "Çok"], ai_importance: 0.65 }
          - { alan_adi: "bakim_ihtiyaci_kopek", label: "Bakım İhtiyacı", tip: "select", secenekler: ["Düşük (haftalık fırçalama)", "Orta (düzenli fırçalama/traş)", "Yüksek (profesyonel bakım)"], ai_importance: 0.7 }
          - { alan_adi: "saglik_durumu_genel_kopek", label: "Genel Sağlık Durumu", tip: "select_aciklamali", secenekler_map: {"Sağlıklı": false, "Kronik Rahatsızlığı Var": true, "Özel Bakım Gerekiyor": true}, aciklama_label: "Sağlık Detayı/Notu", ai_importance: 0.9 }
          - { alan_adi: "saglik_durumu_ozel_not_kopek", label: "Sağlık Durumu Özel Not", tip: "textarea", aciklama: "Varsa özel sağlık notları.", ai_importance: 0.8, zorunlu: false, bagimli_alan_goster: "saglik_durumu_genel_kopek", bagimli_degerler_goster: ["Kronik Rahatsızlığı Var", "Özel Bakım Gerekiyor"] }
          - { alan_adi: "kisirlastirilmis_kopek", label: "Kısırlaştırılmış Mı?", tip: "boolean_unknown", secenekler: ["Evet", "Hayır", "Bilinmiyor"], ai_importance: 0.7 }
          - { alan_adi: "asi_durumu_kopek", label: "Aşı Durumu", tip: "select", secenekler: ["Tam", "Eksik", "Bilinmiyor"], ai_importance: 0.8 }
          - { alan_adi: "tuvalet_aliskanligi_kopek", label: "Tuvalet Alışkanlığı", tip: "select", secenekler: ["Var (dışarı/ped)", "Kısmen Var", "Yok"], ai_importance: 0.85 }
          - { alan_adi: "yalniz_kalma_toleransi_kopek", label: "Yalnız Kalma Toleransı", tip: "select", secenekler: ["İyi (4+ saat)", "Orta (2-4 saat)", "Zayıf (sürekli ilgi)"], ai_importance: 0.7 }
          - { alan_adi: "oyunculuk_seviyesi_kopek", label: "Oyunculuk Seviyesi", tip: "select", secenekler: ["Düşük", "Orta", "Yüksek"], ai_importance: 0.8 }
          - { alan_adi: "koruma_icgudusu_kopek", label: "Koruma İçgüdüsü", tip: "select", secenekler: ["Düşük", "Orta", "Yüksek"], ai_importance: 0.6 }
          - { alan_adi: "havlama_egilimi_kopek", label: "Havlama Eğilimi", tip: "select", secenekler: ["Az", "Orta", "Çok"], ai_importance: 0.5 }
          - { alan_adi: "seyahat_uyumu_kopek", label: "Seyahat Uyumu", tip: "select", secenekler: ["İyi", "Orta", "Zayıf"], ai_importance: 0.5 }
          - { alan_adi: "ilk_sahip_uygunlugu_kopek", label: "İlk Kez Sahiplenecekler İçin Uygunluk", tip: "select", secenekler: ["Uygun", "Deneyim Gerektirir", "Uygun Değil"], ai_importance: 0.8 }
          - { alan_adi: "hipoalerjenik_kopek", label: "Hipoalerjenik Özellik", tip: "boolean_unknown", secenekler: ["Evet", "Hayır", "Bilinmiyor"], ai_importance: 0.4 }
          - { alan_adi: "renk_kopek", label: "Renk", tip: "text_multivalue", aciklama: "Örn: Siyah, Beyaz, Kahverengi, Benekli, Altın Sarısı", ai_importance: 0.6 }
          - { alan_adi: "karakter_ozellikleri_kopek", label: "Karakter Özellikleri (Ek)", tip: "multiselect", secenekler: ["Sevecen", "Bağımsız", "Zeki", "Sakin", "Korkak", "Meraklı", "İnatçı", "Lider"], ai_importance: 0.85 }
          - { alan_adi: "egzersiz_ihtiyaci_gunluk_kopek", label: "Günlük Egzersiz İhtiyacı", tip: "select", secenekler: ["30dk az", "30-60dk", "60+ dk"], ai_importance: 0.8 }
          - { alan_adi: "isirma_gecmisi_kopek", label: "Isırma Geçmişi", tip: "select_aciklamali", secenekler_map: {"Yok":false, "Savunma Amaçlı":true, "Bilinmiyor":false}, aciklama_label: "Detay", ai_importance: 0.7 }
          - { alan_adi: "mikrocip_durumu_kopek", label: "Mikroçip Durumu", tip: "boolean", ai_importance: 0.65 }
      platform_ayarlari_kopek: # Eski platform_ayarlari buraya
        ilan_yasam_dongusu_ayarlari:
          varsayilan_politika: "SURELI_YENILEME_GEREKLI_TUR_BAZLI"
          varsayilan_aktif_kalma_suresi_gun: 45 # varsayilan_ilan_suresi_tur'den
          yenileme_bildirimi_gun_oncesi: 7
          maksimum_yenileme_sayisi: 3 # Veya "SINIRSIZ_GUNCELLEME_ILE"
          ilan_guncelligi_kontrol_mekanizmasi_aktif_mi: true # Kullanıcıdan "Hala geçerli mi?" onayı.
        operasyonel_onceliklendirme_ve_gorunurluk:
          oncelik_katsayisi_platform_ici: 1.5 # ai_priority_score_tur'den
          irk_ozel_tanitim_kampanyalari_aktif_mi: true # Özellikle nadir veya sahiplenilmesi zor ırklar için.
          yasakli_irklar_icin_ozel_gorunurluk_politikasi_aciklamasi: "Yasal düzenlemelere tabi olan (tehlike arz eden olarak tanımlanmış vb.) köpek ırklarının ilanları, platformda özel bir dikkat ve uyarı mekanizması ile yönetilir. Bu ilanlar, sadece belirli şartları (kısırlaştırma, kayıt, ağızlık kullanımı taahhüdü vb.) karşılayan ve bilinçli sahipler tarafından görüntülenebilir şekilde kısıtlanabilir veya ek moderasyon adımlarından geçebilir. Amaç, hem bu hayvanların refahını sağlamak hem de toplum güvenliğini gözetmektir."
        moderasyon_ayarlari:
          seviye: "ORTA_IRK_VE_SAGLIK_BEYAN_KONTROLLU" # moderasyon_seviyesi_tur'den uyarlanmış
          yeni_ilan_varsayilan_durum: "INCELEMEDE_KÖPEK_DETAY_ONAYI_BEKLIYOR"
          yasakli_irk_ilanlari_yonetim_protokolu:
            - "İlanın ilgili yasal düzenlemelere uygunluğunu kontrol et (yerel yönetim kuralları dahil)."
            - "Kullanıcıdan gerekli belgeleri (belediye kaydı, kısırlaştırma belgesi, özel eğitim sertifikası vb.) talep et."
            - "İlanda hayvanın ağızlıklı fotoğrafını zorunlu kıl."
            - "Sadece 18 yaşından büyük ve deneyimli olduğu beyan edilen kullanıcılara gösterim sağla."
            - "Yasalara aykırı durumda ilanı derhal kaldır ve kullanıcıyı yasal sorumlulukları konusunda bilgilendir."
          irk_safligi_ve_saglik_beyan_kontrol_mekanizmasi: "Kullanıcı tarafından yüklenen fotoğrafların ve belgelerin (varsa soy kütüğü, sağlık karnesi) beyan edilen ırk ve sağlık bilgileriyle tutarlılığı incelenir. Şüphe durumunda ek bilgi veya kanıt talep edilebilir. Yanıltıcı veya yanlış bilgilendirme tespit edilirse ilan düzenlenir veya kaldırılır."
        dogrulama_ve_guvenlik_protokolleri_kopek:
          protokol_aktif_mi: true # ozel_dogrulama_gerekliligi_tur'den dolayı
          protokol_genel_aciklama_kullanici: "Köpek sahiplenme ve sahiplendirme süreçlerinin güvenliğini ve şeffaflığını artırmak, özellikle yasal düzenlemelere tabi olan veya özel bakım gerektiren ırklar için sorumlu sahiplendirmeyi teşvik etmek amacıyla platformumuz bazı doğrulama adımları uygulayabilir."
          uygulanabilecek_dogrulama_senaryolari:
            - senaryo_kodu: "YASAKLI_OZEL_IRK_BELGE_KONTROLU_KÖPEK"
              senaryo_aciklamasi_kullanici: "Belirli köpek ırkları (örn: Pitbull Terrier, Dogo Argentino, American Staffordshire Terrier vb. ve melezleri) için, 5199 sayılı Hayvanları Koruma Kanunu ve ilgili yönetmelikler gereği kısırlaştırıldıklarına, belediyeye kayıtlı olduklarına ve diğer yasal yükümlülüklerin yerine getirildiğine dair belgelerin (kısırlaştırma belgesi, belediye kayıt belgesi, mikroçip numarası, ağızlıklı güncel fotoğraf vb.) sunulması zorunludur. Bu belgeler olmadan ilanınız yayınlanamaz veya kısıtlı gösterime tabi tutulabilir."
              onemi: "ZORUNLU_YASAL_UYUM_VE_TOPLUM_GUVENLIGI_ICIN"
              moderator_kontrol_rehberi: "İlgili yasal belgelerin eksiksiz ve güncel olduğundan emin olun. Fotoğrafın gerçekten ilandaki köpeğe ait olduğunu ve ağızlık taktığını teyit edin. Şüphe durumunda ek teyit isteyin. Yasalara uyumsuz ilanları derhal kaldırın."
            - senaryo_kodu: "SOY_KUTUGU_DAMIZLIK_BEYAN_KONTROLU_KÖPEK"
              senaryo_aciklamasi_kullanici: "Eğer köpeğinizin safkan olduğunu ve soy kütüğü (seceresi) bulunduğunu belirtiyorsanız veya köpeğinizi 'show quality' ya da 'damızlık' olarak tanımlıyorsanız, bu beyanlarınızı destekleyici belgeleri (FCI, KIF onaylı secere, yarışma dereceleri vb.) ilanınıza eklemeniz, ilanınızın güvenilirliğini ve değerini artıracaktır."
              onemi: "ONERILIR_BEYAN_DESTEKLEMEK_VE_ALICI_GÜVENİ_İÇİN"
              moderator_kontrol_rehberi: "Sunulan belgelerin gerçekliğini, uluslararası veya ulusal kinoloji federasyonları tarafından tanınırlığını ve ilandaki köpek ile eşleştiğini kontrol edin. Yanıltıcı veya abartılı beyanlara karşı dikkatli olun."
      veri_yapilandirma_ve_dis_ai_optimizasyonu_kopek: # Eski ai_ml_config buraya
        semantik_icerik_ve_seo_ayarlari:
          akilli_ilan_asistani_icerik_onerileri:
            - { hedef_form_alani_kodu: "ilan_basligi_kopek", oneri_basligi_kullanici: "Köpeğinizin Irkını ve Öne Çıkan Özelliğini Başlıkta Belirtin", oneri_detayi_kullanici: "Başlıkta köpeğinizin ırkını, yaşını (yavru/genç/yetişkin) ve en dikkat çekici karakter özelliğini (örn: 'Oyuncu', 'Çocuk Dostu', 'Eğitimli') veya sahiplendirme nedenini (örn: 'Acil Yuva') vurgulayın.", neden_onemli_aciklamasi_kullanici: "Doğru anahtar kelimeler, ilanınızın aramalarda daha kolay bulunmasını ve ilgili kişilerin dikkatini çekmesini sağlar.", iyi_ornek_metni_kullanici: "Örn: '3 Aylık Oyuncu Golden Retriever Yavrusu (İstanbul)' veya 'Eğitimli ve Çocuk Dostu Labrador Acil Yuva Arıyor'", ipucu_tipi: "IYILESTIRME_ONERISI_ONEMLI" }
            - { hedef_form_alani_kodu: "ilan_aciklamasi_kopek", oneri_basligi_kullanici: "Köpeğinizin Hikayesini ve Tüm Detaylarını Paylaşın", oneri_detayi_kullanici: "Köpeğinizin karakterini, enerji seviyesini, eğitim durumunu, sağlık geçmişini, çocuklarla ve diğer hayvanlarla uyumunu, yalnız kalma toleransını, sevdiği şeyleri, varsa özel ihtiyaçlarını ve sahiplendirme koşullarınızı detaylı ve içten bir şekilde anlatın.", neden_onemli_aciklamasi_kullanici: "Kapsamlı ve dürüst bilgi, potansiyel sahiplerin doğru karar vermesine yardımcı olur ve uyum sürecini kolaylaştırır.", ipucu_tipi: "BILGILENDIRME_KAPSAMLI" }
            - { hedef_form_alani_kodu: "fotograf_video_kopek", oneri_basligi_kullanici: "Net ve Çeşitli Görseller Ekleyin", oneri_detayi_kullanici: "Köpeğinizin farklı açılardan çekilmiş, net ve aydınlık fotoğraflarını yükleyin. Mümkünse, oyun oynarken, dinlenirken veya insanlarla etkileşim halindeyken çekilmiş kısa videolar ekleyerek kişiliğini daha iyi yansıtın.", neden_onemli_aciklamasi_kullanici: "Kaliteli görseller, ilana olan ilgiyi artırır ve köpeğinizin sevimliliğini potansiyel sahiplere daha iyi aktarır.", ipucu_tipi: "KRITIK_ONERI" }
          semantik_zenginlik_onemi_katsayisi: 0.85 # ai_complexity_score'dan
        yapilandirilmis_veri_ve_meta_etiket_stratejileri:
          kullanilacak_schema_org_tipleri:
            - schema_tipi: "Product" # Sahiplendirilen/satılan köpek için
              alan_eslestirmeleri:
                - { schema_alani: "name", platform_alani_kaynagi: "ilan.kopek_adi_ve_irk_baslik" }
                - { schema_alani: "description", platform_alani_kaynagi: "ilan.kopek_aciklamasi_kisa_ozet" }
                - { schema_alani: "category", sabit_deger: "Evcil Hayvanlar > Köpekler" }
                - { schema_alani: "breed", platform_alani_kaynagi: "ilan.akilli_filtre_degeri_irk_secimi_kopek" }
                - { schema_alani: "color", platform_alani_kaynagi: "ilan.akilli_filtre_degeri_renk_kopek" }
                - { schema_alani: "size", platform_alani_kaynagi: "ilan.akilli_filtre_degeri_boyut_kopek_schema_uyumlu" } # (Örn: "XSmall", "Large")
                - { schema_alani: "gender", platform_alani_kaynagi: "ilan.akilli_filtre_degeri_cinsiyet_kopek_schema_uyumlu" } # (Örn: "Male", "Female")
                - { schema_alani: "birthDate", platform_alani_kaynagi: "ilan.yaklasik_dogum_tarihi_kopek_iso" } # (Yaş grubundan hesaplanabilir)
                - { schema_alani: "image", platform_alani_kaynagi: "ilan.ana_kopek_fotograf_url" }
                - { schema_alani: "offers", platform_alani_kaynagi: "ilan.sahiplendirme_ucret_ve_kosul_schema_kopek", schema_alt_tipi: "Offer" }
                - { schema_alani: "additionalProperty", platform_alani_kaynagi: "ilan.kopek_karakter_enerji_egitim_schema_properties" } # (Enerji, eğitim, çocuk uyumu vb. için PropertyValue listesi)
          ozel_meta_etiketler_kopek:
            - { etiket_adi: "petplatform:dog_breed", icerik_kaynagi: "ilan.akilli_filtre_degeri_irk_secimi_kopek" }
            - { etiket_adi: "petplatform:dog_age_group", icerik_kaynagi: "ilan.akilli_filtre_degeri_yas_grubu_kopek" }
            - { etiket_adi: "petplatform:dog_energy_level", icerik_kaynagi: "ilan.akilli_filtre_degeri_enerji_seviyesi_kopek" }
            - { etiket_adi: "petplatform:dog_good_with_kids", icerik_kaynagi: "ilan.akilli_filtre_degeri_cocuk_uyumu_kopek" }
            - { etiket_adi: "petplatform:dog_apartment_friendly", icerik_kaynagi: "ilan.akilli_filtre_degeri_apartman_uyumu_kopek" }
            - { etiket_adi: "petplatform:dog_training_level", icerik_kaynagi: "ilan.akilli_filtre_degeri_egitim_seviyesi_kopek" }
            - { etiket_adi: "petplatform:dog_health_status_note", icerik_kaynagi: "ilan.akilli_filtre_degeri_saglik_durumu_ozel_not_kopek"}
        harici_platform_ve_api_entegrasyon_hazirligi:
          irk_dernekleri_ve_kurtarma_gruplari_ile_veri_paylasimi_opsiyonu_aktif_mi: true # Kullanıcı onayı ile
          gorsel_erisimi_ve_optimizasyonu_harici_sistemler_icin:
            gorsel_alt_metin_stratejisi: "Kopek_IRK_YAS_CINSIYET_SEHIR_PLATFORMADI"
            # Örn: "Golden Retriever Yavru Erkek İstanbul PetPlatform"
          dis_ai_modelleri_icin_veri_yapilandirma_notlari_kopek: # Eski ai_ml_config'deki model aktiviteleri buraya yorumlanır
            irk_bilgisinin_dis_sistemlerce_dogrulanabilirligi_icin_yapilandirma: "YAPILANDIRILMIS_IRK_VERISI_VE_FOTOGRAF_ESLESTIRME_DESTEGI_SAGLANIR"
            # Açıklama: Kullanıcının girdiği ırk bilgisi, seçtiği ırkın standart özellikleri ve yüklediği fotoğraflar, dış AI servislerinin (Google Vision API vb.) ırk doğrulaması yapabilmesi için uygun formatta ve meta verilerle sunulur. Modelin kendisi platformda çalışmaz.
            karakter_ozelliklerinin_dis_ai_analizi_icin_yapilandirilmis_veri_sunumu: "DAVRANIS_PROFILI_DETAYLI_AKILLI_FILTRE_ALANLARI_VE_ACIK_METIN_ACIKLAMALARININ_SEMANTIK_ETIKETLENMESI_DESTEKLENIR"
            # Açıklama: Enerji seviyesi, çocuklarla uyum, eğitim seviyesi gibi yapılandırılmış filtre cevapları ve kullanıcının serbest metinle girdiği karakter açıklamaları, dış NLP servislerinin mizaç analizi yapabilmesi için anlamlı etiketlerle (örn: "oyuncu", "sakin", "eğitilebilir") zenginleştirilir.
            saglik_bilgilerinin_dis_ai_ile_risk_profili_cikarimina_uygun_yapilandirilmasi: "SAGLIK_GECMISI_FILTRE_SECENEKLERI_VE_IRKA_OZGU_POTANSIYEL_RISK_ALANLARININ_VURGULANMASI_ICIN_BILGILENDIRICI_METINLER_KULLANILIR"
            # Açıklama: Kullanıcının belirttiği genel sağlık durumu, kronik rahatsızlıklar ve ırka özgü potansiyel sağlık sorunları (platform tarafından genel bilgi olarak sunulabilir) hakkında yapılandırılmış veriler, dış AI sistemlerinin genel bir risk profili olasılığı hakkında çıkarım yapmasına yardımcı olacak şekilde düzenlenir. Platform tıbbi teşhis koymaz veya model çalıştırmaz.
