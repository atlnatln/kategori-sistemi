      veri_yapilandirma_ve_dis_ai_optimizasyonu_uretici:
        semantik_icerik_ve_seo_ayarlari:
          akilli_ilan_asistani_icerik_onerileri:
            - { hedef_form_alani_kodu: "URUN_HIZMET_BASLIGI_ANAHTAR_KELIMELI_URETICI", oneri_basligi_kullanici: "Profesyonel, Açıklayıcı ve Anahtar Kelime Odaklı Bir Başlık Kullanın!", oneri_detayi_kullanici: "Ürününüzün/hizmetinizin tam adını, markasını (çok önemli!), temel faydasını, hitap ettiği hayvan türünü ve (varsa) öne çıkan bir özelliğini (örn: 'Organik', 'Tahılsız', 'El Yapımı', 'Secereli Yavru') başlıkta net bir şekilde belirtin. Potansiyel müşterilerinizin arama yaparken kullanabileceği anahtar kelimeleri başlığınıza dahil edin.", neden_onemli_aciklamasi_kullanici: "Etkili bir başlık, SEO (Arama Motoru Optimizasyonu) performansınızı artırır, doğru hedef kitleye ulaşmanızı sağlar ve ticari güvenilirliğinizin ilk göstergesidir.", iyi_ornek_metni_kullanici: "Örn: '[MARKA ADI] Organik Sertifikalı Yetişkin Köpek Maması - Kuzulu & Pirinçli (Hipoalerjenik) 15kg' veya 'FCI Secereli Şov Kalitesi Golden Retriever Yavruları - Sağlık Garantili Yetiştirici [KENNEL ADI]' veya '[MARKA ADI] El Yapımı Deri Köpek Tasması ve Gezdirme Seti - Tüm Irklara Uygun'", ipucu_tipi: "IYILESTIRME_ONERISI_COK_ONEMLI_TICARI_BASARI_ICIN", ideal_uzunluk_max: 120 }
            - { hedef_form_alani_kodu: "URUN_HIZMET_ACIKLAMASI_DETAYLI_IKNA_EDICI_URETICI", oneri_basligi_kullanici: "Ürün/Hizmet Detaylarını Eksiksiz, Şeffaf ve İkna Edici Bir Şekilde Sunun!", oneri_detayi_kullanici: "Ürününüzün tüm özelliklerini (boyut, renk, malzeme, içerik, menşei), faydalarını, kullanım talimatlarını, bakım önerilerini, varsa garanti koşullarını; hizmetinizin kapsamını, süresini, metodolojisini, fiyatlandırma detaylarını ve elde edilecek sonuçları ayrıntılı bir şekilde anlatın. Hedef kitlenizin aklındaki tüm soruları öngörerek yanıtlar ekleyin. Müşteri yorumlarından veya başarı hikayelerinden alıntılarla güven oluşturun.", neden_onemli_aciklamasi_kullanici: "Kapsamlı, dürüst ve profesyonelce hazırlanmış bir açıklama, müşteri güvenini pekiştirir, satın alma/hizmet alma kararını kolaylaştırır ve iade/memnuniyetsizlik oranlarını düşürür.", alt_oneri_maddeleri: ["Yüksek çözünürlüklü, farklı açılardan çekilmiş profesyonel ürün/hizmet fotoğrafları ve mümkünse tanıtım/kullanım videoları ekleyin.", "Fiyatlandırma (KDV dahil/hariç), ödeme seçenekleri, kargo/teslimat süreçleri ve maliyetleri, iade/iptal politikası gibi tüm ticari bilgileri son derece açık ve net bir şekilde belirtin.", "Sahip olduğunuz sertifikaları, kalite belgelerini, aldığınız ödülleri veya önemli müşteri referanslarını listeleyin ve mümkünse görsellerini ekleyin.", "Markanızın kuruluş hikayesini, misyonunu, vizyonunu ve özellikle etik üretim/hayvan refahı konusundaki hassasiyetlerinizi vurgulayarak müşterilerle duygusal bir bağ kurun.", "Net bir 'Hemen Satın Al', 'Teklif Alın', 'Detaylı Bilgi İçin Bize Ulaşın', 'Randevu Alın' gibi spesifik bir eylem çağrısı (Call to Action) ile sonlandırın."], ipucu_tipi: "BILGILENDIRME_KAPSAMLI_SATIS_ODAKLI_VE_GUVEN_ARTIRICI" }
          semantik_zenginlik_onemi_katsayisi: 0.85
        yapilandirilmis_veri_ve_meta_etiket_stratejileri:
          kullanilacak_schema_org_tipleri: # Hem "Product" hem de "Service" (hayvan yetiştiriciliği bir hizmet de olabilir) veya "Organization" (üretici profili için)
            - schema_tipi: "Product" # Fiziksel ürünler ve satılan hayvanlar için
              alan_eslestirmeleri:
                - { schema_alani: "name", platform_alani_kaynagi: "ilan.urun_veya_hayvan_adi_marka_ile_uretici" }
                - { schema_alani: "description", platform_alani_kaynagi: "ilan.urun_hizmet_aciklamasi_detay_kisa_ozet_uretici" }
                - { schema_alani: "brand", platform_alani_kaynagi: "ilan.marka_adi_uretici_schema_brand_objesi", schema_alt_tip: "Brand" }
                - { schema_alani: "manufacturer", platform_alani_kaynagi: "ilan.uretici_firma_schema_organization_objesi", schema_alt_tip: "Organization" }
                - { schema_alani: "sku", platform_alani_kaynagi: "ilan.stok_kodu_veya_hayvan_kimlik_no_uretici" }
                - { schema_alani: "gtin", platform_alani_kaynagi: "ilan.barkod_numarasi_ean_upc_uretici_opsiyonel" }
                - { schema_alani: "image", platform_alani_kaynagi: "ilan.urun_veya_hayvan_gorselleri_url_listesi_uretici" }
                - { schema_alani: "offers", platform_alani_kaynagi: "ilan.fiyat_stok_ve_teklif_bilgileri_schema_offer_objesi_uretici", schema_alt_tip: "Offer" } # Price, availability, currency
                - { schema_alani: "aggregateRating", platform_alani_kaynagi: "ilan.ortalama_kullanici_puani_schema_aggregaterating_objesi_uretici_opsiyonel", schema_alt_tip: "AggregateRating" }
                - { schema_alani: "review", platform_alani_kaynagi: "ilan.kullanici_yorumlari_schema_review_objeleri_listesi_uretici_opsiyonel", schema_alt_tip: "Review" }
                - { schema_alani: "category", platform_alani_kaynagi: "ilan.urun_veya_hayvan_kategorisi_metin_uretici" } # "Köpek Maması > Yetişkin Köpek Maması" veya "Kedi > Siyam Kedisi"
                - { schema_alani: "material", platform_alani_kaynagi: "ilan.urun_malzemesi_metin_uretici_aksesuar_icin" }
                - { schema_alani: "ingredients", platform_alani_kaynagi: "ilan.urun_icindekiler_listesi_metin_uretici_mama_icin" }
                # Hayvan yetiştiricileri için ek Product özellikleri:
                - { schema_alani: "animalType", platform_alani_kaynagi: "ilan.yetistirilen_hayvan_turu_metin_uretici", bagimli_alan_goster: "uretici_ana_faaliyet_alani_uretici", bagimli_degerler_goster: ["Evcil Hayvan Yetiştiriciliği (Breeder/Kennel/Cattery)"] }
                - { schema_alani: "animalBreed", platform_alani_kaynagi: "ilan.yetistirilen_irk_cins_metin_uretici", bagimli_alan_goster: "uretici_ana_faaliyet_alani_uretici", bagimli_degerler_goster: ["Evcil Hayvan Yetiştiriciliği (Breeder/Kennel/Cattery)"] }
                - { schema_alani: "birthDate", platform_alani_kaynagi: "ilan.hayvan_dogum_tarihi_iso_uretici_opsiyonel", bagimli_alan_goster: "uretici_ana_faaliyet_alani_uretici", bagimli_degerler_goster: ["Evcil Hayvan Yetiştiriciliği (Breeder/Kennel/Cattery)"] }
            - schema_tipi: "Service" # Hizmet sunan üreticiler/yetiştiriciler için (örn: eğitim, özel bakım)
              alan_eslestirmeleri: # Benzer alanlar, "serviceType", "provider" vb.
                - { schema_alani: "name", platform_alani_kaynagi: "ilan.hizmet_adi_uretici" }
                - { schema_alani: "serviceType", platform_alani_kaynagi: "ilan.hizmet_kategorisi_uretici" }
                - { schema_alani: "provider", platform_alani_kaynagi: "ilan.uretici_firma_schema_organization_objesi", schema_alt_tip: "Organization" }
                # ... diğer hizmete özel alanlar ...
            - schema_tipi: "Organization" # Üreticinin/Yetiştiricinin kendi profil sayfası için
              alan_eslestirmeleri: # contactPoint, address, legalName, logo, memberOf, award vb.
                - { schema_alani: "name", platform_alani_kaynagi: "uretici_profili.isletme_resmi_adi" }
                - { schema_alani: "legalName", platform_alani_kaynagi: "uretici_profili.isletme_resmi_ticari_unvani" }
                - { schema_alani: "logo", platform_alani_kaynagi: "uretici_profili.isletme_logo_url" }
                - { schema_alani: "address", platform_alani_kaynagi: "uretici_profili.isletme_adresi_schema_postaladdress_objesi", schema_alt_tip: "PostalAddress" }
                - { schema_alani: "contactPoint", platform_alani_kaynagi: "uretici_profili.iletisim_bilgileri_schema_contactpoint_objesi_listesi", schema_alt_tip: "ContactPoint" }
                - { schema_alani: "foundingDate", platform_alani_kaynagi: "uretici_profili.kurulus_yili_iso" }
                - { schema_alani: "slogan", platform_alani_kaynagi: "uretici_profili.isletme_slogani_metin_opsiyonel" }
                - { schema_alani: "memberOf", platform_alani_kaynagi: "uretici_profili.sertifikasyon_ve_uyelikler_schema_organization_objeleri_listesi_opsiyonel", schema_alt_tip: "Organization" } # Üye olunan dernekler, federasyonlar
                - { schema_alani: "vatID", platform_alani_kaynagi: "uretici_profili.vergi_kimlik_numarasi" }
          ozel_meta_etiketler_uretici:
            - { etiket_adi: "petplatform:producer_official_name_commercial", icerik_kaynagi: "ilan.uretici_firma_adi_meta_etiket_icin" }
            - { etiket_adi: "petplatform:product_or_service_type_commercial", icerik_kaynagi: "ilan.uretici_ana_faaliyet_alani_uretici_metin_kisa" } # (Yetiştirici, Mama Üreticisi vb.)
