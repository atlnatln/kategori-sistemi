          - { alan_adi: "yavrularin_buyutuldugu_ortam_ev_uretimi", label: "Yavruların Büyütüldüğü Ortam ve Koşullar", tip: "textarea_rich_photo_upload_optional", aciklama: "Yavrular evinizin hangi bölümünde (salon, özel oda vb.), nasıl bir ortamda büyüyor? Temizlik, hijyen, oyun ve keşif alanları nasıl sağlanıyor? Diğer evcil hayvanlar veya çocuklarla etkileşimleri var mı? Fotoğraf ekleyebilirsiniz.", ai_importance: 0.85, zorunlu: true }
          - { alan_adi: "yavrularin_sosyallesme_programi_ev_uretimi", label: "Yavruların Sosyalleşme Programı", tip: "textarea_rich", aciklama: "Yavruların insanlarla, farklı seslerle, objelerle ve (mümkünse) diğer hayvanlarla erken dönemde nasıl sosyalleştirildiğini anlatın. Tuvalet eğitimi başlangıcı, temel elle temas gibi konulara değinin.", ai_importance: 0.8, zorunlu: true }
          - { alan_adi: "yavru_teslim_yasi_ve_kosullari_ev_uretimi", label: "Yavru Teslim Yaşı ve Koşulları", tip: "select_text_area", secenekler: ["En Az 8 Haftalık (Köpek/Kedi)", "En Az 10-12 Haftalık (Irka/Gelişime Bağlı)", "Veteriner Hekim Onayıyla Belirlenir"], aciklama_text: "Yavruları yeni ailelerine hangi yaşta ve hangi koşullarda (aşıları tamamlanmış, parazit tedavileri yapılmış, mikroçipli vb.) teslim ediyorsunuz? Sahiplendirme sözleşmesi kullanıyor musunuz?", ai_importance: 0.9, zorunlu: true }
          - { alan_adi: "yeni_sahiplere_sunulan_destek_ve_bilgilendirme_ev_uretimi", label: "Yeni Sahiplere Sunulan Destek ve Bilgilendirme", tip: "textarea", aciklama: "Yavru sahiplendikten sonra yeni ailelere ne tür destekler (beslenme, bakım, eğitim danışmanlığı vb.) sunuyorsunuz? İletişimi sürdürüyor musunuz?", ai_importance: 0.75, zorunlu: false }
          - { alan_adi: "yetistiricilik_deneyimi_ve_referanslar_ev_uretimi", label: "Yetiştiricilik Deneyimi ve Referanslar (İsteğe Bağlı)", tip: "textarea_url_list", aciklama: "Kaç yıldır bu ırkı/türü yetiştiriyorsunuz? Varsa önceki sahiplendirmelerden referanslar veya sosyal medya grubunuz/sayfanız.", ai_importance: 0.6, zorunlu: false }
          - { alan_adi: "fiyatlandirma_politikasi_ve_neleri_kapsadigi_ev_uretimi", label: "Fiyatlandırma Politikası ve Neleri Kapsadığı", tip: "textarea_numeric_currency", para_birimi: "TRY", aciklama: "Yavrular için belirlediğiniz ücret aralığı nedir? Bu ücret neleri (ilk aşılar, mikroçip, mama paketi, sağlık karnesi vb.) kapsamaktadır? Lütfen şeffaf olun.", ai_importance: 0.8, zorunlu: true }
          - { alan_adi: "ziyaret_ve_tanisma_politikasi_ev_uretimi", label: "Ebeveynleri ve Yavruları Ziyaret Politikası", tip: "select_text_area", secenekler: ["Evet, randevu ile ziyaret kabul ediyorum", "Sadece ciddi alıcılarla belirli aşamada ziyaret mümkün", "Sağlık nedenleriyle sınırlı ziyaret/görüntülü görüşme", "Ziyaret kabul etmiyorum"], aciklama_text: "Potansiyel alıcıların ebeveyn hayvanları ve yavruları görme/tanışma imkanı var mı? Koşullarınız nelerdir?", ai_importance: 0.7, zorunlu: false }
      platform_ayarlari_ev_uretimi:
        ilan_yasam_dongusu_ve_ucretlendirme_ev_uretimi:
          ilan_tipi_modeli_ev_uretimi: "DUSUK_MALIYETLI_KREDI_VEYA_HOBI_PAKETI_LISTELEME"
          # Açıklama: Hobi yetiştiricileri için daha uygun maliyetli tekil ilan yayınlama veya çok sınırlı sayıda ilan içeren bir "Hobi Yetiştirici Paketi" sunulabilir.
          standart_hobi_ilan_kredi_maliyetleri:
            yayinlama_kredisi_60gun: 5 # Daha kısa süre, daha düşük maliyet.
            yenileme_kredisi_60gun: 4
          one_cikarma_secenekleri_hobi_ilanlari_icin_limitli_olabilir_mi: true
          # Açıklama: Ana sayfada "Profesyonel Üreticiler" varken, hobi yetiştiricileri için "Sorumlu Ev Üretimi Yavrular" gibi ayrı bir bölümde veya kategori içi sıralamada öne çıkma sunulabilir.
          hobi_yetistirici_destek_paketi_ornek:
            - { paket_kodu: "SORUMLU_HOBI_PAKETI", ad_kullanici: "Sorumlu Hobi Yetiştirici Paketi", yillik_ucret_tl: 299, ozellikler: ["Yılda En Fazla 2-3 Farklı Doğum İlanı Yayınlama Hakkı", "Doğrulanmış Hobi Yetiştirici Rozeti (Doğrulama Sonrası)", "Temel İlan Görünürlüğü"] }
          ilan_performans_raporlamasi_sunulmaz_mi: true # Genellikle bu ölçek için gerekmeyebilir.
        operasyonel_onceliklendirme_ve_gorunurluk_ev_uretimi:
          oncelik_katsayisi_platform_ici_dogrulanmis_hobi_yetistirici: 1.3 # Doğrulanmış olanlar için.
          "Dogrulanmis Sorumlu Hobi Yetistirici" rozeti_ve_filtreleme_secenegi_aktif_mi: true
          "Ev Ortaminda Sosyallestirilmis Yavrular" gibi ozel etiketlerle one cikarma_aktif_mi: true
        moderasyon_ayarlari_ev_uretimi:
          seviye: "YUKSEK_DETAYLI_ETIK_SORUMLULUK_VE_HAYVAN_REFAHI_ODAKLI_KONTROL"
          # Açıklama: Bu kategori, kötüye kullanıma açık olabileceğinden (backyard breeding), moderasyon çok titiz olmalıdır.
          yeni_ilan_varsayilan_durum: "INCELEMEDE_SORUMLU_HOBI_YETISTIRICILIGI_ONAYI_BEKLIYOR"
          etik_disi_yetistirme_ve_hayvan_refahi_ihlali_suphesi_tolerans_politikasi: "SIFIR_TOLERANS_DERHAL_KALDIRMA_VE_KULLANICI_ENGELLEME"
          # Kontrol Edilecek Kırmızı Bayraklar (Moderator için):
          # - Çok sık ve çok sayıda farklı ırkta ilan verilmesi (Hobi ölçeğini aşıyor mu?).
          # - Ebeveyn hayvanlar hakkında bilgi verilmemesi veya sağlık taramalarının olmaması.
          # - Yavruların çok erken yaşta (8 haftadan önce) teslim edilmek istenmesi.
          # - Yaşam koşulları hakkında şeffaf olunmaması, fotoğraf/video paylaşılmaması.
          # - Fiyatların aşırı düşük veya aşırı yüksek olması (piyasa araştırması gerekebilir).
          # - Sadece kar amacı güdüldüğüne dair işaretler.
          kullanici_sikayetleri_ve_referans_kontrolu_onemli_mi: true
        dogrulama_ve_guvenlik_protokolleri_ev_uretimi:
          protokol_aktif_mi: true # Bu kategori için doğrulama hayati önemde.
          protokol_genel_aciklama_kullanici: "Ev ortamında hobi amaçlı yetiştiricilik yapan değerli üyelerimizin, platformumuzun etik ve sorumlu yetiştiricilik ilkelerine bağlılığını teyit etmek, yavruların ve ebeveyn hayvanların refahını güvence altına almak amacıyla bir doğrulama süreci uygulanmaktadır. Bu süreç, hem sizin güvenilirliğinizi artıracak hem de bilinçli ailelerin size ulaşmasını kolaylaştıracaktır."
          zorunlu_dogrulama_adimlari_listesi_ev_uretimi:
            - { adim_kodu: "YETISTIRICI_KIMLIK_VE_IKAMET_DOGRULAMASI_EV_URETIMI", gosterilecek_ad_kullanici: "Yetiştirici Kimlik ve İkametgah Bilgileri", talep_edilecek_bilgiler_kullanici_listesi: ["Ad Soyad", "T.C. Kimlik Numarası (Platformda gizli kalır, sadece doğrulama için)", "Güncel İkametgah Adresi (Yavruların büyüdüğü yer)", "İletişim Bilgileri (Doğrulanmış Telefon ve E-posta)"], moderator_kontrol_rehberi: "Kimlik bilgileri ve ikametgah adresi (örn: e-devlet çıktısı veya fatura ile) doğrulanır. Bu, şeffaflık ve hesap verebilirlik için temel bir adımdır.", dogrulama_seviyesi_sonucu: "YETISTIRICI_KIMLIGI_DOGRULANDI" }
            - { adim_kodu: "EBEVEYN_HAYVAN_SAGLIK_VE_REFAH_BELGELERI_EV_URETIMI", gosterilecek_ad_kullanici: "Ebeveyn Hayvanların Sağlık ve Refah Bilgileri", talep_edilecek_belgeler_kullanici_listesi: ["Ebeveyn hayvanların fotoğrafları ve temel bilgileri (yaş, ırk).", "Güncel veteriner sağlık kayıtları (yıllık kontroller, aşılar).", "Irka özgü yapılması önerilen genetik testler veya sağlık taramaları hakkında bilgi/belge (yapıldıysa).", "Yılda kaç kez doğum yaptırdığınıza dair beyan."], moderator_kontrol_rehberi: "Ebeveyn hayvanların sağlıklı ve iyi bakılıyor olması, sorumlu yetiştiriciliğin temelidir. Irka özgü testlerin yapılmış olması büyük bir artıdır. Çok sık doğum yaptırılmadığı teyit edilmelidir.", dogrulama_seviyesi_sonucu: "EBEVEYN_SAGLIGI_DEGERLENDIRILDI" }
            - { adim_kodu: "YAVRULARIN_YASAM_ALANI_VE_SOSYALLESME_KOSULLARI_GORSEL_KANIT_EV_URETIMI", gosterilecek_ad_kullanici: "Yavruların Yaşam Alanı ve Sosyalleşme Koşulları (Fotoğraf/Video)", talep_edilecek_bilgeler_kullanici_listesi: ["Yavruların doğduğu ve büyüdüğü evin içindeki alanın (temiz, güvenli, uygun sıcaklıkta, yeterli hareket alanı olan) detaylı, güncel fotoğrafları ve kısa videoları.", "Yavruların anne ile birlikte olduğu ve sosyalleşme aktivitelerini (oyun, insan teması vb.) gösteren görseller."], moderator_kontrol_rehberi: "Yavruların ev ortamında, temiz, güvenli ve uyaran açısından zengin bir çevrede büyüdüğü, anne ile yeterli süre geçirdiği ve insanlarla pozitif etkileşimde bulunduğu teyit edilmelidir. Kafes ortamı veya hijyenik olmayan koşullar kabul edilemez.", dogrulama_seviyesi_sonucu: "YASAM_KOSULLARI_UYGUN_GORULDU" }
            - { adim_kodu: "SORUMLU_YETISTIRICILIK_ILKELERI_KABUL_BEYANI_EV_URETIMI", gosterilecek_ad_kullanici: "Sorumlu Yetiştiricilik İlkeleri Kabul Beyanı", talep_edilecek_bilgiler_kullanici_listesi: ["Platformun belirlediği 'Sorumlu Hobi Yetiştiriciliği Etik Kuralları'nı okuyup kabul ettiğinize dair dijital onay.", "Bu kurallar; hayvan refahı, sağlık, sosyalleşme, uygun eşleştirme, sınırlı sayıda üretim, yeni sahiplere destek ve şeffaflık gibi konuları içerir."], moderator_kontrol_rehberi: "Kullanıcının platformun etik standartlarını anladığı ve kabul ettiği teyit edilir. Bu, bir taahhüt niteliğindedir.", dogrulama_seviyesi_sonucu: "ETIK_ILKELER_KABUL_EDILDI" }
          dogrulama_basarili_hobi_yetistirici_rozetleri_listesi:
            - { seviye_kodu: "DOGRULANMIS_SORUMLU_HOBI_YETISTIRICI", gosterilecek_ad_kullanici: "Doğrulanmış Sorumlu Hobi Yetiştiricisi", ikon: "fas fa-home-heart", renk: "#EC4899", aciklama_kullanici: "Bu yetiştirici, platformumuzun sorumlu hobi yetiştiriciliği doğrulama adımlarını başarıyla tamamlamıştır." }
            - { seviye_kodu: "SAGLIK_TARAMALI_EBEVEYN_HOBI_YETISTIRICI", gosterilecek_ad_kullanici: "Sağlık Taramalı Ebeveynler", ikon: "fas fa-stethoscope", renk: "#10B981", aciklama_kullanici: "Bu hobi yetiştiricisi, ebeveyn hayvanların sağlık taramaları ve/veya genetik testleri hakkında bilgi/belge sunmuştur." } # Eğer ilgili belgeler yüklenmişse.
          dogrulama_sureci_basarisizlik_ve_itiraz_mekanizmasi_ev_uretimi: "Doğrulama kriterlerini karşılamayan veya şeffaf olmayan başvurular reddedilir. Reddedilme nedenleri kullanıcıya bildirilir ve eksiklerini gidermesi için fırsat tanınabilir. Platformun etik ilkelerine aykırı bulunan durumlarda hesap askıya alınabilir."
      veri_yapilandirma_ve_dis_ai_optimizasyonu_ev_uretimi:
        semantik_icerik_ve_seo_ayarlari:
          akilli_ilan_asistani_icerik_onerileri:
            - { hedef_form_alani_kodu: "YAVRU_ILAN_BASLIGI_EV_URETIMI", oneri_basligi_kullanici: "Sevgi Dolu Yuva Arayan Yavrularınız İçin Sıcak Bir Başlık Yazın!", oneri_detayi_kullanici: "Başlıkta yetiştirdiğiniz ırkı, 'Ev Üretimi/Aile Yanı Yavrular' ibaresini, yavruların genel yaşını (örn: 8 Haftalık) ve bulunduğunuz şehri belirtin. 'Sağlıklı ve Sosyal' gibi pozitif vurgular ekleyebilirsiniz.", neden_onemli_aciklamasi_kullanici: "Doğru anahtar kelimeler ve sıcak bir ifade, bilinçli ve sevgi dolu ailelerin ilanınıza ulaşmasını kolaylaştırır.", iyi_ornek_metni_kullanici: "Örn: 'British Shorthair Ev Üretimi Sağlıklı ve Sosyal Yavrular (8 Haftalık) - İstanbul' veya 'Aile Yanı Cavalier King Charles Spaniel Bebekleri Yuva Arıyor - Ankara'", ipucu_tipi: "IYILESTIRME_ONERISI_ONEMLI_HEDEF_KITLE_ICIN" }
            - { hedef_form_alani_kodu: "YETISTIRICILIK_HIKAYENIZ_VE_YAVRULARIN_TANITIMI_EV_URETIMI", oneri_basligi_kullanici: "Yetiştiricilik Hikayenizi, Yavruların Kişiliklerini ve Büyüme Ortamlarını Anlatın!", oneri_detayi_kullanici: "Neden bu işi hobi olarak yaptığınızı, hayvanlara olan sevginizi, ebeveyn köpeklerin karakterlerini, yavruların doğum ve büyüme süreçlerini, her bir yavrunun (mümkünse) kendine has özelliklerini, nasıl bir ortamda (ev içinde, çocuklarla, diğer hayvanlarla) sosyalleştiklerini samimi bir dille anlatın. Bol bol fotoğraf ve video ekleyin.", neden_onemli_aciklamasi_kullanici: "Şeffaflık ve samimiyet, potansiyel ailelerin size ve yavrularınıza güven duymasını sağlar. Yavruların karakterlerini tanımaları, doğru eşleşme için önemlidir.", alt_oneri_maddeleri: ["Ebeveyn hayvanların fotoğraflarını ve sağlık bilgilerini paylaşın.", "Yavruların her birinin net fotoğraflarını (tek tek ve toplu) ve kısa videolarını ekleyin.", "Beslenme düzenleri, tuvalet eğitimi başlangıçları ve sağlık kontrolleri hakkında bilgi verin.", "Yeni sahiplerden beklentilerinizi (takip, kısırlaştırma sözü, yaşam koşulları) ve onlara sunacağınız desteği belirtin.", "Sahiplendirme sözleşmesi kullanıp kullanmadığınızı açıklayın."], ipucu_tipi: "BILGILENDIRME_KAPSAMLI_GUVEN_VE_SEFFAFLIK_ODAKLI" }
          semantik_zenginlik_onemi_katsayisi: 0.9 # Güven ve detay önemli.
        yapilandirilmis_veri_ve_meta_etiket_stratejileri:
          kullanilacak_schema_org_tipleri: # Genellikle "Product" schema'sı, satılan hayvanlar için kullanılır.
            - schema_tipi: "Product"
              alan_eslestirmeleri:
                - { schema_alani: "name", platform_alani_kaynagi: "ilan.yavru_ilan_basligi_kisa_ev_uretimi" } # Örn: "British Shorthair Yavruları - Ev Üretimi"
                - { schema_alani: "description", platform_alani_kaynagi: "ilan.yavrularin_detayli_tanitimi_kisa_ozet_ev_uretimi" }
                - { schema_alani: "brand", platform_alani_kaynagi: "ilan.yetistirilen_irk_cins_ev_uretimi_metin", schema_alt_tip: "Brand" } # Irk, bir "marka" gibi düşünülebilir.
                - { schema_alani: "manufacturer", platform_alani_kaynagi: "ilan.hobi_yetistirici_adi_veya_kullanici_adi_schema_person_objesi", schema_alt_tip: "Person" } # Hobi yetiştiricisi "Person"
                - { schema_alani: "sku", platform_alani_kaynagi: "ilan.yavru_kimlik_kodu_veya_ilan_id_ev_uretimi" } # Her bir yavru için ayrı ilan varsa yavru ID'si
                - { schema_alani: "image", platform_alani_kaynagi: "ilan.yavru_fotograflari_url_listesi_ev_uretimi" }
                - { schema_alani: "offers", platform_alani_kaynagi: "ilan.fiyat_ve_teslim_kosullari_schema_offer_objesi_ev_uretimi", schema_alt_tip: "Offer" }
                - { schema_alani: "category", sabit_deger: "Evcil Hayvanlar > Hobi Yetiştiriciliği > [Hayvan Türü] > [Irk]" } # Dinamik oluşturulur.
                - { schema_alani: "animalType", platform_alani_kaynagi: "ilan.yetistirilen_hayvan_turu_ev_uretimi_metin" }
                - { schema_alani: "animalBreed", platform_alani_kaynagi: "ilan.yetistirilen_irk_cins_ev_uretimi_metin" }
                - { schema_alani: "birthDate", platform_alani_kaynagi: "ilan.yavru_dogum_tarihi_yaklasik_iso_ev_uretimi" }
                - { schema_alani: "additionalProperty", schema_alt_tip: "PropertyValue",
                    coklu_deger_kaynagi: "ilan.yavru_ozellikleri_schema_propertyvalue_listesi_ev_uretimi",
                    # Örn: [{name:"Sosyalleşme Durumu", value:"Ev ortamında, çocuklarla büyüdü"}, {name:"Sağlık Kontrolü", value:"İlk aşıları yapıldı, parazit tedavisi tamam"}]
                  }
          ozel_meta_etiketler_ev_uretimi:
            - { etiket_adi: "petplatform:breeder_type_hobby", icerik_kaynagi: "sabit_deger_HOBBYIST" }
            - { etiket_adi: "petplatform:home_raised_pet_ev_uretimi", icerik_kaynagi: "sabit_deger_TRUE" }
            - { etiket_adi: "petplatform:animal_species_hobby", icerik_kaynagi: "ilan.yetistirilen_hayvan_turu_ev_uretimi_metin" }
            - { etiket_adi: "petplatform:animal_breed_hobby", icerik_kaynagi: "ilan.yetistirilen_irk_cins_ev_uretimi_metin" }
            - { etiket_adi: "petplatform:breeder_verification_status_hobby", icerik_kaynagi: "ilan.hobi_yetistirici_dogrulama_rozet_kodu_meta" } # (DOGRULANMIS_SORUMLU_HOBI_YETISTIRICI vb.)
            - { etiket_adi: "petplatform:socialization_level_hobby", icerik_kaynagi: "ilan.yavru_sosyallesme_seviyesi_metin_ozet_ev_uretimi" } # (YUKSEK, ORTA, TEMEL)
        harici_platform_ve_api_entegrasyon_hazirligi_ev_uretimi:
          sorumlu_yetistirici_platformlari_ve_irk_dernekleri_ile_bilgi_paylasimi_opsiyonu_aktif_mi: false # Genellikle bireyseldir, bu tür entegrasyonlar nadirdir.
          gorsel_erisimi_ve_optimizasyonu_harici_sistemler_icin_ev_uretimi:
            gorsel_alt_metin_stratejisi_ev_uretimi: "YAVRU_IRK_CINSIYET_EV_URETIMI_YETISTIRICI_SEHIR_PETPLATFORM"
            # Örn: "British Shorthair Erkek Yavru Ev Üretimi Ayşe Yılmaz İstanbul PetPlatform"
            yavrularin_buyume_surecini_gosteren_album_ozelligi_icin_altyapi_hazirligi_var_mi: true # (Profil sayfasında veya ilanda)
        icerik_kalitesi_ve_guvenilirlik_sinyalleri_harici_sistemler_icin_ev_uretimi:
          hobi_yetistirici_dogrulama_rozetinin_meta_etiket_ve_schema_org_karsiligi: "petplatform:hobby_breeder_verification_badge_code"
          ebeveyn_hayvan_saglik_bilgisi_seffaflik_duzeyi_meta: "petplatform:parent_health_info_transparency_hobby" # (YUKSEK, ORTA, DUSUK)
          yavru_sosyallesme_detay_seviyesi_meta: "petplatform:puppy_kitten_socialization_detail_level_hobby"
          onceki_sahiplendirme_referanslari_ve_geri_bildirim_puani_meta_opsiyonel: "petplatform:hobby_breeder_past_litter_feedback_score" # (Eğer toplanıyorsa)
      istatistikler:
        beklenen_performans_metrikleri:
