            onay_periyodu_gun: 7 # Daha sık, çünkü durum hızla değişebilir.
            hatirlatma_bildirimi_gun_oncesi_onay_icin: 2
            onay_verilmezse_uygulanacak_aksiyon_detayli:
              aksiyon_tipi: "ILANI_GECICI_PASIFE_AL_VE_KULLANICIYI_BILGILENDIR_SON_UYARI_ILE"
              pasif_kalma_suresi_gun_son_uyari_sonrasi: 7 # Bu süre sonunda hala onay yoksa otomatik arşive taşı.
              otomatik_arsivleme_gun_sayisi_ilk_yayindan_itibaren_maks_onaysiz: 90 # En fazla 3 ay onaysız kalabilir.
            kullanici_tarafindan_kolay_ilan_yeniden_aktive_etme_imkani_aktif_mi: true
            hayvan_bulundu_olarak_isaretleme_mekanizmasi_ve_tesvik:
              aktif_mi: true
              kavusma_hikayesi_paylasma_secenegi_sunulur_mu: true # Topluluğa ilham için.
              basarili_kavusma_sonrasi_platform_rozet_odulu_verilir_mi: true
        operasyonel_onceliklendirme_ve_gorunurluk_ayarlari:
          oncelik_katsayisi_platform_ici_kayip_buluntu: 2.5 # Çok yüksek öncelik.
          anasayfa_ozel_bolum_gosterimi_aktif_mi_kayip_buluntu: true # "Son Kayıp/Buluntu İlanları" gibi.
          harita_tabanli_arama_ve_gosterim_ozelligi_aktif_mi: true # Konum bu kategoride çok kritik.
          acil_durum_bildirim_sistemi_entegrasyonu_planlaniyor_mu: true # (Gelecekte) Belirli bir bölgedeki kullanıcılara anlık bildirim.
        moderasyon_ayarlari:
          seviye: "HIZLI_ON_KONTROL_VE_YAYIN_SUREKLI_IZLEME_VE_YUKSEK_ONCELIKLI_DETAYLI_INCELEME"
          yeni_ilan_varsayilan_durum: "YAYINDA_ACIL_MODERASYON_KUYRUGUNDA"
          # Açıklama: İlanlar çok hızlı (belki otomatik temel filtrelerle) yayına alınır, ancak moderatörler tarafından anlık olarak en yüksek öncelikle incelenir.
          yaniltici_veya_kotu_niyetli_ilan_tespit_protokolu_hizli_mudahale:
            - "Dolandırıcılık amaçlı ödül talepleri, sahte sahiplik iddiaları, hayvan ticareti şüphesi olan ilanlara karşı sıfır tolerans."
            - "Şüpheli ilanlar derhal askıya alınır, kullanıcı ile iletişime geçilir, gerekirse yasal mercilere bildirilir."
          otomatik_spam_ve_uygunsuz_icerik_filtreleme_aktif_mi: true
          kullanici_raporlama_sistemine_entegre_acil_mudahale_ekibi_aktif_mi: true # Kullanıcıların şüpheli ilanları bildirmesi.
        dogrulama_ve_guvenlik_protokolleri_kayip_buluntu:
          protokol_aktif_mi: true
          protokol_genel_aciklama_kullanici: "Kayıp ve buluntu ilanlarında, sürecin güvenliğini sağlamak, yanlış kişilere hayvan teslimini önlemek ve gerçek mağdurlara yardımcı olmak amacıyla platformumuz, özellikle sahiplik iddialarında ve kritik durumlarda bazı doğrulama adımları uygulayabilir veya ek bilgiler talep edebilir. Amacımız, can dostlarımızın güvenle yuvalarına dönmesine yardımcı olmaktır."
          uygulanabilecek_dogrulama_senaryolari_kayip_buluntu:
            - senaryo_kodu: "BULUNTU_HAYVANA_SAHIPLIK_IDDIASI_DETAYLI_KANIT_SURECI_KB"
              senaryo_aciklamasi_kullanici: "Eğer bulunan bir hayvan için sahiplik iddiasında bulunuyorsanız, hayvanın gerçekten size ait olduğunu şüpheye yer bırakmayacak şekilde kanıtlamanız istenecektir. Bu, hayvanın yanlış ellere geçmesini önlemek için çok önemlidir."
              talep_edilebilecek_kanitlar_kullanici_listesi_detayli:
                - "Hayvanın size ait olduğunu gösteren, farklı zamanlarda çekilmiş, net ve ayırt edici özelliklerini (lekeler, yara izleri, özel işaretler) açıkça gösteren birden fazla fotoğraf ve mümkünse video."
                - "Hayvanın adınıza düzenlenmiş resmi veteriner sağlık karnesi, aşı kayıtları, tedavi faturaları veya mikroçip kayıt belgesi."
                - "Varsa, hayvanın mikroçip numarası ve bu numaranın kayıtlı olduğu sistemdeki sahip bilgileri."
                - "Hayvanın özel alışkanlıkları, bildiği özel komutlar, korkuları, sevdiği oyuncaklar veya size özel gösterdiği tepkiler hakkında sadece gerçek sahibinin bilebileceği detaylı bilgiler."
                - "Gerekirse, hayvanı bulan kişiyle veya platform moderatörüyle görüntülü görüşme yaparak hayvanla olan bağınızı göstermeniz istenebilir."
              moderator_kontrol_rehberi_detayli: "Sunulan tüm kanıtlar (görsel, yazılı, sözlü) bir bütün olarak değerlendirilir. Fotoğraflardaki hayvanla ilandaki hayvanın birebir eşleşmesi, belgelerin gerçekçiliği ve tarihleri, anlatılan özel bilgilerin tutarlılığı titizlikle incelenir. En ufak bir şüphe durumunda ek teyitler istenir veya sahiplik iddiası reddedilebilir. Hayvanı bulan kişinin de güvenliği ve rızası gözetilir."
              basarisiz_dogrulama_durumunda_aksiyon_onerisi_detayli: "Sahiplik kesin olarak kanıtlanamazsa, hayvan bulan kişinin korumasında kalmaya devam eder ve bulan kişi, hayvan için yasal prosedürleri (belediyeye bildirim, barınakla iletişim) işletmekte özgürdür. Platform, yasal bir otorite değildir ancak arabuluculuk ve bilgilendirme yapabilir."
  
            - senaryo_kodu: "KAYIP_ILANI_SAHIBI_ILETISIM_VE_KIMLIK_DOGRULAMA_ONCELIKLI_KB"
              senaryo_aciklamasi_kullanici: "Kayıp ilanınızda paylaştığınız iletişim bilgilerinin doğruluğu ve size ait olduğu, hayvanınız bulunduğunda size en hızlı ve güvenli şekilde ulaşılabilmesi için teyit edilebilir. Bu, özellikle ödüllü ilanlarda veya hassas durumlarda önemlidir."
              uygulanabilecek_dogrulama_yontemleri_listesi_oncelikli:
                - "Telefon numarasına SMS ile tek kullanımlık kod göndererek doğrulama (Zorunlu)."
                - "E-posta adresine doğrulama linki göndererek teyit alma (Önerilir)."
                - "Çok kritik veya şüpheli durumlarda, platform üzerinden kısa bir kimlik teyidi (video selfie veya resmi belge yükleme - sadece moderatör tarafından görülür, sonra silinir) talep edilebilir (Nadir uygulanır)."
              moderator_kontrol_rehberi_oncelikli: "İletişim bilgilerinin aktif ve ulaşılabilir olması sağlanır. Özellikle yüksek ödüllü ilanlarda veya dolandırıcılık şüphesi olan durumlarda kimlik teyidi adımı gerekebilir. Kullanıcı verilerinin gizliliği esastır."
      veri_yapilandirma_ve_dis_ai_optimizasyonu_kayip_buluntu:
        semantik_icerik_ve_seo_ayarlari:
          akilli_ilan_asistani_icerik_onerileri:
            - { hedef_form_alani_kodu: "ILAN_BASLIK_KB", oneri_basligi_kullanici: "ACİL DURUM BAŞLIĞI: Net, Bilgilendirici ve Konum Odaklı!", oneri_detayi_kullanici: "Başlıkta büyük harflerle 'KAYIP' veya 'BULUNDU' ibaresini, hayvanın türünü (örn: KEDİ, KÖPEK), belirgin bir özelliğini (örn: TEKİR, SARI TASMALI) ve en son görüldüğü/bulunduğu ŞEHİR/İLÇE/MAHALLE bilgisini MUTLAKA belirtin.", neden_onemli_aciklamasi_kullanici: "Acil durumlarda saniyeler önemlidir! Başlığınız, arama motorlarında, sosyal medyada ve platform içinde ilk bakışta en kritik bilgileri vermelidir.", iyi_ornek_metni_kullanici: "Örn: 'KAYIP KEDİ TEKİR - İstanbul/Beşiktaş, Akaretler Civarı, YEŞİL TASMALI!' veya 'BULUNDU KÖPEK Golden Retriever Yavrusu - Ankara/Çankaya, Atakule Parkı'nda Bulundu, SAHİBİ ARANIYOR!'", ipucu_tipi: "KRITIK_ONERI_ACILIYET_VURGUSU", ideal_uzunluk_max: 100 }
            - { hedef_form_alani_kodu: "HAYVANIN_DETAYLI_TARIFI_VE_OZEL_ISARETLERI_KB", oneri_basligi_kullanici: "Hayvanı Eşsiz Kılan HER DETAYI Yazın!", oneri_detayi_kullanici: "Hayvanın rengi, deseni, tüy yapısı, boyutu, kilosu (tahmini), göz rengi, kuyruk yapısı, kulak şekli gibi fiziksel özelliklerini detaylıca yazın. En önemlisi, sadece onu tanıyanların bilebileceği özel işaretler: Vücudundaki yara izi, ben, leke, farklı renkte bir pati, kesik veya kıvrık kulak, özel bir yürüyüş şekli, takılı olan farklı bir aksesuar (çip, dövme, özel kolye vb.).", neden_onemli_aciklamasi_kullanici: "Bu detaylar, hayvanın doğru teşhis edilmesini, benzer hayvanlardan ayırt edilmesini ve kötü niyetli kişilerin yanlış iddialarını engellemeyi sağlar.", ipucu_tipi: "BILGILENDIRME_COK_ONEMLI_DETAY_GEREKLI" }
            - { hedef_form_alani_kodu: "FOTOGRAF_VIDEO_KB", oneri_basligi_kullanici: "EN NET ve GÜNCEL Fotoğraflar/Videolar Hayat Kurtarır!", oneri_detayi_kullanici: "Hayvanın yüzünün, tüm vücudunun ve varsa ayırt edici işaretlerinin ÇOK NET göründüğü, iyi ışıklandırılmış, MÜMKÜNSE FARKLI AÇILARDAN çekilmiş birden fazla GÜNCEL fotoğrafını yükleyin. Eğer kayıpsa, kaybolmadan önceki EN SON hallerini gösteren fotoğraflar idealdir. Bulanık, uzaktan çekilmiş, hayvanın zor seçildiği fotoğraflar arama sürecini olumsuz etkiler. Kısa bir video da çok faydalı olabilir.", neden_onemli_aciklamasi_kullanici: "Görsel kanıt, kayıp/buluntu ilanlarında en hayati unsurdur ve hızlı teşhisi sağlar.", ipucu_tipi: "KRITIK_UYARI_GORSEL_KALITESI_HAYATI" }
          semantik_zenginlik_onemi_katsayisi: 1.0
        yapilandirilmis_veri_ve_meta_etiket_stratejileri:
          kullanilacak_schema_org_tipleri:
            - schema_tipi: "Report" # Kayıp/Buluntu bir "rapor" veya "bildirim"dir.
              # Alternatif: "Event" (kaybolma/bulunma olayı) veya "Observation".
              alan_eslestirmeleri:
                - { schema_alani: "name", platform_alani_kaynagi: "ilan.baslik_kb_schema_icin" } # "Kayıp Kedi Tekir - İstanbul"
                - { schema_alani: "description", platform_alani_kaynagi: "ilan.detay_aciklama_kb_kisa_ozet" }
                - { schema_alani: "reportType", platform_alani_kaynagi: "ilan.ilan_tipi_kb_schema_uyumlu_metin" } # "LostPetReport", "FoundPetReport"
                - { schema_alani: "dateCreated", platform_alani_kaynagi: "ilan.yayin_tarihi_kb_iso" }
                - { schema_alani: "locationCreated", platform_alani_kaynagi: "ilan.kayboldugu_bulundugu_yer_schema_place_objesi" , schema_alt_tipi: "Place"}
                - { schema_alani: "image", platform_alani_kaynagi: "ilan.ana_fotograf_url_kb_schema_icin" }
                - { schema_alani: "keywords", platform_alani_kaynagi: "ilan.anahtar_kelimeler_kb_virgulle_ayrilmis" } # (kayıp, kedi, tekir, istanbul, beşiktaş, yeşil tasma)
                - { schema_alani: "mainEntity", schema_alt_tipi: "Pet", # Kaybolan/bulunan hayvanın kendisi
                    alan_eslestirmeleri_alt_tip: [
                      { schema_alani: "animalType", platform_alani_kaynagi: "hayvan.tur_kb_metin" },
                      { schema_alani: "breed", platform_alani_kaynagi: "hayvan.irk_kb_metin" },
                      { schema_alani: "color", platform_alani_kaynagi: "hayvan.renk_kb_metin" },
                      { schema_alani: "gender", platform_alani_kaynagi: "hayvan.cinsiyet_kb_metin_schema_uyumlu" },
                      { schema_alani: "identifier", platform_alani_kaynagi: "hayvan.mikrocip_numarasi_kb_metin_varsa" } # Mikroçip no
                    ]}
          ozel_meta_etiketler_kayip_buluntu:
            - { etiket_adi: "petplatform:kb_report_type", icerik_kaynagi: "ilan.ilan_tipi_kb_metin" } # LOST / FOUND
            - { etiket_adi: "petplatform:kb_animal_species", icerik_kaynagi: "ilan.hayvan_turu_kb" }
            - { etiket_adi: "petplatform:kb_animal_breed", icerik_kaynagi: "ilan.hayvan_irk_kb" }
            - { etiket_adi: "petplatform:kb_location_city_district", icerik_kaynagi: "ilan.sehir_ilce_mahalle_kb_metin" }
            - { etiket_adi: "petplatform:kb_event_datetime_iso", icerik_kaynagi: "ilan.kayboldugu_bulundugu_tarih_saat_kb_iso" }
            - { etiket_adi: "petplatform:kb_distinguishing_features", icerik_kaynagi: "ilan.ayirt_edici_ozellikler_kb_kisa_ozet_meta_icin" }
            - { etiket_adi: "petplatform:kb_contact_verified", icerik_kaynagi: "ilan.iletisim_bilgisi_dogrulanma_durumu_boolean" } # True/False
            - { etiket_adi: "petplatform:kb_image_count", icerik_kaynagi: "ilan.yuklenen_fotograf_sayisi_integer" }
        harici_platform_ve_api_entegrasyon_hazirligi:
          otomatik_sosyal_medya_paylasim_entegrasyonu_aktif_mi: true # Kullanıcı onayıyla Facebook, Twitter gibi platformlara otomatik paylaşım.
          yerel_yonetim_barinak_kayip_buluntu_sistemleri_ile_api_entegrasyonu_potansiyeli_arastiriliyor_mu: true # (Gelecek hedefi)
          gorsel_erisimi_ve_optimizasyonu_harici_sistemler_icin_kayip_buluntu:
            gorsel_alt_metin_stratejisi_kayip_buluntu: "KAYIP_VEYA_BULUNTU_HAYVAN_TUR_IRK_YER_TARIH"
            # Örn: "KAYIP KEDİ TEKİR İSTANBUL BEŞİKTAŞ 10-HAZIRAN-2025"
            acil_durum_ilanlari_icin_gorsel_cdn_onceliklendirme_aktif_mi: true # Görsellerin çok hızlı yüklenmesi için.
        icerik_kalitesi_ve_guvenilirlik_sinyalleri_harici_sistemler_icin_kayip_buluntu:
          ilan_guncellik_ve_aktiflik_durumu_meta: "petplatform:kb_post_activity_status" # (AKTIF_ARANIYOR, ONAY_BEKLIYOR, BULUNDU_KAPATILDI, ARSIVLENDI)
          sunulan_kanit_seviyesi_meta_kb: "petplatform:kb_evidence_level_provided" # (FOTOGRAF_SADECE, FOTOGRAF_VE_DETAYLI_BILGI, VETERINER_KAYDI_EKLI)
          topluluk_etkilesim_ve_destek_skoru_meta_kb: "petplatform:kb_community_engagement_score" # (Paylaşım, yorum, yardım teklifi sayısı gibi metriklerden türetilebilir)
      istatistikler:
        beklenen_performans_metrikleri:
          - "Ortalama ilan görüntülenme (ilk 24-48 saat): Çok Yüksek, viral olma potansiyeli"
          - "Başarılı kavuşma/sonuçlanma oranı hedefi: %50-60 (Hızlı ve doğru bilgi girişi, yaygın paylaşım ve topluluk desteği ile artar)"
          - "Ortalama bulunma/kavuşma süresi: 1-7 gün (ilk 72 saat kritik), ancak haftalar/aylar sürebilir."
          - "Platformun toplumsal fayda ve acil durum yönetimi rolünün en belirgin olduğu kategori."
          - "Kullanıcıların platforma olan güvenini ve duygusal bağını pekiştirir."
          - "Yanlış ihbar ve dolandırıcılık girişimlerini engelleme başarısı: %99 (hedeflenen, sıkı moderasyon ve doğrulama ile)."    acil_durum:
