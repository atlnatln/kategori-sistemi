          - { alan_adi: "beslenme_su_durumu_gozlem_buluntu_kb", label: "Beslenme ve Su Durumu Gözlemi (Buluntu İse)", tip: "textarea", bagimli_alan_goster: "ilan_tipi_kb", bagimli_degerler_goster: ["Buluntu Hayvan Bildirimi (Hayvan Buldum, Sahibini Arıyorum/Koruyorum)"], aciklama: "Çok aç veya susuz görünüyor muydu? Bir şey yiyip içti mi? Ne tür yiyeceklere ilgi gösterdi?", ai_importance: 0.5, zorunlu: false }
