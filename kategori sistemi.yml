          - { alan_adi: "olay_yeri_adres_acil", label: "Olay Yeri Adresi", tip: "location_text", aciklama: "Net adres veya konum tarifi.", ai_importance: 0.98, zorunlu: true }
          - { alan_adi: "olay_yeri_sehir_ilce_acil", label: "Şehir/İlçe", tip: "location_selects", ai_importance: 0.95, zorunlu: true }
          - { alan_adi: "olay_tarih_saat_acil", label: "Olay Tarih ve Saati", tip: "datetime", ai_importance: 0.8, zorunlu: true }
          - { alan_adi: "hayvanin_durumu_detay_acil", label: "Hayvanın Durumu (Detaylı)", tip: "textarea", aciklama: "Gözlemlenen belirtiler, yaralanmanın boyutu.", ai_importance: 0.9, zorunlu: true }
          - { alan_adi: "talep_edilen_yardim_turu_acil", label: "Talep Edilen Yardım Türü", tip: "multiselect", secenekler: ["Acil Veteriner Müdahalesi", "Nakil Desteği", "Geçici Güvenli Yuva", "Maddi Destek (klinik masrafı)", "Mama/Malzeme Desteği", "Yasal Yardım/İhbar", "Kurtarma Ekibi"], ai_importance: 0.9, zorunlu: true }
          - { alan_adi: "iletisim_bilgileri_cok_acil", label: "ÇOK ACİL İletişim Bilgileri", tip: "phone_validated_multiline", aciklama: "Telefon (zorunlu), WhatsApp", ai_importance: 1.0, zorunlu: true }
