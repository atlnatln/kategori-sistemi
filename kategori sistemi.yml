          - { alan_adi: "kayboldugu_bulundugu_tarih_saat_kb", label: "Kaybolduğu/Bulunduğu Tarih ve Yaklaşık Saat", tip: "datetime_flexible", aciklama: "Mümkün olduğunca net tarih ve saat aralığı belirtin.", ai_importance: 0.9, zorunlu: true } # Tip esnekleştirildi.
