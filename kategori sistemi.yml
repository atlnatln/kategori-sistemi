          - { alan_adi: "tasma_aksesuar_durumu_kb", label: "Üzerindeki Tasma/Aksesuar Bilgileri", tip: "textarea", aciklama: "Tasması var mıydı? Ne renk, malzemesi ne? Künyesi, isimlik, GPS takip cihazı, kıyafet vb. var mıydı? Detay verin.", ai_importance: 0.75, zorunlu: false }
