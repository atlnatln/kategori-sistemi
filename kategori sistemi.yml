              - { alan_adi: "hayvan_saglik_gecmisi_ess", label: "Bilinen Kronik Hastalığı / Alerjisi / Özel Durumu", tip: "textarea", zorunlu: false, aciklama: "Varsa, lütfen detaylı bilgi verin.", ai_importance: 0.85 }
              - { alan_adi: "hayvan_kullandigi_ilac_mama_ess", label: "Düzenli Kullandığı İlaç veya Özel Mama", tip: "text", zorunlu: false, ai_importance: 0.7 }
              - { alan_adi: "hayvan_veteriner_bilgileri_ess", label: "Veteriner Hekim Bilgileri (Opsiyonel)", tip: "text", aciklama: "Takip eden veterinerin adı ve kliniği.", ai_importance: 0.5, zorunlu: false }
              - { alan_adi: "hayvan_fotograflari_videolari_ess", label: "Hayvanın Güncel Fotoğrafları ve Videoları", tip: "multiple_file_upload", zorunlu: true, aciklama: "Net, farklı açılardan ve mümkünse yaşam alanını gösteren görseller.", ai_importance: 0.95 }
          sahiplendirme_sartlari_grubu:
