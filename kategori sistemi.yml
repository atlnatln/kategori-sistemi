        gorsel_kimlik: { renk_kodu: "#F97316", tema_notu: "Turuncu (Geçiş ve Değişim Rengi)", ikon_adi: "fas fa-home-heart", emoji: "🏠💔", tema_renk_paleti: { ana_renk: "#F97316", acik_ton: "#FED7AA", koyu_ton: "#EA580C", vurgu_rengi: "#DC2626", yazi_rengi: "#1F2937" } }
      kategori_tipi: "ticari" # Orijinalde "ticari" olarak belirtilmiş
      ana_kategori_yorumu: "Görüşülür'ün alt kategorisi" # Orijinaldeki not
      arama_sistemi: # Orijinaldeki gibi detaylı kalabilir, JSONField'a gömülecek
        ana_etiketler: ["ev sahibi satışı", "kişisel zorunluluk", "mecburen satıyorum", "taşınma nedeniyle", "zorunlu ayrılık"]
        alternatif_kelimeler: # Bu alt gruplama JSONField'da korunabilir
          zorunluluk_kelimeleri: ["mecburen satıyorum", "zorunlu satış", "zorunda kaldım", "başka çarem yok", "istemeyerek satıyorum", "çaresiz satış", "mecburiyet"]
          neden_durumu: ["taşınma nedeniyle", "ekonomik nedenlerle", "ailevi sebepler", "sağlık problemi nedeniyle", "apartman yasağı", "yurt dışı taşınma", "iş değişikliği", "evlilik/boşanma", "yeni bebek", "alerji problemi", "zaman yetersizliği", "bakım masrafları", "komşu şikayeti"]
          duygusal_yaklaşim: ["ağır kalpte ayrılık", "sevgili dostuma yuva", "iyi ellere emanet", "sorumlu sahip arıyorum", "hayvan dostu aile", "göz bebeğimi veriyorum", "canımdan geçer gibi", "son çare", "kalbi kırık sahiplendirme"]
          hayvan_durumu: ["evde büyümüş", "sosyalleşmiş hayvan", "ailemizin ferdi", "çok sevilen dostumuz", "uysal karakter", "çocuk dostu", "eğitimli hayvan", "sağlıklı dostum", "bakımlı hayvan"]
          satis_tercihi: ["ücretsiz sahiplendirme tercihi", "sembolik ücret", "sadece iyi eller", "takip edilebilir sahiplendirme", "ev ziyareti şartlı", "sorumlu aile aranıyor", "referans istiyorum", "deneyimli sahip"]
        seo_anahtar_kelimeler: ["mecburen hayvan satışı", "taşınma hayvan problemi", "zorunda kalarak sahiplendirme", "ekonomik sebep hayvan", "apartman hayvan yasağı", "aile durumu hayvan"]
        ai_intent_keywords: ["hayvanımı vermek zorundayım", "yeni yuva arıyorum acil", "petimi satmak zorundayım nedenleri", "sorumlu aileye devir", "mecburi hayvan sahiplendirme"]
        semantic_tags: ["owner_rehoming", "personal_reasons_pet_sale", "empathetic_adoption", "urgent_rehoming_owner", "responsible_pet_transfer", "compassionate_rehoming"]
      akilli_filtreler: # Orijinaldeki gruplu yapı korunuyor
        ozel_filtre_alanlari_gruplu: # Django'da JSONField içinde bu yapı saklanabilir
          satis_gerekce_grubu:
            grup_basligi: "Satış Nedeni ve Motivasyon"
            alanlar:
              - { alan_adi: "satis_nedeni_kategori", label: "Satış Nedeni", tip: "select", zorunlu: true, secenekler: ["Taşınma (Yurt İçi/Dışı)", "Ekonomik Durum Değişikliği", "Aile Yapısı Değişimi (Bebek, Evlilik, Boşanma)", "Sağlık Problemi (Alerji, Kronik Hastalık)", "Zaman Yetersizliği (İş, Eğitim)", "Konut Kısıtlaması (Apartman Yasağı, Komşu)", "Hayvan Davranış Sorunu", "Diğer Hayvanla Uyumsuzluk", "Yaşlılık/Fiziksel Yetersizlik", "Diğer (Açıklama Gerekli)"], aciklama: "Satış nedeninizi seçiniz", ai_importance: 0.95 }
              # ... (GitHub'daki satis_gerekce_grubu'nun diğer alanları) ...
          hayvan_gecmis_grubu:
            grup_basligi: "Hayvan Geçmişi ve Mevcut Durum"
            alanlar:
              - { alan_adi: "hayvan_mevcut_yas", label: "Hayvanın Yaşı", tip: "text", zorunlu: true, aciklama: "Hayvanınız kaç yaşında? (Örn: 2 yaş 3 ay)", ai_importance: 0.8 }
              # ... (GitHub'daki hayvan_gecmis_grubu'nun diğer alanları) ...
          # ... (Diğer tüm filtre grupları: karakter_davranis_grubu, saglik_bakim_grubu, sahiplendirme_sartlari_grubu, yeni_sahip_tercihleri_grubu, duygusal_pratik_grubu, iletisim_surec_grubu - GitHub'daki gibi detaylandırılacak) ...
      platform_ayarlari: # Orijinaldeki tüm platform_ayarlari buraya
        varsayilan_ilan_suresi: "45 gün"
        uzatma_imkani: true
        otomatik_uzatma: false
        maksimum_uzatma_sayisi: 2
        ai_priority_score: 1.3 # oncelik_katsayisi
        algoritma_bonusu_data: { hikaye_detayi_bonusu: 0.2, fotograf_sayisi_bonusu: 0.1, takip_sistemi_bonusu: 0.15 } # JSON olarak
        moderasyon_seviyesi: "Yüksek"
        otomatik_onay: false
        hizli_onay_kriterleri: ["Daha önce onaylanmış kullanıcı", "Eksiksiz form doldurma", "Veteriner belgesi mevcutsa"]
        ozel_dogrulama_gerekliligi: | # Multiline string olarak korunabilir veya JSON listesi yapılabilir
          ZORUNLU DOĞRULAMALAR:
          1. Hayvanın mevcut yaşam koşulları (fotoğraf/video)
          2. Veteriner kayıtları (aşı kartı, sağlık raporu)
          3. Sahiplendirme motivasyonunun samimiyeti (form analizi)
          4. Kimlik doğrulaması (ciddi başvurucular için)
          5. İletişim bilgilerinin geçerliliği
        kredi_maliyeti_katsayisi: 0.9
        indirim_kriterleri: { ilk_ev_sahibi_satisi: "%20 indirim", acil_durum_belirlenmesi: "%30 indirim", takip_sistemi_kabulu: "%15 indirim" }
        ozel_destek_sistemleri_data: # JSON olarak
          duygusal_destek: ["Ayrılık süreci rehber dökümanı", "Platform psikoloğu ile görüşme hattı", "Alternatif çözümler rehberi", "Zorunlu ayrılık destek grubu"]
          teknik_destek: ["Fotoğraf çekimi rehberi", "Hikaye anlatımı şablonları", "Veteriner belge yardımı", "Form doldurma asistanı"]
          takip_garanti_sistemi: ["30 gün uyum takibi", "Fotoğraf/video geri bildirim", "Veteriner kontrol raporları", "Geri alma garantisi süreci"]
      ai_ml_config: # Orijinaldeki kategori_ozel_sistemler, eslesme_optimizasyonu buraya entegre edilebilir
        semantic_weight: 0.9
        nlp_features_enabled: ["sentiment_analysis_owner_story", "urgency_detection_owner", "motivation_classification", "empathy_level_assessment", "story_completeness_checker"]
        ml_model_suggestions: ["empathetic_matchmaking_model", "owner_support_needs_predictor", "successful_rehoming_predictor_owner", "transition_guidance_generator", "profile_quality_scorer"]
        # Orijinaldeki kategori_ozel_sistemler'den AI ile ilgili kısımlar:
        duygusal_destek_sistemi_ai: { ilan_oncesi_rehberler: true, ilan_sirasinda_sablonlar: true, ilan_sonrasi_takip_destegi: true }
        kalite_guvence_sistemi_ai: { hayvan_dogrulama_analizi: true, sahip_dogrulama_sinyalleri: true, ilan_kalite_otomatik_kontrol: true }
        takip_garanti_sistemi_ai_raporlamasi: { takip_asamalari_otomatik_hatirlatma: true, garanti_kapsami_bilgilendirme: true }
        eslesme_optimizasyonu_algoritma_faktörleri: ["Hayvan karakter özellikleri", "Sahip yaşam tarzı tercihleri", "Konut uygunluğu", "Deneyim seviyesi eşleşmesi", "Bölgesel yakınlık", "Zaman uygunluğu"]
        akilli_oneri_kaynaklari: ["Benzer başarılı sahiplendirmeler", "Karakter uyumu yüksek profiller", "Lokasyon avantajlı seçenekler", "Deneyim seviyesi uygun sahipler", "Takip sistemi kabul eden aileler"]
      istatistikler: # Orijinaldeki istatistikler ve basari_kriterleri buraya özetlenebilir
        beklenen_performans_metrikleri_genel: { ort_goruntulenme: "Yüksek", basarili_sahiplendirme_hedefi: "%75", ort_sahiplendirme_suresi: "20-35 gün", platformda_kalma_suresi: "25 gün", basvuru_alma_orani: "%90" }
        beklenen_performans_metrikleri_kalite: { geri_alma_orani: "<%5", memnuniyet_skoru: "9.2/10", takip_basarisi: "%85" }
        # Diğer metrikler ve basari_kriterleri JSONField içinde detaylı saklanabilir.
      # kullanici_yasanti_senaryolari ve platform_entegrasyonu gibi çok detaylı bölümler,
