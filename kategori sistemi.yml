          - { alan_adi: "talep_aciliyeti_talep", label: "Talep Aciliyeti", tip: "select", secenekler: ["Çok Acil (1-3 gün)", "Acil (1 Hafta İçinde)", "Makul Süre (1 Ay İçinde)", "Belirli Bir Tarihe Kadar", "Acil Değil"], ai_importance: 0.7, zorunlu: true }
          - { alan_adi: "istenilen_ozellikler_detay_talep", label: "İstenilen Özellikler/Detaylar", tip: "textarea", aciklama: "Aradığınız hayvanın/ürünün/hizmetin sahip olması gereken spesifik özellikler, beklentileriniz.", ai_importance: 0.9, zorunlu: true }
          - { alan_adi: "butce_araligi_talep", label: "Bütçe Aralığı (Opsiyonel)", tip: "text_price_range", aciklama: "Bu talep için ayırabileceğiniz yaklaşık bütçe. Örn: 500-1000 TL", ai_importance: 0.6, zorunlu: false }
          - { alan_adi: "konum_tercihi_talep", label: "Konum Tercihi (Şehir/Bölge)", tip: "location_text", aciklama: "Hizmeti/ürünü/hayvanı hangi şehirden veya bölgeden arıyorsunuz?", ai_importance: 0.75, zorunlu: false }
          - { alan_adi: "iletisim_tercihi_talep", label: "Tercih Edilen İletişim Yöntemi", tip: "select", secenekler: ["Platform Mesajı", "Telefon", "E-posta"], ai_importance: 0.5, zorunlu: true }
      platform_ayarlari_talep_ilani: # Eski platform_ayarlari buraya
        ilan_yasam_dongusu_ve_ucretlendirme:
          ilan_tipi_modeli: "KREDI_BAZLI_YAYINLAMA_COK_DUSUK_MALIYETLI"
          # Açıklama: Talep ilanları, platforma değer kattığı ve tedarikçilere iş fırsatı sunduğu için çok düşük maliyetli veya ücretsiz olabilir.
          varsayilan_aktif_kalma_suresi_gun_standart_ilan: 30 # Talepler genellikle daha kısa sürelidir.
          kredi_maliyeti_standart_ilan_yayinlama: 2 # Örnek, çok düşük birim kredi (veya 0)
          # kredi_maliyeti_katsayisi: 0.7 # Genel bir çarpan olarak kullanılabilir.
          one_cikarma_secenekleri_talep_ilanlari:
            - { secenek_kodu: "TALEP_ONE_CIKAR_TEDARIKCI_BILDIRIMI_7GUN", gosterilecek_ad_kullanici: "Talebi Öne Çıkar + İlgili Tedarikçilere Bildir (7 Gün)", ek_kredi_maliyeti: 5, aciklama_kullanici: "Talebinizi 7 gün boyunca daha görünür yapın ve potansiyel olarak ilgili kayıtlı tedarikçilere bildirim gönderilsin."}
          ilan_yenileme_politikasi_talep:
            yenileme_kredi_maliyeti_orani_standart_ilana_gore: 1.0 # Aynı düşük maliyetle.
            otomatik_yenileme_secenegi_sunulacak_mi: false
        operasyonel_onceliklendirme_ve_gorunurluk:
          oncelik_katsayisi_platform_ici_talep: 0.9 # Normalden biraz düşük, çünkü bu bir "arz" değil "talep".
          tedarikcilere_yonelik_ozel_talep_paneli_aktif_mi: true # Kayıtlı üreticilerin/hizmet sağlayıcıların talepleri kolayca görebileceği bir panel.
        moderasyon_ayarlari:
          seviye: "DUSUK_ORTA_TEMEL_UYGUNLUK_KONTROLU"
          # Açıklama: Talepler genellikle iyi niyetlidir, ancak spam, alakasız veya imkansız talepler filtrelenmelidir.
          yeni_ilan_varsayilan_durum: "YAYINDA_HIZLI_KONTROL_GEREKLI"
          yasakli_veya_etik_olmayan_talep_kontrolu_aktif_mi: true # (Örn: Yasaklı hayvan türü talebi)
        dogrulama_ve_guvenlik_protokolleri_talep_ilani:
