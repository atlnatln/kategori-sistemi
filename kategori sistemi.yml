platform_kategori_sistemi:
  # ----------------------------------------------------------------------------------------------
  # ÜCRETSİZ İLAN KATEGORİLERİ
  # ----------------------------------------------------------------------------------------------
  ucretsiz_ilan_kategorileri:
    sahiplendirme:
      id: "cat_ucretsiz_sahiplendirme" # Benzersiz ID
      temel_kimlik:
        ad: "Sahiplendirme (Yuva Arayan Canlar)"
        slug: "sahiplendirme-yuva-arayan-canlar"
        aciklama: "Sevgi dolu bir yuvaya ihtiyaç duyan köpek, kedi, kuş ve diğer tüm canlar için açılan ilanlar. Onlara kalıcı ve mutlu bir yuva bulmak temel amacımızdır."
        gorsel_kimlik: { renk_kodu: "#FFDAB9", tema_notu: "Şeftali Rengi (Sıcaklık ve Umut)", ikon_adi: "fas fa-heart-paw", alternatif_ikonlar: "fas fa-paw, fas fa-home-heart", emoji: "🏠❤️" }
      kategori_tipi: "ucretsiz"
      arama_sistemi:
        alternatif_kelimeler: ["yuva arıyorum", "pet sahiplen", "ücretsiz hayvan", "satınalma sahiplen", "evcil hayvan sahiplenme", "kurtarılmış hayvan", "barınaktan sahiplen", "geçici yuvadan kalıcı yuvaya", "arkadaş arıyorum (hayvan)", "aileye can kat", "ömürlük dost", "ikinci şans", "terk edilmiş hayvan", "pati bul", "sevgiye muhtaç", "ev arkadaşı (hayvan)", "can dostu", "sokaktan kurtarılan", "melek arıyor"]
        ai_intent_keywords: ["yuva bul", "sahiplenmek istiyorum", "ücretsiz pet", "evcil hayvan edinme", "hayvan dostu arıyorum", "ömürlük yuva"]
        semantic_tags: ["adoption", "rescue", "pet_rehoming", "forever_home", "animal_welfare", "free_pet_adoption"]
      akilli_filtreler:
        ozel_filtre_alanlari:
          - { alan_adi: "hayvan_turu_sahiplendirme", label: "Hayvan Türü", tip: "select", secenekler: ["Köpek", "Kedi", "Kuş", "Kemirgen", "Sürüngen", "Balık", "Diğer (Egzotik olmayan)"], ai_importance: 0.95, zorunlu: true }
          - { alan_adi: "hayvan_irk_sahiplendirme", label: "Hayvan Irkı", tip: "text", aciklama: "İsteğe bağlı, kırma ise belirtilebilir.", ai_importance: 0.7, zorunlu: false }
          - { alan_adi: "hayvan_yas_sahiplendirme", label: "Yaş Aralığı", tip: "select", secenekler: ["Yavru (0-1 yaş)", "Genç (1-3 yaş)", "Yetişkin (3-7 yaş)", "Yaşlı (7+ yaş)"], ai_importance: 0.85, zorunlu: true }
          - { alan_adi: "hayvan_cinsiyet_sahiplendirme", label: "Cinsiyet", tip: "select", secenekler: ["Erkek", "Dişi"], ai_importance: 0.75, zorunlu: false }
          - { alan_adi: "hayvan_boyut_sahiplendirme", label: "Boyut (Türe Göre)", tip: "select", secenekler: ["Küçük", "Orta", "Büyük"], ai_importance: 0.7, zorunlu: false }
          - { alan_adi: "saglik_durumu_sahiplendirme", label: "Sağlık Durumu", tip: "select_aciklamali", secenekler_map: { "Sağlıklı": false, "Özel Bakım Gerekiyor": true, "Engelli": true }, ai_importance: 0.9, zorunlu: true, aciklama_label: "Sağlık Durumu Açıklaması" }
          - { alan_adi: "kisirlastirma_durumu_sahiplendirme", label: "Kısırlaştırma Durumu", tip: "select_aciklamali", secenekler_map: { "Kısırlaştırılmış": false, "Kısırlaştırılacak": false, "Kısırlaştırılmamış": true, "Bilinmiyor": false }, ai_importance: 0.8, zorunlu: false, aciklama_label: "Kısırlaştırılmamışsa Nedeni?" }
          - { alan_adi: "asi_durumu_sahiplendirme", label: "Aşı Durumu", tip: "select", secenekler: ["Aşıları Tam", "Aşıları Eksik", "Aşısız", "Bilinmiyor"], ai_importance: 0.8, zorunlu: false }
          - { alan_adi: "ic_dis_parazit_sahiplendirme", label: "İç/Dış Parazit Tedavisi", tip: "select", secenekler: ["Yapıldı", "Yapılacak", "Bilinmiyor"], ai_importance: 0.7, zorunlu: false }
          - { alan_adi: "karakter_ozellikleri_sahiplendirme", label: "Karakter Özellikleri", tip: "multiselect", secenekler: ["Oyuncu", "Sakin", "Uysal", "Çocuklarla İyi", "Diğer Hayvanlarla İyi", "Yalnız Kalabilir", "Enerjik", "Kucakçı", "Bağımsız", "Ürkek"], ai_importance: 0.9, zorunlu: false }
          - { alan_adi: "egitim_seviyesi_tuvalet_sahiplendirme", label: "Tuvalet Eğitimi", tip: "select", secenekler: ["Tuvalet Eğitimi Var", "Kısmen Var", "Yok"], ai_importance: 0.8, zorunlu: false }
          - { alan_adi: "egitim_seviyesi_temel_itaat_sahiplendirme", label: "Temel İtaat Eğitimi", tip: "select", secenekler: ["Var", "Kısmen Var", "Yok"], hayvan_turu_bagimliligi: "Köpek", ai_importance: 0.75, zorunlu: false }
          - { alan_adi: "bulundugu_yer_sahiplendirme", label: "Bulunduğu Yer", tip: "location_text", aciklama: "Şehir, İlçe (veya Geçici Yuva/Barınak Adı)", ai_importance: 0.9, zorunlu: true }
          - { alan_adi: "sahiplendirme_sartlari_sahiplendirme", label: "Sahiplendirme Şartları", tip: "textarea", aciklama: "Takip şartı, sözleşme, ev ziyareti vb.", ai_importance: 0.7, zorunlu: false }
          - { alan_adi: "neden_yuva_ariyor_sahiplendirme", label: "Neden Yuva Arıyor?", tip: "textarea", aciklama: "Bulundu, Barınak kapasitesi, Sahibi vefat etti vb.", ai_importance: 0.65, zorunlu: false }
          - { alan_adi: "gecici_yuva_olur_mu_sahiplendirme", label: "Geçici Yuva Olur Mu?", tip: "boolean", aciklama: "Kalıcı yuva öncelikli ama geçici de olur mu?", ai_importance: 0.5, zorunlu: false }
          - { alan_adi: "ozel_ihtiyac_detay_sahiplendirme", label: "Özel İhtiyaç Detayları", tip: "textarea", aciklama: "Varsa özel mama, ilaç, davranış problemi.", ai_importance: 0.7, zorunlu: false }
          - { alan_adi: "cocuklu_aile_uygunlugu_sahiplendirme", label: "Çocuklu Aileye Uygunluk", tip: "select", secenekler: ["Çok Uygun", "Uygun (deneyimli aile)", "Dikkat Gerekir", "Uygun Değil"], ai_importance: 0.8, zorunlu: false }
          - { alan_adi: "apartman_hayatina_uygunluk_sahiplendirme", label: "Apartman Hayatına Uygunluk", tip: "select", secenekler: ["Uygun", "Bahçeli Ev Tercihi", "Uygun Değil"], ai_importance: 0.7, zorunlu: false }
          - { alan_adi: "ilk_kez_hayvan_sahiplenecek_kisiye_uygunluk_sahiplendirme", label: "İlk Kez Sahiplenecek Kişiye Uygunluk", tip: "select", secenekler: ["Uygun", "Deneyim Tercih Edilir", "Uygun Değil"], ai_importance: 0.75, zorunlu: false }
          - { alan_adi: "sahiplendiren_iletisim_tercihi_sahiplendirme", label: "Sahiplendiren İletişim Tercihi", tip: "multiselect", secenekler: ["Platform Mesajı", "Telefon (isteğe bağlı)", "E-posta (isteğe bağlı)"], ai_importance: 0.5, zorunlu: true }
          - { alan_adi: "mikrocip_durumu_sahiplendirme", label: "Mikroçip Durumu", tip: "select", secenekler: ["Var", "Yok", "Bilinmiyor"], ai_importance: 0.6, zorunlu: false }
          - { alan_adi: "kopekler_icin_enerji_seviyesi_sahiplendirme", label: "Enerji Seviyesi (Köpekler için)", tip: "select", secenekler: ["Düşük", "Orta", "Yüksek"], hayvan_turu_bagimliligi: "Köpek", ai_importance: 0.7, zorunlu: false }
          - { alan_adi: "kediler_icin_tuy_tipi_sahiplendirme", label: "Tüy Tipi (Kediler için)", tip: "select", secenekler: ["Kısa", "Orta", "Uzun"], hayvan_turu_bagimliligi: "Kedi", ai_importance: 0.6, zorunlu: false }
          - { alan_adi: "kuslar_icin_tur_sahiplendirme", label: "Kuş Türü (Kuş ise)", tip: "text", hayvan_turu_bagimliligi: "Kuş", ai_importance: 0.5, zorunlu: false }
          - { alan_adi: "fotograf_video_zorunlulugu_sahiplendirme", label: "Fotoğraf/Video Yükleme", tip: "file_upload_rule", kural: "En az 3 net fotoğraf zorunludur.", ai_importance: 0.8, zorunlu: true }
      platform_ayarlari:
        varsayilan_ilan_suresi: "Sınırsız (ilan sahibi güncel tutmalı, periyodik kontrol)"
        varsayilan_ilan_suresi_alternatif: "Veya 90 gün + yenileme" # Orijinaldeki not
        ai_priority_score: 1.8 # Orijinaldeki "oncelik_katsayisi"
        moderasyon_seviyesi: "Yüksek"
        ozel_dogrulama_gerekliligi: "Evet, veteriner kayıtları (mümkünse), sahiplendirme sözleşmesi örneği, geçici yuva/barınak ise mekan fotoğrafları."
      ai_ml_config:
        semantic_weight: 0.95
        nlp_features_enabled: ["sentiment_analysis", "intent_classification", "story_understanding", "urgency_detection", "key_attribute_extraction"]
        ml_model_suggestions: ["match_scoring_model", "adoption_success_predictor", "user_preference_learner", "fraud_detection_free", "image_quality_analyzer"]
      istatistikler: # Orijinaldeki liste yapısı korunuyor
        beklenen_performans_metrikleri:
          - "Ortalama ilan görüntülenme: Çok Yüksek"
          - "Başarılı sahiplendirme oranı hedefi: %75 (doğru eşleşme ile)"
          - "Ortalama sahiplendirme süresi: 15-45 gün (tür ve yaşa göre değişir)"
          - "Topluluk katılımı ve paylaşımı: Çok Yüksek"

    kayip_buluntu:
      id: "cat_ucretsiz_kayipbuluntu"
      temel_kimlik:
        ad: "Kayıp / Buluntu Hayvanlar"
        slug: "kayip-buluntu-hayvanlar"
        aciklama: "Kaybolan can dostlarımızı bulmak veya bulunan sahipsiz hayvanları sahiplerine kavuşturmak için açılan acil yardım ilanları."
        gorsel_kimlik: { renk_kodu: "#FDE047", tema_notu: "Limon Sarısı (Dikkat ve Aciliyet)", ikon_adi: "fas fa-search-location", emoji: "🔍" }
      kategori_tipi: "ucretsiz"
      arama_sistemi:
        alternatif_kelimeler: ["kayıp kedi", "kayıp köpek", "bulunan hayvan", "sahibi aranıyor", "evcil hayvanım kayboldu", "sokakta bulundu", "tasmalı bulundu", "yardım kayıp", "pet bul", "evini arıyor", "kayıp ilanları", "buluntu ilanları", "acil kayıp", "sahibine ulaştır", "afiş (kayıp hayvan)", "gören oldu mu", "nerede bu can", "kayıp kuş", "kayıp egzotik"]
        ai_intent_keywords: ["kayıp hayvan bildirimi", "buluntu hayvan ilanı", "sahibini arıyorum", "petimi kaybettim", "hayvan buldum", "acil kayıp pet"]
        semantic_tags: ["lost_pet", "found_pet", "animal_search", "reunite_pet", "missing_animal_alert", "urgent_search", "pet_finder"]
      akilli_filtreler:
        ozel_filtre_alanlari:
          - { alan_adi: "ilan_tipi_kb", label: "İlan Tipi", tip: "select", secenekler: ["Kayıp Hayvan Bildirimi", "Buluntu Hayvan Bildirimi"], ai_importance: 0.98, zorunlu: true }
          - { alan_adi: "hayvan_turu_kb", label: "Hayvan Türü", tip: "select", secenekler: ["Köpek", "Kedi", "Kuş", "Diğer"], ai_importance: 0.9, zorunlu: true }
          - { alan_adi: "hayvan_irk_kb", label: "Hayvan Irkı", tip: "text", aciklama: "Belirginse.", ai_importance: 0.6, zorunlu: false }
          - { alan_adi: "hayvan_yas_tahmini_kb", label: "Hayvanın Tahmini Yaşı", tip: "text", ai_importance: 0.5, zorunlu: false }
          - { alan_adi: "hayvan_cinsiyet_kb", label: "Cinsiyet", tip: "select", secenekler: ["Erkek", "Dişi", "Bilinmiyor"], ai_importance: 0.7, zorunlu: false }
          - { alan_adi: "hayvan_renk_desen_kb", label: "Hayvanın Rengi/Deseni", tip: "textarea", aciklama: "Belirgin renk ve işaretleri.", ai_importance: 0.85, zorunlu: true }
          - { alan_adi: "ayirt_edici_ozellikler_kb", label: "Ayırt Edici Özellikler", tip: "textarea", aciklama: "Yara izi, özel tasma, davranış vb.", ai_importance: 0.8, zorunlu: false }
          - { alan_adi: "kayboldugu_bulundugu_tarih_saat_kb", label: "Kaybolduğu/Bulunduğu Tarih ve Saat", tip: "datetime", ai_importance: 0.9, zorunlu: true }
          - { alan_adi: "kayboldugu_bulundugu_adres_kb", label: "Kaybolduğu/Bulunduğu Adres", tip: "location_text", aciklama: "Mahalle, Cadde, Önemli Nokta.", ai_importance: 0.95, zorunlu: true }
          - { alan_adi: "kayboldugu_bulundugu_sehir_ilce_kb", label: "Şehir/İlçe", tip: "location_selects", ai_importance: 0.9, zorunlu: true } # Orijinaldeki "Selects"
          - { alan_adi: "tasma_aksesuar_durumu_kb", label: "Tasma/Aksesuar Durumu", tip: "textarea", aciklama: "Tasması var mıydı? Ne renk? Künyesi var mı?", ai_importance: 0.75, zorunlu: false }
          - { alan_adi: "mikrocip_bilgisi_kb", label: "Mikroçip Bilgisi", tip: "select_aciklamali", secenekler_map: { "Var": true, "Yok": false, "Bilinmiyor": false }, aciklama_label: "Mikroçip Numarası?", ai_importance: 0.8, zorunlu: false }
          - { alan_adi: "son_goruldugu_yer_davranis_kb", label: "Son Görüldüğü Yer ve Davranış (Kayıp ise)", tip: "textarea", ai_importance: 0.7, zorunlu: false }
          - { alan_adi: "bulundugundaki_davranis_saglik_kb", label: "Bulunduğundaki Davranış ve Sağlık (Buluntu ise)", tip: "textarea", aciklama: "Ürkek mi, cana yakın mı, yaralı mı?", ai_importance: 0.7, zorunlu: false }
          - { alan_adi: "iletisim_bilgileri_acil_kb", label: "Acil İletişim Bilgileri", tip: "phone_validated_multiline", aciklama: "Telefon (zorunlu), Alternatif İletişim", ai_importance: 0.98, zorunlu: true }
          - { alan_adi: "kayip_ilani_icin_odul_kb", label: "Ödül Miktarı (Kayıp ise)", tip: "number_currency", para_birimi: "TL", aciklama: "İsteğe bağlı.", ai_importance: 0.4, zorunlu: false }
          - { alan_adi: "buluntu_hayvan_gecici_bakim_durumu_kb", label: "Geçici Bakım Durumu (Buluntu ise)", tip: "textarea", aciklama: "Nerede bakılıyor? Kliniğe götürüldü mü?", ai_importance: 0.6, zorunlu: false }
          - { alan_adi: "fotograf_video_kb", label: "Fotoğraf/Video", tip: "file_upload_rule", kural: "Çok önemli, net fotoğraflar yüklenmelidir.", ai_importance: 0.95, zorunlu: true }
          - { alan_adi: "ilan_verenin_rolu_kb", label: "İlan Verenin Rolü", tip: "select", secenekler: ["Sahibiyim", "Bulan Kişiyim", "Şahit Oldum"], ai_importance: 0.7, zorunlu: true }
          - { alan_adi: "hayvanin_genel_karakteri_kb", label: "Hayvanın Genel Karakteri (Sahibi biliyorsa)", tip: "textarea", ai_importance: 0.6, zorunlu: false }
          - { alan_adi: "yakalanma_zorlugu_kb", label: "Yakalanma Zorluğu (Buluntu ise)", tip: "select", secenekler: ["Kolay yakalanır", "Ürkek kaçıyor", "Profesyonel yardım gerekebilir"], ai_importance: 0.65, zorunlu: false }
          - { alan_adi: "beslenme_durumu_kb", label: "Beslenme Durumu (Buluntu ise)", tip: "textarea", aciklama: "Aç mı görünüyor, ne yiyor?", ai_importance: 0.5, zorunlu: false }
          - { alan_adi: "ihbar_yapilan_kurumlar_kb", label: "İhbar Yapılan Kurumlar", tip: "multiselect_text", secenekler_onerilen: ["Belediye", "Barınak", "Polis"], ai_importance: 0.4, zorunlu: false }
          - { alan_adi: "sosyal_medya_paylasim_linkleri_kb", label: "Sosyal Medya Paylaşım Linkleri", tip: "url_list", aciklama: "İsteğe bağlı.", ai_importance: 0.3, zorunlu: false }
          - { alan_adi: "kayip_suresi_tahmini_kb", label: "Kayıp Süresi Tahmini (Kayıp ise)", tip: "text", ai_importance: 0.5, zorunlu: false }
          - { alan_adi: "insanlara_yaklasimi_kb", label: "İnsanlara Yaklaşımı (Buluntu ise)", tip: "select", secenekler: ["Cana yakın", "Korkak", "Agresif değil ama mesafeli"], ai_importance: 0.6, zorunlu: false }
          - { alan_adi: "diger_hayvanlara_tepkisi_kb", label: "Diğer Hayvanlara Tepkisi (Buluntu ise)", tip: "textarea", aciklama: "Gözlemlendiyse.", ai_importance: 0.5, zorunlu: false }
      platform_ayarlari:
        varsayilan_ilan_suresi: "Sınırsız (bulunana veya vazgeçilene kadar, periyodik 'hala kayıp/bulundu mu?' onayı)"
        ai_priority_score: 2.0
        moderasyon_seviyesi: "Yüksek"
        ozel_dogrulama_gerekliligi: "Buluntu hayvanı sahiplenme iddiasında olanlardan sahiplik kanıtı (eski fotoğraflar, veteriner kayıtları, özel işaretler). Kayıp ilanında iletişim bilgilerinin doğruluğu."
      ai_ml_config:
        semantic_weight: 1.0
        nlp_features_enabled: ["urgency_detection", "location_extraction", "description_similarity_matching", "named_entity_recognition_pet_name", "contact_info_validation"]
        ml_model_suggestions: ["image_recognition_pet_matching", "geospatial_alert_system", "reunion_probability_predictor", "spam_lost_found_detection", "description_auto_enhancer"]
      istatistikler:
        beklenen_performans_metrikleri:
          - "Ortalama ilan görüntülenme: Çok Yüksek (özellikle ilk 48 saat)"
          - "Başarılı kavuşma oranı hedefi: %50 (hızlı ve yaygın paylaşıma bağlı)"
          - "Ortalama bulunma/kavuşma süresi: 1-7 gün (kritik)"
          - "Topluluk dayanışmasının en güçlü olduğu alanlardan biri."

    acil_durum:
      id: "cat_ucretsiz_acildurum"
      temel_kimlik:
        ad: "Acil Durum / İvedi Yardım Çağrısı"
        slug: "acil-durum-ivedi-yardim-cagrisi"
        aciklama: "Kaza, yaralanma, terk edilme, kötü muamele gibi acil müdahale gerektiren durumdaki hayvanlar için yardım talepleri. Hızlı ve etkili müdahale hayat kurtarır."
        gorsel_kimlik: { renk_kodu: "#EF4444", tema_notu: "Parlak Kırmızı (ACİL!)", ikon_adi: "fas fa-ambulance", alternatif_ikonlar: "fas fa-siren-on", emoji: "🚨" }
      kategori_tipi: "ucretsiz"
      arama_sistemi:
        alternatif_kelimeler: ["acil veteriner", "yaralı hayvan", "kaza geçiren hayvan", "hayvan kurtarma", "acil yardım pet", "ihbar (hayvana şiddet)", "terk edilmiş bebek hayvan", "acil klinik masrafı", "kan bağışı (hayvan)", "acil geçici yuva (travma)", "doğal afet mağduru hayvan", "zehirlenme şüphesi", "acil nakil aracı", "itfaiye (hayvan sıkışması)", "acil mama desteği (afet bölgesi)", "sokakta donmak üzere", "acil tedavi ihtiyacı", "hayvan hakları ihlali", "acil müdahale ekibi"]
        ai_intent_keywords: ["acil yardım çağrısı", "yaralı pet ihbarı", "hayvan tehlikede", "ivedi müdahale talebi", "hayvan kurtarma operasyonu"]
        semantic_tags: ["emergency_rescue", "animal_injury", "urgent_help", "animal_abuse_report", "disaster_relief_pets", "immediate_veterinary_need", "life_saving_intervention"]
