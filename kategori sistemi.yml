            - { adim_kodu: "YASAM_ALANI_FOTOGRAF_VIDEO_KANITI_EGZOTIK", gosterilecek_ad_kullanici: "Yaşam Alanı Kurulumu Kanıtı (Fotoğraf/Video)", talep_edilecek_bilgiler_kullanici_listesi: ["Hayvanın şu anda yaşadığı veya yeni sahibi için hazırlanmış olan yaşam alanının (terrarium, vivarium, akvaryum vb.) detaylı, güncel fotoğrafları ve videoları.", "Isıtma, aydınlatma, nemlendirme, havalandırma sistemleri, taban malzemesi, saklanma ve tırmanma alanları net bir şekilde görülmeli."], moderator_kontrol_rehberi: "Sunulan yaşam alanının, ilandaki türün bilinen asgari refah standartlarına ve özel ihtiyaçlarına uygun olup olmadığı uzman gözüyle değerlendirilir. Yetersiz veya uygunsuz koşullar varsa ilan onaylanmaz.", dogrulama_seviyesi_sonucu: "YASAM_ALANI_UYGUNLUGU_DEGERLENDIRILDI" }
      veri_yapilandirma_ve_dis_ai_optimizasyonu_egzotik:
        semantik_icerik_ve_seo_ayarlari:
          akilli_ilan_asistani_icerik_onerileri:
            - { hedef_form_alani_kodu: "ilan_basligi_egzotik", oneri_basligi_kullanici: "Türün Tam Adını ve 'Özel Bakım' Vurgusunu Başlıkta Kullanın", oneri_detayi_kullanici: "Başlıkta hayvanın tam tür adını (mümkünse bilimsel adıyla), yaşını ve 'Özel Bakım Gerektirir', 'Deneyimli Sahip Aranıyor', 'CITES Belgeli' gibi önemli uyarıları ekleyin.", neden_onemli_aciklamasi_kullanici: "Bu, sadece gerçekten ilgili ve bilgili kişilerin dikkatini çeker, yanlış beklentileri ve zaman kaybını önler.", iyi_ornek_metni_kullanici: "Örn: 'Yetişkin Erkek Jako Papağanı (Psittacus erithacus) - CITES Belgeli, Deneyimli Sahip Şart!'", ipucu_tipi: "KRITIK_UYARI_VE_BILGILENDIRME" }
            - { hedef_form_alani_kodu: "ilan_aciklamasi_egzotik", oneri_basligi_kullanici: "Tüm Bakım Detaylarını, Riskleri ve Yasal Bilgileri Eksiksiz Paylaşın", oneri_detayi_kullanici: "Hayvanın menşei, yasal durumu, CITES belge bilgileri, tüm bakım ihtiyaçları (beslenme, sıcaklık, nem, yaşam alanı), karakteri, potansiyel riskleri (zehirlilik, saldırganlık), ortalama ömrü, yetişkin boyutu ve sahiplendirme koşullarınızı (ücret, sözleşme, deneyim şartı) son derece detaylı ve dürüst bir şekilde yazın. Yanlış veya eksik bilgi yasal sorumluluk doğurabilir.", neden_onemli_aciklamasi_kullanici: "Egzotik hayvan sahiplenmek ciddi bir karardır. Şeffaflık, hem hayvanın refahı hem de yasal uyum için hayati önemdedir.", ipucu_tipi: "YASAL_VE_ETIK_SORUMLULUK_VURGUSU" }
          semantik_zenginlik_onemi_katsayisi: 0.95 # ai_complexity_score'dan. Doğruluk ve detay hayati.
        yapilandirilmis_veri_ve_meta_etiket_stratejileri:
          kullanilacak_schema_org_tipleri:
            - schema_tipi: "Product"
              alan_eslestirmeleri:
                - { schema_alani: "name", platform_alani_kaynagi: "ilan.egzotik_tur_detay_baslik" }
                - { schema_alani: "description", platform_alani_kaynagi: "ilan.egzotik_aciklama_detayli_ozet" }
                - { schema_alani: "category", platform_alani_kaynagi: "ilan.akilli_filtre_degeri_tur_ana_grup_egzotik_schema_uyumlu" } # (Örn: "Reptile", "Amphibian")
                - { schema_alani: "additionalType", platform_alani_kaynagi: "ilan.akilli_filtre_degeri_tur_detay_bilimsel_ad_egzotik_url_wikidata" } # Wikidata veya benzeri bir otoriteye link
                - { schema_alani: "image", platform_alani_kaynagi: "ilan.ana_egzotik_fotograf_url" }
                - { schema_alani: "offers", platform_alani_kaynagi: "ilan.sahiplendirme_ucret_ve_kosul_schema_egzotik", schema_alt_tipi: "Offer" }
                - { schema_alani: "additionalProperty", platform_alani_kaynagi: "ilan.egzotik_bakim_yasal_schema_properties" } # (Bakım zorluğu, yasal durum, CITES için PropertyValue listesi)
                - { schema_alani: "warning", platform_alani_kaynagi: "ilan.egzotik_ozel_uyari_metinleri_schema" } # (Örn: "Special care required", "Legal restrictions apply", "Potentially dangerous")
          ozel_meta_etiketler_egzotik:
            - { etiket_adi: "petplatform:exotic_species_scientific_name", icerik_kaynagi: "ilan.akilli_filtre_degeri_tur_detay_bilimsel_ad_egzotik" }
            - { etiket_adi: "petplatform:exotic_care_difficulty", icerik_kaynagi: "ilan.akilli_filtre_degeri_bakim_zorlugu_egzotik" }
            - { etiket_adi: "petplatform:exotic_legal_status_TR", icerik_kaynagi: "ilan.akilli_filtre_degeri_yasal_durum_turkiye_egzotik_ozet" }
            - { etiket_adi: "petplatform:exotic_CITES_appendix", icerik_kaynagi: "ilan.CITES_ek_bilgisi_egzotik" } # (Örn: "Appendix I", "Appendix II", "Not Listed")
            - { etiket_adi: "petplatform:exotic_owner_experience_required", icerik_kaynagi: "ilan.akilli_filtre_degeri_ilk_sahip_uygunlugu_egzotik_kod" } # (Örn: "EXPERT_ONLY")
        harici_platform_ve_api_entegrasyon_hazirligi:
          resmi_kurumlar_ve_uzman_dernekler_ile_bilgi_paylasimi_protokolu_aktif_mi: true # Yasal gereklilik veya şüphe durumunda, kullanıcı onayıyla veya yasal zorunlulukla.
          gorsel_erisimi_ve_optimizasyonu_harici_sistemler_icin:
            gorsel_alt_metin_stratejisi: "Egzotik_TUR_YASAL_DURUM_PLATFORMADI"
            # Örn: "Jako Papağanı CITES Belgeli PetPlatform"
          dis_ai_modelleri_icin_veri_yapilandirma_notlari_egzotik:
            yasal_uygunluk_ve_CITES_kontrolu_icin_dis_veri_kaynaklari_ile_eslestirme_altyapisi: "YAPILANDIRILMIS_TUR_VE_BELGE_BILGILERININ_RESMI_VERITABANLARI_ILE_KARSILASTIRILABILIR_FORMATTA_SUNULMASI_HEDEFLENIR"
            # Açıklama: Platform, CITES veya yerel yasa veritabanlarını barındırmaz veya doğrudan sorgulamaz. Ancak, ilandaki tür adı, menşei, belge numaraları gibi bilgiler, uzman moderatörlerin veya yetkili kurumların harici resmi veritabanlarında (örn: CITES Species+ , TRAFFIC) manuel veya yarı otomatik sorgulama yapmasını kolaylaştıracak şekilde yapılandırılır ve sunulur.
            risk_degerlendirme_icin_dis_uzman_sistemlere_veri_aktarimi_protokolu: "SAHIP_DENEYIMI_BEYANLARI_HAYVAN_BAKIM_IHTIYACLARI_VE_YASAM_ALANI_BILGILERININ_ANONIMLESTIRILEREK_VEYA_KULLANICI_IZNIYLE_UZMAN_DEGERLENDIRME_ARACLARINA_UYGUN_FORMATTA_SUNULMASI_PLANLANABILIR"
            # Açıklama: Hayvanın özel ihtiyaçları, sahibinin belirttiği deneyim seviyesi ve sunulan yaşam koşulları gibi kritik bilgiler, platform dışı uzmanlar veya etik kurullar tarafından (kullanıcı onayı veya yasal gereklilikle) bir risk değerlendirmesi yapılmasına olanak tanıyacak şekilde düzenlenir. Platform kendi başına bir risk değerlendirme modeli çalıştırmaz.
        icerik_kalitesi_ve_guvenilirlik_sinyalleri_harici_sistemler_icin:
          yasal_belge_durumu_beyani_meta_egzotik: "petplatform:exotic_legal_docs_status" # (Örn: "CITES_PROVIDED", "LEGALITY_UNCLEAR", "DOMESTIC_BRED_NO_CITES_NEEDED")
          bakim_bilgisi_kaynagi_meta_egzotik: "petplatform:exotic_care_info_source" # (Örn: "OWNER_EXPERIENCE", "VET_CONSULTED", "BREEDER_INFO")
          sahiplendirme_kosulu_deneyim_sarti_meta_egzotik: "petplatform:exotic_experience_level_required_for_adoption" # (Text: "Advanced", "Professional Only")
      istatistikler_egzotik:
        beklenen_performans_metrikleri_egzotik:
