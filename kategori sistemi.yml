              - { alan_adi: "uygun_gorusme_zamanlari_ess", label: "Görüşme İçin Uygun Zaman Dilimleri", tip: "text", zorunlu: false, aciklama: "Örn: Hafta içi akşamları, Hafta sonu öğleden sonra", ai_importance: 0.4 }
      platform_ayarlari_ev_sahibi_satisi: # Eski platform_ayarlari buraya
        ilan_yasam_dongusu_ve_ucretlendirme:
          ilan_tipi_modeli: "DUSUK_KREDI_MALIYETLI_REFAH_ODAKLI_YAYIN"
          varsayilan_aktif_kalma_suresi_gun_standart_ilan: 45 # Orijinaldeki gibi
          uzatma_imkani_aktif_mi: true # Orijinaldeki gibi
          otomatik_uzatma_aktif_mi: false # Orijinaldeki gibi
          maksimum_uzatma_sayisi: 2 # Orijinaldeki gibi
