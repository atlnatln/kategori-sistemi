          - { alan_adi: "aktivite_zamani_kemirgen", label: "Aktif Olduğu Zaman Dilimi", tip: "select", secenekler: ["Gece Aktif (örn: Hamster, Chinchilla)", "Gündüz Aktif (örn: Guinea Pig, Tavşan)", "Alacakaranlık/Şafak Vakti Aktif (örn: Gerbil)"], ai_importance: 0.6 }
          - { alan_adi: "kafes_yasam_alani_ihtiyaci_kemirgen", label: "Kafes/Yaşam Alanı İhtiyacı", tip: "select_text_area", secenekler: ["Küçük Boy (tekil küçük türler için min.)", "Orta Boy (çiftler veya daha büyük tekiller için)", "Büyük Boy (tavşan, guinea pig için geniş alan)", "Çok Katlı/Tünelli Sistemler", "Oda İçinde Serbest Alan (gözetimli)"], aciklama_text: "Minimum boyut önerileri (cm cinsinden), taban malzemesi, tekerlek, yuva, suluk/mama kabı gibi temel ekipmanlar hakkında bilgi.", ai_importance: 0.8, zorunlu: true }
