              - { alan_adi: "tasma_gezdirme_aliskanligi_kopek_ess", label: "Tasma ve Gezdirme Alışkanlığı (Köpek ise)", tip: "textarea", zorunlu: false, ai_importance: 0.7 }
              - { alan_adi: "bilinen_komutlar_oyunlar_ess", label: "Bildiği Komutlar / Sevdiği Oyunlar", tip: "textarea", zorunlu: false, ai_importance: 0.6 }
