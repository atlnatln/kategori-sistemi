              - { alan_adi: "sahiplendirme_sozlesmesi_yapilacak_mi_ess", label: "Sahiplendirme Sözleşmesi Yapılacak mı?", tip: "radio", secenekler: ["Evet, yapılacak", "Hayır, yapılmayacak", "Kararsızım/Görüşülür"], zorunlu: true, ai_importance: 0.75 }
              - { alan_adi: "takip_sarti_var_mi_ess", label: "Yeni Evinde Takip Şartı", tip: "radio", secenekler: ["Evet, belirli aralıklarla (fotoğraf/video/ziyaret)", "Hayır, güveneceğim", "Görüşülür"], zorunlu: false, ai_importance: 0.7 }
              - { alan_adi: "yeni_sahip_ile_tanisma_sureci_ess", label: "Yeni Sahip Adayı ile Tanışma Süreci Nasıl Olacak?", tip: "textarea", zorunlu: true, aciklama: "Örn: Önce telefonla görüşme, sonra evde tanışma, birkaç ziyaret vb.", ai_importance: 0.8 }
