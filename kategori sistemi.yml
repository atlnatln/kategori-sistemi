          - { alan_adi: "hayvan_katilimi_izin_durumu_topluluk", label: "Etkinliğe Hayvan Getirilebilir Mi?", tip: "select_aciklamali", secenekler_map: {"Evet (Belirli Kurallarla)":true, "Hayır (Sadece İnsan Katılımcılar)":false, "Sadece Belirli Tür Hayvanlar":true, "Danışınız":false}, aciklama_label: "Hayvan Katılım Kuralları", ai_importance: 0.65, zorunlu: false }
          - { alan_adi: "organizator_bilgisi_topluluk", label: "Organizatör/Düzenleyen", tip: "text_url", aciklama: "Kişi, grup, dernek veya kurum adı. Varsa web sitesi/sosyal medya linki.", ai_importance: 0.7, zorunlu: false }
          - { alan_adi: "etkinlik_ana_temasi_etiketler_topluluk", label: "Etkinlik Ana Teması/Etiketleri", tip: "multiselect_text_tags", secenekler_onerilen: ["eğitim", "sosyalleşme", "gönüllülük", "farkındalık", "sağlık", "bakım", "davranış", "yasalar", "barınak yardımı", "köpek gezdirme", "kedi sevgisi", "kuş gözlemi"], aciklama: "Etkinliğin anahtar kelimelerini seçin veya ekleyin.", ai_importance: 0.8, zorunlu: false }
