          - { alan_adi: "saglik_durumu_genel_kemirgen", label: "Genel Sağlık Durumu", tip: "select_aciklamali", secenekler_map: {"Sağlıklı": false, "Bilinen Bir Rahatsızlığı Yok": false, "Özel Dikkat/Takip Gerektiren Durum": true}, aciklama_label: "Sağlık Detayı/Notu", ai_importance: 0.8 }
