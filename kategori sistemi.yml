            - { etiket_adi: "petplatform:producer_verification_level_commercial", icerik_kaynagi: "ilan.uretici_dogrulama_rozet_kodu_meta" } # (ISLETME_DOGRULANDI_BRONZ vb.)
            - { etiket_adi: "petplatform:ethical_production_focus_commercial", icerik_kaynagi: "ilan.etik_uretim_hayvan_refahi_politikasi_var_mi_boolean" }
