          - { alan_adi: "aranan_hayvan_tur_irk_talep", label: "Aranan Hayvan Türü/Irkı (Hayvan Arayışı ise)", tip: "text", aciklama: "Örn: Safkan Van Kedisi, Labrador Yavrusu (Siyah)", ai_importance: 0.9, zorunlu: false }
          - { alan_adi: "aranan_urun_adi_kategori_talep", label: "Aranan Ürün Adı/Kategorisi (Ürün Arayışı ise)", tip: "text", aciklama: "Örn: X Marka Hipoalerjenik Kedi Maması, Y Boyutunda Ortopedik Köpek Yatağı", ai_importance: 0.85, zorunlu: false }
